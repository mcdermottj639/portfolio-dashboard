<script>
/* ═══════════════════════════════════════════════════════════════════
   PWA REPLAY SHIM  (consumer side)
   The live MCP bridge (window.cowork) only exists inside the Claude app.
   Outside it — e.g. this PWA on a phone — we stand in a replacement that
   replays responses pre-fetched into data.json by the producer agent
   (see producer/PRODUCER.md), refreshed ~every 15 min during market hours.
   Keys are derived identically here and in producer/build-data.mjs.
═══════════════════════════════════════════════════════════════════ */
(function(){
  function stable(o){ if(o===null||typeof o!=='object')return JSON.stringify(o); if(Array.isArray(o))return '['+o.map(stable).join(',')+']'; return '{'+Object.keys(o).sort().map(function(k){return JSON.stringify(k)+':'+stable(o[k]);}).join(',')+'}'; }
  /* Exact key for stable calls (portfolio, positions, Alpha Vantage). Quotes and
     historicals are NOT keyed — they're assembled per-symbol below, so any batching
     the app uses resolves regardless of how the producer fetched them. */
  function makeKey(server, args){ return server+'|'+stable(args||{}); }
  window.__pfKey=makeKey;
  /* ── decryption (matches producer/emit.mjs) ── */
  function b64d(s){ var bin=atob(s); var u=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return u; }
  function decryptEnvelope(env, pass){
    return crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey'])
      .then(function(km){ return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(env.salt),iterations:env.iter||150000,hash:'SHA-256'}, km, {name:'AES-GCM',length:256}, false, ['decrypt']); })
      .then(function(key){ return crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(env.iv)}, key, b64d(env.ct)); })
      .then(function(pt){ return JSON.parse(new TextDecoder().decode(pt)); });
  }
  var EMPTY={recorded:{},quotes:{},hist:{}};
  function loadData(){
    return fetch('./data.json',{cache:'no-store'}).then(function(r){ if(!r.ok)throw new Error('data.json '+r.status); return r.json(); })
      .then(function(raw){
        if(!raw||!raw.enc) return raw;                       // plaintext (dev / sample)
        // Normalize: trim, and convert "smart" dashes/minus back to a plain hyphen so a
        // mobile keyboard can't silently break an otherwise-correct passphrase.
        function norm(p){ return p==null?p:String(p).trim().replace(/[‐-―−⁃]/g,'-'); }
        var hk=(location.hash.match(/(?:^|[#&])key=([^&]+)/)||[])[1];
        if(hk){ try{hk=decodeURIComponent(hk);}catch(e){} history.replaceState(null,'',location.pathname+location.search); }
        var pass=norm(hk||localStorage.getItem('pf_pass')||null);
        // Custom unlock prompt — a real password input (no auto-capitalize / autocorrect /
        // smart-punctuation), unlike window.prompt which iOS mangles.
        function askPass(showErr){
          return new Promise(function(resolve){
            var host=document.body||document.documentElement;
            var ov=document.getElementById('pf-unlock');
            if(!ov){

/* ─── RSI ─── */
function calcRSI(closes, period=14){
  if(!closes||closes.length<period+2)return null;
  const ch=[]; for(let i=1;i<closes.length;i++) ch.push(closes[i]-closes[i-1]);
  let ag=0,al=0; for(let i=0;i<period;i++){ if(ch[i]>0)ag+=ch[i]; else al+=Math.abs(ch[i]); }
  ag/=period; al/=period;
  for(let i=period;i<ch.length;i++){ ag=(ag*(period-1)+(ch[i]>0?ch[i]:0))/period; al=(al*(period-1)+(ch[i]<0?Math.abs(ch[i]):0))/period; }
  if(al===0)return 100; return 100-(100/(1+ag/al));
}
function parseDailyCloses(raw){
  if(!raw)return[];
  if(typeof raw==='string'){ const rows=parseCSV(raw); return rows.map(r=>parseFloat(r.close)).filter(v=>!isNaN(v)).reverse(); }
  if(typeof raw==='object'&&raw['Time Series (Daily)']){ const ts=raw['Time Series (Daily)']; return Object.keys(ts).sort().map(d=>parseFloat(ts[d]['4. close'])); }
  return[];
}

  if(topArr){ for(const item of topArr){ const q=item.quote??item; const sym=q?.symbol||q?.ticker; if(sym)addQ(sym,q); } if(Object.keys(map).length>0)return map; }
  const resArr=Array.isArray(d?.results)?d.results:Array.isArray(raw.results)?raw.results:null;
  if(resArr){ for(const item of resArr){ const q=item.quote??item; const sym=q?.symbol||q?.ticker; if(sym)addQ(sym,q); } if(Object.keys(map).length>0)return map; }
  const SKIP=new Set(['guide','error','closes_error','next','previous','count','status']);
  const obj=typeof d==='object'&&!Array.isArray(d)?d:typeof raw==='object'&&!Array.isArray(raw)?raw:null;

  return map;
}

/* ─── Enrich positions ─── */
function enrich(positions,qMap,totalVal){
  return positions.map(p=>{
    const q=qMap[p.symbol]||{};
    const qty=parseFloat(p.quantity||0), avg=parseFloat(p.average_buy_price||0);
    const px=q.price||0, val=px*qty, cost=avg*qty, pnlD=val-cost;
    const pnlP=cost>0?(pnlD/cost)*100:0;
    const dayP=q.prev>0?((px-q.prev)/q.prev)*100:null;
    const dayD=q.prev>0?(px-q.prev)*qty:0;
    const pct=totalVal>0?(val/totalVal)*100:0;
    return{...p,qty,avg,px,val,cost,pnlD,pnlP,dayP,dayD,pct,r:risk(pct)};
  });
}

  }
  return out;
}

/* RSI + beta from Robinhood daily historicals (no Alpha Vantage) */
function rsiFromHist(histMap, syms){
  const map={};
  for(const s of syms){ const ser=histMap[s]; if(ser&&ser.length>16){ const r=calcRSI(ser.map(b=>b.c)); if(r!=null)map[s]=r; } }

function betaFromHist(histMap, enriched, syms){
  const spy=histMap['SPY']; if(!spy||spy.length<10) return {beta:null,coverage:0,perSym:{}};
  const rets=a=>{const o=[];for(let i=1;i<a.length;i++)o.push(a[i].c/a[i-1].c-1);return o;};
  const sr=rets(spy); const n0=sr.length; const mx=sr.reduce((s,x)=>s+x,0)/n0; let vx=0; for(const x of sr)vx+=(x-mx)*(x-mx); vx/=n0;
  let wsum=0,bsum=0,covered=0; const perSym={}; const eq=enriched.reduce((s,p)=>s+Math.max(p.val,0),0)||1;
  for(const s of syms){ const ser=histMap[s]; const p=enriched.find(e=>e.symbol===s); if(!ser||ser.length<10||!p||p.val<=0)continue; const r=rets(ser); const n=Math.min(r.length,sr.length); if(n<8)continue; const my=r.slice(-n).reduce((a,x)=>a+x,0)/n; let cov=0; for(let i=0;i<n;i++){ cov+=(sr[sr.length-n+i]-mx)*(r[r.length-n+i]-my); } cov/=n; const b=vx>0?cov/vx:null; if(b!=null){ perSym[s]=b; bsum+=b*p.val; wsum+=p.val; covered+=p.val; } }
  return { beta: wsum>0?bsum/wsum:null, coverage: eq>0?covered/eq*100:0, perSym };
}

/* Empirically correlated groups from YTD daily returns — replaces reliance on the static CLUSTERS
   list for the Risk card. Greedy union-find over pairs with correlation ≥ THRESH; returns groups of
   ≥2 held names sorted by combined weight, each {members:[{sym,pct}], pct, avgCorr}. */
function corrGroups(histMap, enriched, syms){
  const THRESH=0.7;
  const rets=a=>{const o=[];for(let i=1;i<a.length;i++)o.push(a[i].c/a[i-1].c-1);return o;};
  const use=syms.filter(s=>{ const ser=histMap[s]; const p=enriched.find(e=>e.symbol===s); return ser&&ser.length>20&&p&&p.val>0; });
  if(use.length<2) return [];
  const R={}; for(const s of use) R[s]=rets(histMap[s]);
  function corr(a,b){ const x=R[a],y=R[b]; const n=Math.min(x.length,y.length); if(n<15)return null;
    const xs=x.slice(-n),ys=y.slice(-n); const mx=xs.reduce((s,v)=>s+v,0)/n,my=ys.reduce((s,v)=>s+v,0)/n;
    let cov=0,vx=0,vy=0; for(let i=0;i<n;i++){ cov+=(xs[i]-mx)*(ys[i]-my); vx+=(xs[i]-mx)**2; vy+=(ys[i]-my)**2; }
    return (vx>0&&vy>0)?cov/Math.sqrt(vx*vy):null; }
  const parent={}; use.forEach(s=>parent[s]=s);
  const find=s=>{ while(parent[s]!==s){ parent[s]=parent[parent[s]]; s=parent[s]; } return s; };
  const edges=[];
  for(let i=0;i<use.length;i++)for(let j=i+1;j<use.length;j++){ const r=corr(use[i],use[j]); if(r!=null&&r>=THRESH){ edges.push(r); parent[find(use[i])]=find(use[j]); } }
  const groups={};
  for(const s of use){ const root=find(s); (groups[root]=groups[root]||[]).push(s); }
  const eq=enriched.reduce((s,p)=>s+Math.max(p.val,0),0)||1;
  const avgR=edges.length?edges.reduce((a,b)=>a+b,0)/edges.length:null;
  return Object.values(groups).filter(g=>g.length>=2).map(g=>{
    const members=g.map(sym=>{ const p=enriched.find(e=>e.symbol===sym); return {sym,pct:p?p.val/eq*100:0,val:p?p.val:0}; }).sort((a,b)=>b.pct-a.pct);
    return { members, pct:members.reduce((s,m)=>s+m.pct,0), avgCorr:avgR };
  }).sort((a,b)=>b.pct-a.pct);
}

/* 50-day SMA per symbol from daily closes (for the Technical Signals trend column). */
function smaFromHist(histMap, syms){
  const map={};
  for(const s of syms){ const ser=histMap[s]; if(ser&&ser.length>=50){ const last=ser.slice(-50); map[s]=last.reduce((a,b)=>a+b.c,0)/50; } }
  return map;
}

function computeBeta(enriched, ovMap){
  let wsum=0, bsum=0, covered=0;
  for(const p of enriched){
    if(p.val<=0)continue;
    const ov=ovMap[p.symbol]; const b=ov?parseFloat(ov.Beta):NaN;
    if(!isNaN(b)){ bsum+=b*p.val; wsum+=p.val; covered+=p.val; }
  }
  const eqVal=enriched.reduce((s,p)=>s+Math.max(p.val,0),0);
  return { beta: wsum>0?bsum/wsum:null, coverage: eqVal>0?covered/eqVal*100:0 };
}

function assetClassOf(sym, ov){
  if(ASSET_MAP[sym]) return ASSET_MAP[sym];
  return 'Stocks';
}
function computeAllocation(enriched, ovMap, totalVal){
  const sectors={}, assets={};
  let covered=0;
  const eqVal=enriched.reduce((s,p)=>s+Math.max(p.val,0),0);
  for(const p of enriched){
    if(p.val<=0)continue;
    const ac=assetClassOf(p.symbol, ovMap[p.symbol]);
    assets[ac]=(assets[ac]||0)+p.val;
    const ov=ovMap[p.symbol];
    if(ac==='Stocks'){
      if(ov&&ov.Sector){ const s=titleCase(ov.Sector); sectors[s]=(sectors[s]||0)+p.val; covered+=p.val; }
      else { sectors['Uncategorized']=(sectors['Uncategorized']||0)+p.val; }
    }
  }
  const stockVal=Object.values(assets).reduce((s,v)=>s,0); // placeholder
  return { sectors, assets, eqVal, sectorCoverage: eqVal>0?covered/eqVal*100:0 };
}
function titleCase(s){ return (s||'').toLowerCase().replace(/\b\w/g,m=>m.toUpperCase()); }

function computeIncome(enriched, ovMap){
  let annual=0, costBasis=0, mktBasis=0; const exdiv=[];
  for(const p of enriched){
    if(p.val<=0)continue;
    const ov=ovMap[p.symbol]; if(!ov)continue;
    const dps=parseFloat(ov.DividendPerShare);
    if(!isNaN(dps)&&dps>0){
      const inc=dps*p.qty; annual+=inc; costBasis+=p.cost; mktBasis+=p.val;
      const ex=ov.ExDividendDate;
      if(ex&&ex!=='None'){ const d=new Date(ex); if(!isNaN(d)) exdiv.push({sym:p.symbol, date:ex, dps, inc}); }
    }
  }
  exdiv.sort((a,b)=>new Date(a.date)-new Date(b.date));
  return { annual, yieldOnMkt: mktBasis>0?annual/mktBasis*100:0, yieldOnCost: costBasis>0?annual/costBasis*100:0, exdiv };
}

function harvestCandidates(enriched){
  return enriched.filter(p=>p.val>=SMALL_THR && p.pnlD<0).sort((a,b)=>a.pnlD-b.pnlD);
}

async function pushToKyle(){
  const btn=document.getElementById('kyle-btn');
  const S=window.__SNAP;
  if(!S||!S.stats){ alert('Portfolio still loading — give it a moment.'); return; }
  if(!S.betaInfo||!S.perf){ alert('Beta and performance are still computing in the background (a few seconds after load). Try again shortly.'); return; }
  if(btn){ btn.disabled=true; btn.textContent='Pushing…'; }
  try{
    const html=buildKyleHTML();
    const r=await window.cowork.callMcpTool(KYLE+'update_artifact',{artifact_id:KYLE_PORTFOLIO_ID,title:'Portfolio — '+S.date,content:html});
    if(r&&r.isError) throw new Error('Kyle returned an error');
    const t=document.getElementById('toast'); if(t){ t.textContent='✅ Pushed to Kyle'; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
  }catch(e){ alert('Push to Kyle failed: '+(e&&e.message||e)); }
  if(btn){ btn.disabled=false; btn.textContent='📲 Push to Kyle'; }
}
window.pushToKyle=pushToKyle;

/* ═══ Performance vs benchmark ═══ */
function buildNorm(series){ if(!series||series.length<2)return null; const c0=series[0].c; return series.map(b=>({t:b.t, v:(b.c/c0-1)*100})); }
function renderPerformance(histMap, enriched, coveredSyms, macroData, stats){
  const el=document.getElementById('perf-content'); if(!el)return;
  const spy=histMap['SPY'], qqq=histMap['QQQ'];
  if(!spy||spy.length<2){ el.innerHTML=`<div class="tech-empty">Benchmark history unavailable.</div>`; return; }
  const axis=spy.map(b=>b.t);
  // portfolio normalized series from covered holdings, weighted by current value
  const wsyms=coveredSyms.filter(s=>histMap[s]&&histMap[s].length>1);
  const wmap={}; let wsum=0;
  for(const s of wsyms){ const p=enriched.find(e=>e.symbol===s); if(p&&p.val>0){ wmap[s]=p.val; wsum+=p.val; } }
  let portSeries=null;
  if(wsum>0){
    const idx={}; for(const s of Object.keys(wmap)){ const m={}; for(const b of histMap[s])m[b.t]=b.c; idx[s]={m,c0:histMap[s][0].c,last:histMap[s][0].c}; }
    portSeries=axis.map(t=>{
      let acc=0;
      for(const s of Object.keys(wmap)){ const o=idx[s]; if(o.m[t]!=null)o.last=o.m[t]; acc+=(wmap[s]/wsum)*(o.last/o.c0); }
      return {t, v:(acc-1)*100};
    });
  }
  const spyN=buildNorm(spy), qqqN=buildNorm(qqq);
  const lastV=a=>a&&a.length?a[a.length-1].v:null;
  const portYTD=lastV(portSeries), spyYTD=lastV(spyN), qqqYTD=lastV(qqqN);
  // ── Agentic cash account (••••3900) overlay: a faint dotted MODELED lead-in (its current holdings
  // priced back to Jan 1, same trick as portSeries) spliced into the REAL recorded equity line
  // (data.agentic.equityHistory, recorded forward by the producer). dkey() aligns by calendar day so
  // the equity points map onto the SPY axis regardless of timestamp shape.
  const AG=(window.__DATA&&window.__DATA.agentic)||null;
  const dkey=t=>String(t).slice(0,10);
  let agModeled=null, agReal=null, agSince=null;
  if(AG&&Array.isArray(AG.positions)&&AG.positions.length){
    const aw={}; let asum=0;
    for(const p of AG.positions){ const s=p.symbol; if(histMap[s]&&histMap[s].length>1&&p.value>0){ aw[s]=p.value; asum+=p.value; } }
    if(asum>0){
      const idx={}; for(const s of Object.keys(aw)){ const m={}; for(const b of histMap[s])m[b.t]=b.c; idx[s]={m,c0:histMap[s][0].c,last:histMap[s][0].c}; }
      agModeled=axis.map(t=>{ let acc=0; for(const s of Object.keys(aw)){ const o=idx[s]; if(o.m[t]!=null)o.last=o.m[t]; acc+=(aw[s]/asum)*(o.last/o.c0); } return (acc-1)*100; });
    }
    const EH=Array.isArray(AG.equityHistory)?AG.equityHistory.slice().filter(e=>e&&e.equity>0).sort((a,b)=>a.t<b.t?-1:1):[];
    if(EH.length>=2&&agModeled){
      const firstT=dkey(EH[0].t), e0=EH[0].equity;
      let hi=axis.findIndex(t=>dkey(t)>=firstT); if(hi<0)hi=0;
      const baseMult=1+agModeled[hi]/100;
      agReal=axis.map((t,i)=>{ if(i<hi)return null; const k=dkey(t); let ev=null; for(const e of EH){ if(dkey(e.t)<=k)ev=e.equity; else break; } if(ev==null)ev=e0; return (baseMult*(ev/e0)-1)*100; });
      const eLast=EH[EH.length-1].equity, realRet=(eLast/e0-1)*100;
      const sFirst=spy.find(b=>dkey(b.t)>=firstT), sLast=spy[spy.length-1];
      const spySince=(sFirst&&sLast)?((sLast.c/sFirst.c-1)*100):null;
      agSince={ ret:realRet, spy:spySince, since:EH[0].t };
    }
  }
  try{ if(window.__SNAP){ const _cv=wsum>0?(wsum/enriched.reduce((s,p)=>s+Math.max(p.val,0),0)*100):0; window.__SNAP.perf={labels:axis,port:portSeries?portSeries.map(x=>x.v):null,spy:spyN.map(x=>x.v),qqq:qqqN.map(x=>x.v),portYTD,spyYTD,qqqYTD,cov:_cv}; } }catch(e){}
  const _thm=document.documentElement.getAttribute('data-theme');
  const C={ port:_thm==='gold'?'#e3c074':'#6366f1', portBg:_thm==='gold'?'rgba(227,192,116,0.12)':'rgba(99,102,241,0.08)',
    spy:_thm==='gold'?'#8a8170':'#9ca3af', qqq:_thm==='gold'?'#c98a3a':'#10b981',
    grid:_thm==='gold'?'rgba(210,180,120,0.10)':_thm==='dark'?'rgba(255,255,255,0.06)':'#f3f4f6',
    tick:_thm==='gold'?'#b9ad92':'#9ca3af', ag:_thm==='gold'?'#3fcf94':'#0891b2' };
  const agDateLbl=agSince?(()=>{ try{ return new Date(dkey(agSince.since)+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }catch(e){ return dkey(agSince.since); } })():'';
  el.innerHTML=`
    <div class="perf-head">
      <div class="perf-metric"><div class="pm-l">Your holdings YTD*</div><div class="pm-v ${sc(portYTD)}">${portYTD!=null?fmtP(portYTD):'—'}</div></div>
      <div class="perf-metric"><div class="pm-l">S&P 500 (SPY)</div><div class="pm-v ${sc(spyYTD)}">${fmtP(spyYTD)}</div></div>
      <div class="perf-metric"><div class="pm-l">Nasdaq-100 (QQQ)</div><div class="pm-v ${sc(qqqYTD)}">${fmtP(qqqYTD)}</div></div>
      <div class="perf-metric"><div class="pm-l">Total return since cost</div><div class="pm-v ${sc(stats.totalPnL)}">${fmtP(stats.totalRet)}</div></div>
      ${agSince?`<div class="perf-metric"><div class="pm-l">Agentic since ${agDateLbl}</div><div class="pm-v ${sc(agSince.ret)}">${fmtP(agSince.ret)}</div>${agSince.spy!=null?`<div class="pm-sub" style="font-size:10.5px;color:var(--nx-muted,#9ca3af);margin-top:2px">SPY ${fmtP(agSince.spy)} same window</div>`:''}</div>`:''}
    </div>
    <div class="chart-wrap"><canvas id="perf-chart"></canvas></div>
    <div class="legend-row">
      <span class="legend-item"><span class="legend-dot" style="background:${C.port}"></span>Your holdings*</span>
      <span class="legend-item"><span class="legend-dot" style="background:${C.spy}"></span>SPY</span>
      <span class="legend-item"><span class="legend-dot" style="background:${C.qqq}"></span>QQQ</span>
      ${agModeled?`<span class="legend-item"><span class="legend-dot" style="background:${C.ag}"></span>Agentic${agReal?' (— real · ⋯ modeled)':' (⋯ modeled)'}</span>`:''}
    </div>
    <div class="fund-note">*Price-return of your <b>current</b> holdings held at today's weights from Jan 1 — a like-for-like comparison vs the index, not a time-weighted account return (purchase history isn't available from the broker). Covers ${fmt(wsum>0?(wsum/enriched.reduce((s,p)=>s+Math.max(p.val,0),0)*100):0,0)}% of equity.${agModeled?` <b style="color:${C.ag}">Agentic</b> overlays the cash account (••••3900): <b>⋯ dotted</b> = modeled (its current holdings priced back to Jan 1); ${agReal?`<b>— solid</b> = real tracked equity since ${agDateLbl}.`:`real tracking begins once a few daily snapshots accumulate.`}`:''}</div>
    ${macroData?`<div class="macro-strip" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid var(--surface-2)">
      <div><div class="snap-lbl">10yr Treasury</div><div style="font-size:16px;font-weight:700">${macroData.tenYrYield?fmt(macroData.tenYrYield,2)+'%':'—'}</div></div>
      <div><div class="snap-lbl">Fed Funds</div><div style="font-size:16px;font-weight:700">${macroData.fedFunds?fmt(macroData.fedFunds,2)+'%':'—'}</div></div>
      <div><div class="snap-lbl">CPI YoY</div><div style="font-size:16px;font-weight:700;color:${macroData.cpi!=null?(macroData.cpi>3?'#ef4444':macroData.cpi>2?'#f97316':'#10b981'):'#1c1c1e'}">${macroData.cpi!=null?fmt(macroData.cpi,1)+'%':'—'}</div></div>
      <div><div class="snap-lbl">VIX</div><div style="font-size:16px;font-weight:700;color:${macroData.vix?(macroData.vix>25?'#ef4444':macroData.vix>18?'#f97316':'#10b981'):'#1c1c1e'}">${macroData.vix?fmt(macroData.vix,1):'—'}</div></div>
    </div>`:''}
  `;
  const ctx=document.getElementById('perf-chart'); if(!ctx)return;
  const ds=[];
  if(portSeries) ds.push({label:'Your holdings',data:portSeries.map(x=>x.v),borderColor:C.port,backgroundColor:C.portBg,borderWidth:2.2,pointRadius:0,fill:true,tension:0.15});
  ds.push({label:'SPY',data:spyN.map(x=>x.v),borderColor:C.spy,borderWidth:1.5,pointRadius:0,tension:0.15});
  ds.push({label:'QQQ',data:qqqN.map(x=>x.v),borderColor:C.qqq,borderWidth:1.5,pointRadius:0,tension:0.15});
  if(agModeled) ds.push({label:'Agentic (modeled)',data:agModeled,borderColor:C.ag,borderWidth:1.4,borderDash:[3,3],pointRadius:0,tension:0.15});
  if(agReal) ds.push({label:'Agentic',data:agReal,borderColor:C.ag,borderWidth:2,pointRadius:0,spanGaps:false,tension:0.15});
  new Chart(ctx,{ type:'line', data:{labels:axis,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{title:items=>items[0].label, label:c=>` ${c.dataset.label}: ${c.parsed.y>=0?'+':''}${c.parsed.y.toFixed(1)}%`}}},
      scales:{x:{ticks:{maxTicksLimit:6,font:{size:10},color:C.tick},grid:{display:false}},y:{ticks:{callback:v=>v+'%',font:{size:11},color:C.tick},grid:{color:C.grid}}}
    }});
}

/* ═══ Action Feed (merged alerts + recommendations) ═══ */
function buildActionFeed(enriched, port, clusters, totalVal, rsiMap, ovMap, earningsMap){
  const A=[]; const cash=parseFloat(port.cash||0); const equity=parseFloat(port.equity_value||1);
  const add=(o)=>A.push(o);
  if(cash<-1000){ const mp=Math.abs(cash)/equity*100; const t=[...enriched].filter(p=>p.pct>3&&p.px>0).sort((a,b)=>b.val-a.val)[0]; add({pr:0,icon:'🔴',c:'#ef4444',bg:'#fee2e2',fg:'#991b1b',tag:'MARGIN',title:`Margin in use — ${fmtD(Math.abs(cash))} (${fmt(mp,1)}% of equity)`,detail:t?`A drawdown is amplified by leverage. Trimming ~${Math.ceil(Math.abs(cash)/t.px)} sh of ${t.symbol} (~${fmtD(t.px)}) would clear it.`:`Leverage amplifies losses — top priority.`}); }
  const crits=[...enriched].filter(p=>p.pct>10&&p.px>0).sort((a,b)=>b.pct-a.pct);
  for(const p of crits.slice(0,2)){ const fpe=parseFloat(ovMap[p.symbol]?.ForwardPE)||null; const vN=fpe&&fpe>60?` Fwd P/E ${fmt(fpe,0)} adds valuation risk.`:''; add({pr:1,icon:'🔴',c:'#ef4444',bg:'#fee2e2',fg:'#991b1b',tag:'TRIM',title:`${p.symbol} is ${fmt(p.pct,1)}% of the book`,detail:`Single-name concentration is critical. A 20% drop in ${p.symbol} alone takes the portfolio down ~${fmt(p.pct*0.2,1)}%.${vN}`}); }
  const upE=Object.entries(earningsMap||{}).filter(([s,e])=>enriched.find(p=>p.symbol===s&&p.val>=SMALL_THR)&&e.daysAway<=14).sort((a,b)=>a[1].daysAway-b[1].daysAway);
  for(const [s,e] of upE.slice(0,3)){ const p=enriched.find(x=>x.symbol===s); const u=e.daysAway<=3?'IMMINENT':e.daysAway<=7?'THIS WEEK':'UPCOMING'; add({pr:2,icon:'🗓️',c:'#6366f1',bg:'#ede9fe',fg:'#4c1d95',tag:'EARNINGS',title:`${s} reports in ${e.daysAway}d (${e.reportDate}) — ${u}`,detail:`You hold ${fmtD(p?.val||0)} (${fmt(p?.pct||0,1)}%). Decide: hold through, trim, or set a stop.${e.estimate?` Est EPS $${parseFloat(e.estimate).toFixed(2)}.`:''}`}); }
  const ob=[...enriched].filter(p=>rsiMap[p.symbol]>=72&&p.pct>3&&p.px>0&&!crits.find(c=>c.symbol===p.symbol)).sort((a,b)=>rsiMap[b.symbol]-rsiMap[a.symbol]);
  for(const p of ob.slice(0,2)){ add({pr:3,icon:'🟠',c:'#f97316',bg:'#ffedd5',fg:'#9a3412',tag:'OVERBOUGHT',title:`${p.symbol} RSI ${fmt(rsiMap[p.symbol],0)} — extended`,detail:`At ${fmt(p.pct,1)}% (${fmtD(p.val)}). Momentum is hot; consider trimming into strength rather than adding.`}); }
  const win=[...enriched].filter(p=>p.pnlP>40&&p.pct>4&&p.px>0&&!crits.find(c=>c.symbol===p.symbol)&&!(rsiMap[p.symbol]>=72)).sort((a,b)=>b.pnlP-a.pnlP);
  for(const p of win.slice(0,1)){ const n=Math.max(1,Math.floor(p.qty*0.25)); add({pr:4,icon:'🟢',c:'#10b981',bg:'#d1fae5',fg:'#065f46',tag:'TAKE PROFIT',title:`${p.symbol} up ${fmt(p.pnlP,0)}% from cost`,detail:`Trim 25% (~${n} sh @ ${fmtD(p.px)}) → locks ${fmtD(n*(p.px-p.avg))} gain, raises ${fmtD(n*p.px)} cash.`}); }
  const os=[...enriched].filter(p=>rsiMap[p.symbol]<=30&&p.pct>1&&p.pnlP>-40&&p.px>0).sort((a,b)=>rsiMap[a.symbol]-rsiMap[b.symbol]);
  for(const p of os.slice(0,1)){ add({pr:4,icon:'🟢',c:'#10b981',bg:'#d1fae5',fg:'#065f46',tag:'ADD',title:`${p.symbol} RSI ${fmt(rsiMap[p.symbol],0)} — oversold`,detail:`If the thesis holds, a high-conviction add point. Avg cost ${fmtD(p.avg)}, now ${fmtD(p.px)}.`}); }
  // (Tax-loss harvest is owned by the plan tier below — see renderActionPlan Step 1.)

/* The plan tier of the Action Center. Three steps: RAISE cash (harvest losers + right-size
   any over-weight winner — winners are no longer off-limits) → REDEPLOY the pooled proceeds to
   pull risk down → GUARDRAILS (standing trim/stop rules). Trims are triggered by a hard weight
   cap, not a guess on the stock; RSI/valuation only flavour the "why now". rsiMap/ovMap/earningsMap
   are optional (decorators) so the function renders on the first pass before they're fetched. */
const PLAN_SINGLE_CAP=0.25, PLAN_CLUSTER_CAP=0.40; // max % of equity for one name / one correlated cluster
const PLAN_MAX_LEVERAGE=1.5; // redeploy may borrow up to this total leverage (exposure/equity); 1.5× = ≤50¢ debt per $1 equity
/* #9 — one source of truth for a pick's tradeable levels (live price, entry zone, limit, stop, TP1).
   The Action Plan's redeploy ticket and the Top-3 pick card both read this, so a pick can never show
   one entry zone in the card and a different limit in the plan. */
function pickLevels(p){
  const live=(typeof _picksLive!=='undefined'&&_picksLive[p.ticker]&&_picksLive[p.ticker].price)||0;
  const px=live||p.basePrice||0;
  const rng=(typeof parseRange==='function'?parseRange(p.entry):null);
  const stop=(p.sl&&p.sl.price)?p.sl.price:(px?px*0.90:0);
  const tp1=(p.tp1&&p.tp1.price)||null;
  const zone=p.entry||(px?('≤ $'+fmt(px,px>=1?2:4)):'—');
  const limit=(rng&&rng.hi)?rng.hi:px;
  return {px,zone,limit,stop,tp1,rng,live:!!live};
}
/* Build a pick-shaped object from a scored top-10 CANDIDATE row (which carries no hand-built levels)
   so the Action Plan can backfill its redeploy sleeve when the 3 vetted picks don't fill it. Levels
   are SYNTHESIZED from the 50-DMA (same pullback/stop machinery as the oversold addCand fallback) and
   flagged synth:true so the UI labels them "screen backfill", not dressed up as equals to the top 3. */
function synthPickFromCandidate(c, smaMap){
  if(!c||!c.ticker)return null;
  const live=(typeof _picksLive!=='undefined'&&_picksLive[c.ticker]&&_picksLive[c.ticker].price)||0;
  const px=live||c.price||0; if(!(px>0))return null;
  const s=smaMap&&smaMap[c.ticker];
  const stop=(s!=null&&isFinite(s)&&s<px)?Math.min(s*0.97,px*0.93):px*0.90;
  const entryLo=(s!=null&&isFinite(s))?Math.min(px,s*0.98):px*0.97;
  const tp1=px+2*(px-stop); // a 2R target so the buy ticket carries a level; estimate only
  const d=v=>+fmt(v,v>=1?2:4);
  return { ticker:c.ticker, company:c.company, sector:c.sector, signal:'SCREEN', synth:true,
    basePrice:c.price, entry:'$'+fmt(entryLo,entryLo>=1?2:4)+' – $'+fmt(px,px>=1?2:4),
    tp1:{price:d(tp1)}, sl:{price:d(stop)}, rr:c.rr, composite:c.composite, rsi:c.rsi };
}

  el.scrollIntoView({behavior:'smooth',block:'center'});

function renderActionPlan(enriched, clusters, totalVal, betaInfo, rsiMap, ovMap, earningsMap, smaMap){
  const el=document.getElementById('plan-content'); if(!el)return;
  rsiMap=rsiMap||{}; ovMap=ovMap||{}; earningsMap=earningsMap||{}; smaMap=smaMap||{};
  const eq=enriched.reduce((s,p)=>s+Math.max(p.val,0),0)||1;
  const beta=betaInfo&&betaInfo.beta!=null?betaInfo.beta:null;
  const perSym=betaInfo&&betaInfo.perSym?betaInfo.perSym:null;
  const onMargin=(()=>{ try{ return (window.__SNAP&&window.__SNAP.stats&&window.__SNAP.stats.cashVal<0); }catch(e){ return false; } })();
  const marginAmt=onMargin?Math.abs(window.__SNAP.stats.cashVal):0;
  const P=v=>'$'+fmt(v, v>=1?2:4); // price label (finer precision under $1)

  // 1a · Harvest losers — banks a loss, frees cash, offsets gains realized in 1b.
  //      Exit is marketable (a GTC limit at the live price): the point is the loss + freed cash, not a few cents.
  const harv=enriched.filter(p=>p.val>=SMALL_THR&&p.pnlD<0&&p.px>0).sort((a,b)=>a.pnlD-b.pnlD);
  const harvProceeds=harv.reduce((s,p)=>s+p.val,0), bankedLoss=harv.reduce((s,p)=>s+p.pnlD,0); // bankedLoss ≤ 0
  const harvRows=harv.map(p=>`<tr><td><span class="sym">${p.symbol}</span></td><td class="tr">${fmt(p.qty,p.qty<1?3:2)}</td><td class="tr">${P(p.px)}</td><td class="tr">${fmtD(p.val)}</td><td class="tr"><span class="neg">${fmtD(p.pnlD)}</span> <span style="color:#9ca3af">(${fmtP(p.pnlP)})</span></td></tr>`).join('');

  // 1b · Right-size winners — trim only the EXCESS above the single-name cap (shackle removed).
  //      Trigger = concentration; RSI/fwd-P/E only annotate urgency. Limit = live price, worked GTC into strength.
  const trims=enriched.filter(p=>p.val>=SMALL_THR&&p.px>0&&p.val/eq>PLAN_SINGLE_CAP).map(p=>{
    const excess=p.val-PLAN_SINGLE_CAP*eq;
    const sh=Math.floor(excess/p.px);
    const proceeds=sh*p.px, gain=sh*(p.px-p.avg);
    const rsi=rsiMap[p.symbol], fpe=parseFloat(ovMap[p.symbol]&&ovMap[p.symbol].ForwardPE)||null;
    const why=[]; if(rsi>=70)why.push('RSI '+fmt(rsi,0)); if(fpe&&fpe>50)why.push('fwd P/E '+fmt(fpe,0));
    return {p,sh,proceeds,gain,curPct:p.val/eq*100,why};
  }).filter(t=>t.sh>0&&t.proceeds>=SMALL_THR).sort((a,b)=>b.proceeds-a.proceeds);
  const trimProceeds=trims.reduce((s,t)=>s+t.proceeds,0), realizedGain=trims.reduce((s,t)=>s+t.gain,0);
  const trimRows=trims.map(t=>`<tr><td><span class="sym">${t.p.symbol}</span> <span style="color:#9ca3af">${fmt(t.curPct,0)}%→${fmt(PLAN_SINGLE_CAP*100,0)}%</span></td><td class="tr">${t.sh}</td><td class="tr">${P(t.p.px)}</td><td class="tr">${fmtD(t.proceeds)}</td><td class="tr"><span class="${t.gain>=0?'pos':'neg'}">${fmtD(t.gain)}</span>${t.why.length?` <span style="color:#9ca3af">· ${t.why.join(' · ')}</span>`:''}</td></tr>`).join('');

  const freed=harvProceeds+trimProceeds;
  const netTaxable=realizedGain+bankedLoss; // gain realized trimming, offset by harvested loss
  // #6 — deployable pool = cash raised from sells + idle settled cash + margin borrowed up to a fixed
  // LEVERAGE CAP (`PLAN_MAX_LEVERAGE`, 1.5×). The cap is anchored to your own equity, not the broker's
  // shifting buying-power offer: allowed fresh loan = (lev−1)×equity = 0.5×equity, i.e. ≤ 50¢ of debt per
  // $1 you own. We only add leverage from a flat start; when already on margin (cashVal<0) the plan
  // deleverages instead (marginUse 0, pay the loan down first below). Never beyond what the broker lends.
  const cashAvail=(()=>{ try{ return Math.max(0,(window.__SNAP&&window.__SNAP.stats&&window.__SNAP.stats.cashVal)||0); }catch(e){ return 0; } })();
  const bpv=(()=>{ try{ return Math.max(0,(window.__SNAP&&window.__SNAP.stats&&window.__SNAP.stats.bpVal)||0); }catch(e){ return 0; } })();
  const equityBase=(()=>{ try{ return Math.max(0,(window.__SNAP&&window.__SNAP.stats&&window.__SNAP.stats.equityVal)||0); }catch(e){ return 0; } })();
  const marginCap=onMargin?0:(PLAN_MAX_LEVERAGE-1)*equityBase; // $ we may borrow before hitting the leverage cap
  const brokerRoom=Math.max(0,bpv-cashAvail);                  // what the broker will actually lend on top of cash
  const marginUse=Math.min(marginCap,brokerRoom);
  const pool=freed+cashAvail+marginUse;
  const poolParts=[]; if(cashAvail>0)poolParts.push(fmtD(cashAvail)+' cash'); if(marginUse>0)poolParts.push(fmtD(marginUse)+` margin (≤${fmt(PLAN_MAX_LEVERAGE,1)}×)`);
  const poolInclTxt=poolParts.length?` · incl. ${poolParts.join(' + ')}`:'';
  const poolNote=marginUse>0
    ? ` The pool borrows up to your ${fmt(PLAN_MAX_LEVERAGE,1)}× leverage cap — ${fmtD(marginUse)} of margin (≤ ${fmt((PLAN_MAX_LEVERAGE-1)*100,0)}¢ of debt per $1 of equity) on top of cash. That's leverage: a 10% market drop hits a ${fmt(PLAN_MAX_LEVERAGE,1)}× book ~${fmt(PLAN_MAX_LEVERAGE*10,0)}%. Size to your own risk tolerance.`
    : (cashAvail>0?' The pool is freed cash + idle settled cash — no margin used here.':'');

  // Concrete sell tickets (cash-raising): trims worked into strength, losers exited marketable.
  const sellOrders=[
    ...trims.map(t=>({side:'SELL',sym:t.p.symbol,qty:t.sh,limit:t.p.px,note:'trim to '+fmt(PLAN_SINGLE_CAP*100,0)+'% — GTC limit, sell into strength'})),
    ...harv.map(p=>({side:'SELL',sym:p.symbol,qty:+fmt(p.qty,p.qty<1?3:2),limit:p.px,note:'harvest the loss — marketable exit'}))
  ];

  // Step 2 helpers — ballast (lowest-β held), defensive sleeves, oversold high-conviction add.
  const lowBeta=perSym?enriched.filter(p=>p.val>0&&p.px>0&&perSym[p.symbol]!=null&&perSym[p.symbol]<0.9).map(p=>({p,b:perSym[p.symbol]})).sort((a,b)=>a.b-b.b):[];
  const defensive=enriched.filter(p=>p.val>0&&p.px>0&&(ASSET_MAP[p.symbol]==='Bonds'||ASSET_MAP[p.symbol]==='Gold/Commodities')).sort((a,b)=>b.val-a.val);
  const defName=defensive.length?defensive.slice(0,2).map(p=>p.symbol).join(' / ')+' (held)':'short-duration Treasuries or a defensive sector ETF';
  // Don't pitch adding to a name we're simultaneously trimming for concentration or harvesting (wash-sale).
  const raiseSet=new Set([...trims.map(t=>t.p.symbol),...harv.map(p=>p.symbol)]);
  const addCand=enriched.filter(p=>p.val>=SMALL_THR&&p.px>0&&!raiseSet.has(p.symbol)&&rsiMap[p.symbol]!=null&&rsiMap[p.symbol]<=33&&p.pnlP>-40).sort((a,b)=>rsiMap[a.symbol]-rsiMap[b.symbol])[0]||null;
  // The redeploy's high-conviction sleeve targets the Plan & Picks list directly — but as a SET, not a
  // single name. Up to 3 ideas you're not already over-weight in (and not simultaneously trimming/
  // harvesting), diversified by sector AND correlated cluster, skipping any that would pile onto a cluster
  // already over the cap. PRIMARY = the 3 vetted picks (hand-built levels); when those don't fill the
  // sleeve (held at cap / hot cluster / sector collision), BACKFILL from the scored top-10 candidates
  // (synthesized 50-DMA levels, labelled "screen backfill") rather than dumping the remainder to cash.
  const heldPct={},heldVal={}; enriched.forEach(p=>{ if(p.val>0){ heldPct[p.symbol]=p.pct; heldVal[p.symbol]=p.val; } });
  const clPctOf=(sym)=>{ try{ const c=clusterFor(sym); return c&&clusters[c]?clusters[c].pct:0; }catch(e){ return 0; } };
  const pickPickTickers=new Set(((typeof PICK_PICKS!=='undefined'&&Array.isArray(PICK_PICKS))?PICK_PICKS:[]).map(p=>p&&p.ticker).filter(Boolean));
  const pickAdds=(()=>{
    const out=[],usedSec=new Set();
    const eligible=(ticker,sector)=>{
      if(!ticker)return false;
      if(raiseSet.has(ticker))return false;                                     // #2 — not a name we're raising from
      if(heldPct[ticker]!=null&&heldPct[ticker]>=PLAN_SINGLE_CAP*100)return false; // already at the single-name cap
      if(clPctOf(ticker)>=PLAN_CLUSTER_CAP*100)return false;                     // #2 — would worsen an over-cap cluster
      const sec=String(sector||'').split('·')[0].trim();
      if(sec&&usedSec.has(sec))return false;                                    // #1 — sector-diversify the set
      return true;
    };
    const mark=(sector)=>{ const sec=String(sector||'').split('·')[0].trim(); if(sec)usedSec.add(sec); };
    // Primary: the 3 vetted picks with full hand-built levels.
    const picks=((typeof PICK_PICKS!=='undefined'&&Array.isArray(PICK_PICKS))?PICK_PICKS:[]);
    for(let i=0;i<picks.length&&out.length<3;i++){ const p=picks[i]; if(!p||!p.ticker)continue;
      if(!eligible(p.ticker,p.sector))continue; mark(p.sector); out.push({p,rank:i+1,backfill:false}); }
    // Backfill: only if the vetted picks left the sleeve unfilled — reach into the scored top-10.
    if(out.length<3){ const cands=((typeof PICK_CANDIDATES!=='undefined'&&Array.isArray(PICK_CANDIDATES))?PICK_CANDIDATES:[]);
      for(let i=0;i<cands.length&&out.length<3;i++){ const c=cands[i]; if(!c||!c.ticker)continue;
        if(pickPickTickers.has(c.ticker))continue;                              // already weighed as a top-3 pick
        if(!eligible(c.ticker,c.sector))continue;
        const sp=synthPickFromCandidate(c,smaMap); if(!sp)continue;
        mark(c.sector); out.push({p:sp,rank:c.rank||(i+1),backfill:true}); } }
    return out;
  })();
  // #7 — historical conviction from the graded Track Record, surfaced inline on the redeploy.
  const trk=(typeof picksTrackStats==='function')?picksTrackStats():null;
  // Buy-entry levels anchored to the 50-day average: pullback zone + a starter limit at the live price.
  const anchor=(p)=>{ const s=smaMap[p.symbol]; const px=p.px;
    if(s==null||!isFinite(s)) return {note:`starter limit ≤ ${P(px)}`, zone:`≤ ${P(px)}`};
    if(px<=s) return {note:`below its 50-DMA ${P(s)} — buy ≤ ${P(px)}, a reclaim of ${P(s)} confirms`, zone:`${P(Math.min(px,s*0.98))}–${P(px)}`};
    return {note:`extended above its 50-DMA ${P(s)} — scale: ½ ≤ ${P(px)}, ½ on a dip toward ${P(s)}`, zone:`${P(s)}–${P(px)}`};
  };

  // Step 3 helpers — top holdings, biggest cluster, fragile (highest-β) leg, near-term earnings.
  const top=[...enriched].filter(p=>p.val>0).sort((a,b)=>b.val-a.val);
  const t1=top[0]||{symbol:'—',val:0}, t2=top[1]||{symbol:'—',val:0};
  const t1p=t1.val/eq*100, t2p=t2.val/eq*100;
  const bigCl=Object.entries(clusters).filter(([,c])=>c.matched&&c.matched.length>1).sort((a,b)=>b[1].pct-a[1].pct)[0]||null;
  const fragile=perSym?enriched.filter(p=>p.val>0&&p.pct>=1.5&&perSym[p.symbol]!=null).map(p=>({p,b:perSym[p.symbol]})).sort((a,b)=>b.b-a.b)[0]:null;
  const earnT=[t1,t2].map(t=>({t,e:earningsMap[t.symbol]})).filter(x=>x.e&&x.e.daysAway!=null&&x.e.daysAway<=21).sort((a,b)=>a.e.daysAway-b.e.daysAway);

  el.innerHTML=`
    <div class="box-info" style="border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.5;margin-bottom:12px">A standing playbook — <b>raise cash</b> (harvest losers <i>and</i> right-size any over-weight winner) → <b>redeploy</b> to pull risk down → <b>guardrails</b>. Winners are trimmed only where one name is above <b>${fmt(PLAN_SINGLE_CAP*100,0)}%</b> of equity: position discipline, not a call to sell a good stock.${beta!=null?` Book beta ≈ <b>${fmt(beta,2)}</b> — a 10% market drop ≈ ${fmtP(-10*beta)}.`:''}</div>

    <div class="col-title">1 · Raise cash <span class="card-hint">(≈ ${fmtD(freed)} freed)</span></div>
    <div style="font-size:11.5px;font-weight:700;color:var(--text);opacity:.75;margin:2px 0 6px">Harvest losers${harv.length?` — frees ${fmtD(harvProceeds)}, banks ${fmtD(bankedLoss)} loss`:''}</div>
    ${harv.length?`<table><thead><tr><th>Sell</th><th class="tr">Shares</th><th class="tr">Limit</th><th class="tr">Proceeds</th><th class="tr">Loss banked</th></tr></thead><tbody>${harvRows}<tr style="background:var(--surface-2);font-weight:700"><td>Total</td><td class="tr"></td><td class="tr"></td><td class="tr">${fmtD(harvProceeds)}</td><td class="tr neg">${fmtD(bankedLoss)}</td></tr></tbody></table>`:`<div class="tech-empty">No positions in the red above $${SMALL_THR}.</div>`}
    <div style="font-size:11.5px;font-weight:700;color:var(--text);opacity:.75;margin:12px 0 6px">Right-size winners — any name above ${fmt(PLAN_SINGLE_CAP*100,0)}% of equity</div>
    ${trims.length?`<table><thead><tr><th>Trim</th><th class="tr">Shares</th><th class="tr">Limit</th><th class="tr">Proceeds</th><th class="tr">Realized gain · why now</th></tr></thead><tbody>${trimRows}<tr style="background:var(--surface-2);font-weight:700"><td>Total</td><td class="tr"></td><td class="tr"></td><td class="tr">${fmtD(trimProceeds)}</td><td class="tr ${realizedGain>=0?'pos':'neg'}">${fmtD(realizedGain)}</td></tr></tbody></table>`:`<div class="tech-empty">No single name is above ${fmt(PLAN_SINGLE_CAP*100,0)}% of equity — nothing forced to trim.${top[0]?` Largest is ${t1.symbol} at ${fmt(t1p,1)}%.`:''}</div>`}
    ${trims.length?`<div class="fund-note">Tax netting: the trims realize ≈ <b>${fmtD(realizedGain)}</b> of gains${harv.length?`, offset by the ${fmtD(bankedLoss)} loss banked above → <b>net taxable ≈ ${fmtD(netTaxable)}</b>`:''}. ${harv.length?(netTaxable<0?'The harvest more than covers the gain — the excess loss carries forward. ':'Harvesting alongside the trim is what keeps the tax bill small. ')+'Mind the 30-day wash-sale window on the harvested names. ':'Gains are taxable — favour long-term lots (held &gt; 1yr) or pair with a loss harvest when one appears. '}Not tax advice.</div>`:(harv.length?`<div class="fund-note">Wash-sale: don’t rebuy the harvested names for 30 days. The real win is redeploying the proceeds out of the concentrated book.</div>`:'')}
    ${sellOrders.length?`<div style="margin-top:8px">${chatBtn('plan-sell',planOrdersPrompt(sellOrders,'Raise cash for the redeploy plan — harvest losers + right-size over-weight winners'),'🤖 Build '+(sellOrders.length>1?('these '+sellOrders.length+' sells'):'this sell')+' with Claude')}</div>`:''}

    <div class="col-title" style="margin-top:14px">2 · Redeploy the pool <span class="card-hint">(≈ ${fmtD(pool)} to put to work${poolInclTxt})</span></div>
    ${(()=>{
      if(pool<=0) return `<div class="tech-empty">Nothing freed above and no cash or margin headroom — no redeploy step until Step 1 raises cash.</div>`;
      // Margin clears automatically when Step 1's sells settle — so carve it off the top as already-spent,
      // then split the remainder. Tilt to ballast when beta is high.
      const payDown=onMargin?Math.min(freed,marginAmt):0; // the loan nets down against sale proceeds at the broker
      const rem=pool-payDown;
      const hiBeta=beta!=null&&beta>1.1;
      let wB=hiBeta?0.55:0.45, wD=0.30, wO=hiBeta?0.15:0.25;
      const sz=f=>` <span style="color:#9ca3af">≈ ${fmtD(f)}</span>`;
      const rows=[], buyOrders=[];
      const bar=()=>rows.length?'border-top:1px solid var(--surface-2)':'';
      if(payDown>0) rows.push(`<div style="padding:6px 0"><b style="color:#0969da">After clearing margin</b>${sz(payDown)} — selling above automatically pays your loan down first (it nets against the proceeds at the broker — not a separate order); only the rest below is new buying power.</div>`);
      // Low-beta ballast → concrete buy on the lowest-β held name.
      const bT=lowBeta.length?lowBeta[0].p:null;
      if(bT){ const d=rem*wB, q=Math.floor(d/bT.px), a=anchor(bT); if(q>0){ buyOrders.push({side:'BUY',sym:bT.symbol,qty:q,limit:bT.px,zone:a.zone,note:'low-β ballast'});
        rows.push(`<div style="padding:6px 0;${bar()}"><b style="color:#0969da">Low-beta ballast</b>${sz(d)} — <b>buy ~${q} sh ${bT.symbol}</b> (β ≈ ${fmt(lowBeta[0].b,2)}) · limit ${a.zone} · ${a.note}. Most direct way to pull portfolio beta down.</div>`); }
        else rows.push(`<div style="padding:6px 0;${bar()}"><b style="color:#0969da">Low-beta ballast</b>${sz(d)} — add to ${bT.symbol} (β ≈ ${fmt(lowBeta[0].b,2)}, held). Most direct way to pull beta down.</div>`); }
      else rows.push(`<div style="padding:6px 0;${bar()}"><b style="color:#0969da">Low-beta ballast</b>${sz(rem*wB)} — a broad-market or low-β holding. Most direct way to pull portfolio beta down.</div>`);
      // Defensive income → concrete buy on the largest held bond/gold sleeve.
      const dT=defensive.length?defensive[0]:null;
      if(dT){ const d=rem*wD, q=Math.floor(d/dT.px), a=anchor(dT); if(q>0){ buyOrders.push({side:'BUY',sym:dT.symbol,qty:q,limit:dT.px,zone:a.zone,note:'defensive sleeve'});
        rows.push(`<div style="padding:6px 0;border-top:1px solid var(--surface-2)"><b style="color:#0969da">Defensive income</b>${sz(d)} — <b>buy ~${q} sh ${dT.symbol}</b> · limit ${a.zone}. Ballast + yield, low correlation to the growth book.</div>`); }
        else rows.push(`<div style="padding:6px 0;border-top:1px solid var(--surface-2)"><b style="color:#0969da">Defensive income</b>${sz(d)} — ${defName}. Ballast + yield, low correlation to the growth book.</div>`); }
      else rows.push(`<div style="padding:6px 0;border-top:1px solid var(--surface-2)"><b style="color:#0969da">Defensive income</b>${sz(rem*wD)} — ${defName}. Ballast + yield, low correlation to the growth book.</div>`);
      // High-conviction sleeve → redeploy across today's top picks (#1–#3 from pickAdds), each with its
      // OWN entry/stop (read from pickLevels so the plan and the card never disagree), sized risk-based
      // (#3, 1% of book at the stop) and clamped so an add can't push a name past the single-name cap and
      // can't outrun the bucket it draws on. Earnings inside the swing window get flagged (#4). Falls back
      // to an oversold held name, then cash.
      const convBucket=rem*wO;
      const riskBudget=totalVal*0.01; // 1% of book at risk per add — matches the pick-card buy ticket
      const planAdds=[];              // {sym,px,zone,limit,stop,tp1,rank,shares,dollars,why,erWarn}
      if(pickAdds.length){
        const per=convBucket/pickAdds.length;
        for(const x of pickAdds){ const p=x.p, lv=pickLevels(p), px=lv.px; if(!(px>0))continue;
          const room=(PLAN_SINGLE_CAP*eq)-(heldVal[p.ticker]||0);                 // $ before this name hits the cap
          const capSh=Math.floor(Math.max(0,room)/px);
          const bucketSh=Math.floor(per/px);
          const riskSh=(lv.stop>0&&px>lv.stop)?Math.floor(riskBudget/(px-lv.stop)):bucketSh;
          const q=Math.max(0,Math.min(bucketSh,capSh,riskSh));                    // #3 — risk-based AND cap-aware AND pool-bounded
          const er=(typeof azEarn==='function')?azEarn(p.ticker):null;           // #4 — earnings inside the swing window
          const erWarn=(er&&er.days!=null&&er.days>=0&&er.days<=14)?` <span style="color:#b45309">⚠️ earnings in ${er.days===0?'<1d':er.days+'d'} — size for the gap or wait for the print</span>`:'';
          const why=x.backfill
            ? `<b>#${x.rank} screen</b> <span style="color:#9ca3af">(backfill)</span>${p.rsi!=null?' · RSI '+p.rsi:''} — synth entry ${lv.zone}, stop ${P(lv.stop)}. 50-DMA estimate, not a hand-built setup.`
            : `<b>#${x.rank} pick</b>${p.signal?' · '+p.signal:''} — entry ${lv.zone}${lv.tp1?`, target $${lv.tp1}`:''}, stop ${P(lv.stop)}`;
          planAdds.push({sym:p.ticker,px,zone:lv.zone,limit:lv.limit,stop:lv.stop,tp1:lv.tp1,rank:x.rank,backfill:x.backfill,shares:q,dollars:q*px,erWarn,why});
        }
      } else if(addCand){ const px=addCand.px, a=anchor(addCand), s=smaMap[addCand.symbol];
        const stop=(s!=null&&isFinite(s)&&s<px)?Math.min(s*0.97,px*0.93):px*0.90;
        const q=Math.floor(convBucket/px);
        planAdds.push({sym:addCand.symbol,px,zone:a.zone,limit:px,stop,tp1:null,rank:null,shares:q,dollars:q*px,erWarn:'',
          why:`oversold (RSI ${fmt(rsiMap[addCand.symbol],0)}) · limit ${a.zone}, stop ${P(stop)} — a dip-buy rather than parking it all in cash`});
      }
      const deployed=planAdds.reduce((s,a)=>s+a.dollars,0);
      // #5 — stash the plan's sized PRIMARY picks (not synth backfills, which have no Top-3 card) so the
      // cards can badge "the plan picked this"; repaint them.
      try{ const m={}; planAdds.forEach(a=>{ if(a.rank&&!a.backfill&&a.shares>0)m[a.sym]={rank:a.rank,shares:a.shares,dollars:a.dollars}; }); window.__PLAN_ADDS=m;
        if(document.getElementById('picks-cards')&&typeof renderPicksCards==='function')renderPicksCards(); }catch(e){}
      if(planAdds.length){
        const nReal=planAdds.filter(a=>a.rank&&!a.backfill).length, nBack=planAdds.filter(a=>a.backfill).length;
        const convL=(trk&&trk.hitRate!=null&&(trk.wins+trk.losses)>=3)?` <span style="color:#9ca3af">· track record: ${trk.hitRate}% hit TP1+${trk.avgRet!=null?', avg '+(trk.avgRet>=0?'+':'')+fmt(trk.avgRet,1)+'%':''} (${trk.wins+trk.losses} resolved)</span>`:'';
        const scope=planAdds.length>1?`split across ${planAdds.length} ideas`:`into a single idea`;
        const backNote=nBack>0?` <span style="color:#9ca3af">(${nReal} vetted pick${nReal===1?'':'s'}${nBack?`, ${nBack} screen backfill from the top 10`:''})</span>`:'';
        const hdr=`<div style="padding:6px 0;border-top:1px solid var(--surface-2)"><b style="color:#0969da">High-conviction add${planAdds.length>1?'s':''}</b>${sz(convBucket)} — ${scope}${backNote}${convL}:</div>`;
        const items=planAdds.map(a=>{ const lbl=(a.rank&&!a.backfill)?`<span class="dp-link" onclick="jumpToPick('${a.sym}')">${a.sym}</span>`:a.sym;
          return `<div style="padding:5px 0 5px 10px;font-size:12px;line-height:1.45;border-top:1px dashed var(--surface-2)">${a.shares>0?`<b>buy ~${a.shares} sh ${lbl}</b> <span style="color:#9ca3af">≈ ${fmtD(a.dollars)}</span>`:`<b>${lbl}</b> <span style="color:#9ca3af">(no size — already at your cap / risk budget)</span>`} · ${a.why}${a.erWarn}</div>`; }).join('');
        rows.push(hdr+items);
        planAdds.forEach(a=>{ if(a.shares>0)buyOrders.push({side:'BUY',sym:a.sym,qty:a.shares,limit:a.limit,zone:a.zone,stop:a.stop,note:a.backfill?('screen backfill · #'+a.rank+' of top 10'):a.rank?('high-conviction add · #'+a.rank+' pick'):'oversold high-conviction add'}); });
        const leftover=convBucket-deployed;
        if(leftover>convBucket*0.15) rows.push(`<div style="padding:5px 0 5px 10px;font-size:11.5px;color:#9ca3af;border-top:1px dashed var(--surface-2)">Cap/risk limits leave ≈ ${fmtD(leftover)} of this sleeve undeployed — hold as cash for pullbacks.</div>`);
      } else {
        try{ window.__PLAN_ADDS={}; }catch(e){}
        rows.push(`<div style="padding:6px 0;border-top:1px solid var(--surface-2)"><b style="color:#0969da">Cash cushion</b>${sz(convBucket)} — ${onMargin?'hold against the margin; dry powder for pullbacks.':'dry powder for pullbacks and to stay nimble.'}</div>`);
      }
      const buyBtn=buyOrders.length?`<div style="margin-top:8px">${chatBtn('plan-buy',planOrdersPrompt(buyOrders,'Redeploy the freed cash into ballast / defensive / high-conviction names'),'🤖 Build '+(buyOrders.length>1?('these '+buyOrders.length+' buys'):'this buy')+' with Claude')}</div>`:'';
      return `<div style="font-size:12.5px;color:var(--text);opacity:.85;line-height:1.5">${rows.join('')}<div class="fund-note">${payDown>0?'Margin paid down first, then a ':'A '}${hiBeta?'beta-tilted':'balanced'} split of the remaining ${fmtD(rem)}. Buys are sized from each bucket at the live price; the 50-day average is the pullback anchor.${poolNote} Indicative — re-check the live mark and your buying power before each fill.</div>${buyBtn}</div>`;
    })()}

    <div class="col-title" style="margin-top:14px">3 · Guardrails <span class="card-hint">(standing trim &amp; stop rules)</span></div>
    <div style="font-size:12.5px;color:var(--text);opacity:.85;line-height:1.55">
      <div style="padding:4px 0">▸ Any one name tops <b>${fmt(PLAN_SINGLE_CAP*100,0)}%</b> of equity → trim the excess (Step 1b sizes it) <span style="color:#9ca3af">(now ${t1.symbol} ${fmt(t1p,1)}% / ${t2.symbol} ${fmt(t2p,1)}%)</span>.</div>
      ${bigCl?`<div style="padding:4px 0">▸ <b>${bigCl[0]}</b> cluster tops <b>${fmt(PLAN_CLUSTER_CAP*100,0)}%</b> combined → de-risk across the group <span style="color:#9ca3af">(now ${fmt(bigCl[1].pct,1)}%)</span>.</div>`:''}

/* ═══ Agentic Portfolio (the recommended portfolio for the ••••3900 cash account) ═══

   (top scored picks ∪ mega-cap leaders ∪ SPY/QQQ index core ∪ whatever ••••3900 already holds —
   the margin account is ignored), sector-diversified + conviction-weighted, capped at

    if(q){ const p=parseFloat(q.last_extended_hours_trade_price||q.last_trade_price||q.ask_price||q.mark_price||q.adjusted_previous_close||0)||0; if(p>0)return p; }

    const tsum=chosen.reduce((s,x)=>s+x.tgt,0)||1; chosen.forEach(x=>{ x.tgt=x.tgt/tsum*100; });

    if(pool.has(t)){ const e=pool.get(t); if(!e.kind)e.kind='pick'; if(comp!=null)e.score=Math.max(e.score,comp); }

  // ── render ──

/* ═══ Holdings heatmap (treemap) ═══
   Tiles sized by position value, colored by day move or total P&L. */
function squarify(items, x, y, w, h){
  /* items: [{value, ...}] · returns [{d, x, y, w, h}] in the same px coords. */
  const rects=[]; const data=items.slice().filter(d=>d.value>0).sort((a,b)=>b.value-a.value);
  const sum=data.reduce((s,d)=>s+d.value,0); if(sum<=0||w<=0||h<=0) return rects;
  const scale=(w*h)/sum; const nodes=data.map(d=>({d, area:d.value*scale}));
  let X=x,Y=y,W=w,H=h;
  function worst(row, side){ let s=0,mn=Infinity,mx=0; for(const r of row){ s+=r.area; if(r.area<mn)mn=r.area; if(r.area>mx)mx=r.area; } return Math.max((side*side*mx)/(s*s),(s*s)/(side*side*mn)); }
  let i=0;
  while(i<nodes.length){
    const side=Math.min(W,H); let row=[nodes[i]]; let j=i+1;
    while(j<nodes.length){ const test=row.concat(nodes[j]); if(worst(test,side)<=worst(row,side)){ row=test; j++; } else break; }
    const rowArea=row.reduce((s,r)=>s+r.area,0); const thick=rowArea/side;
    if(W>=H){ let oy=Y; for(const r of row){ const rh=r.area/thick; rects.push({d:r.d,x:X,y:oy,w:thick,h:rh}); oy+=rh; } X+=thick; W-=thick; }
    else { let ox=X; for(const r of row){ const rw=r.area/thick; rects.push({d:r.d,x:ox,y:Y,w:rw,h:thick}); ox+=rw; } Y+=thick; H-=thick; }
    i=j;
  }
  return rects;
}
function hmColor(pct, div, gold){
  if(pct==null||isNaN(pct)) return gold?'#2a2114':'#475569';
  const t=Math.max(-1,Math.min(1,pct/div)); const mag=Math.abs(t);
  const l=gold?(26+mag*26):(30+mag*22); const s=gold?88:60; const h=pct>=0?(gold?158:152):(gold?342:356);
  return 'hsl('+h+' '+s+'% '+l+'%)';
}

/* ═══ Risk-adjusted metrics (volatility · Sharpe · max drawdown), YTD annualized ═══ */
function computeRiskMetrics(histMap, enriched, syms, macro){
  const wsyms=syms.filter(s=>histMap[s]&&histMap[s].length>20);
  const wmap={}; let wsum=0;
  for(const s of wsyms){ const p=enriched.find(e=>e.symbol===s); if(p&&p.val>0){ wmap[s]=p.val; wsum+=p.val; } }
  const keys=Object.keys(wmap); if(wsum<=0||!keys.length) return null;
  let minLen=Infinity; for(const s of keys) minLen=Math.min(minLen,histMap[s].length);
  if(!isFinite(minLen)||minLen<25) return null;
  const dr=new Array(minLen-1).fill(0);
  for(const s of keys){ const ser=histMap[s].slice(-minLen); const w=wmap[s]/wsum; for(let i=1;i<minLen;i++){ dr[i-1]+=w*(ser[i].c/ser[i-1].c-1); } }
  const N=dr.length; const mean=dr.reduce((a,b)=>a+b,0)/N;
  let v=0; for(const x of dr)v+=(x-mean)*(x-mean); v/=N; const sd=Math.sqrt(v);
  const volAnn=sd*Math.sqrt(252)*100, retAnn=mean*252*100;
  const rf=(macro&&macro.tenYrYield)?macro.tenYrYield:4.3;
  const sharpe=volAnn>0?(retAnn-rf)/volAnn:null;
  let cum=1,peak=1,mdd=0; for(const x of dr){ cum*=(1+x); if(cum>peak)peak=cum; const d=cum/peak-1; if(d<mdd)mdd=d; }
  const eq=enriched.reduce((s,p)=>s+Math.max(p.val,0),0)||1;
  return { vol:volAnn, sharpe, maxDD:mdd*100, retAnn, cov:wsum/eq*100 };
}

/* Make every card collapsible (cards rendered later are caught via MutationObserver). */
(function(){
  function enhance(card){
    var title=card.querySelector(':scope > .card-title');
    if(!title || title.dataset.coll) return;
    title.dataset.coll='1';
    if(title.classList.contains('collapsible')) return; // already wired (has its own toggleSection)
    var body=document.createElement('div'); body.className='card-body';
    var n=title.nextSibling; while(n){ var nx=n.nextSibling; body.appendChild(n); n=nx; }
    card.appendChild(body);
    if(!title.querySelector('.chevron')){ var ch=document.createElement('span'); ch.className='chevron'; ch.textContent='▼'; title.appendChild(ch); }
    title.classList.add('collapsible');
    title.addEventListener('click',function(e){
      // Only a bare-header tap collapses. Ignore taps on interactive controls that live in the
      // header (e.g. the heatmap "Day / vs S&P YTD" toggles) — otherwise one tap both flips the
      // toggle AND collapses the card.
      if(e.target.closest('button, a, select, input, label')) return;
      var hide=body.style.display!=='none'; body.style.display=hide?'none':'';
      var c=title.querySelector('.chevron'); if(c)c.style.transform=hide?'rotate(-90deg)':'';
    });
  }
  // Wrap any wide table in a horizontal-scroll container so it never spills the page.
  function wrapTables(root){ try{ (root||document).querySelectorAll('table').forEach(function(t){
    var p=t.parentElement; if(!p||p.dataset.tw)return;
    if((p.style&&p.style.overflowX==='auto'))return;
    var w=document.createElement('div'); w.dataset.tw='1'; w.style.overflowX='auto'; w.style.webkitOverflowScrolling='touch';
    p.insertBefore(w,t); w.appendChild(t);
  }); }catch(e){} }
  function scan(root){ try{ (root||document).querySelectorAll('.card').forEach(enhance); wrapTables(root); }catch(e){} }
  function start(){
    scan(document);
    try{
      var mo=new MutationObserver(function(muts){
        for(var i=0;i<muts.length;i++){ var a=muts[i].addedNodes;
          for(var j=0;j<a.length;j++){ var nd=a[j]; if(!nd||nd.nodeType!==1)continue;
            if(nd.classList&&nd.classList.contains('card'))enhance(nd);
            if(nd.querySelectorAll)nd.querySelectorAll('.card').forEach(enhance); }
          wrapTables(document); }
      });
      ['page-portfolio','page-markets','page-picks','page-options','page-analyze'].forEach(function(id){ var el=document.getElementById(id); if(el)mo.observe(el,{childList:true,subtree:true}); });
    }catch(e){}
  }
  if(document.readyState!=='loading')start(); else document.addEventListener('DOMContentLoaded',start);
})();

/* Per-page quick-nav: a chip row at the top of each page listing every card's title.
   Tap a chip to (expand if collapsed and) smooth-scroll to that card. Rebuilds itself
   when a page's cards change (debounced), so dynamic pages like Analyze stay in sync. */
(function(){
  var PAGES=['page-portfolio','page-markets','page-picks','page-options','page-analyze'];
  var NAVSEQ=0; // globally-unique card ids so re-renders never collide with stale ids
  function titleOf(card){
    var t=card.querySelector(':scope > .card-title'); if(!t)return null;
    var c=t.cloneNode(true);
    c.querySelectorAll('.chevron,.card-hint').forEach(function(x){ x.remove(); });
    var s=(c.textContent||'').replace(/\s+/g,' ').trim();
    return s||null;
  }
  // Top offset to clear the sticky tab bar (which wraps to 2 rows on mobile) — measured live.
  function topOffset(){
    var tb=document.querySelector('.tabbar');
    if(tb){ var r=tb.getBoundingClientRect(); if(r.height>0)return Math.max(0,r.bottom)+8; }
    return 96;
  }
  function jump(id){
    var card=document.getElementById(id); if(!card)return;
    var body=card.querySelector(':scope > .card-body');
    if(body&&body.style.display==='none'){ body.style.display=''; var ch=card.querySelector(':scope > .card-title .chevron'); if(ch)ch.style.transform=''; }
    var y=card.getBoundingClientRect().top+(window.pageYOffset||document.documentElement.scrollTop||0)-topOffset();
    if(y<0)y=0;
    try{ window.scrollTo({top:y,behavior:'smooth'}); }catch(e){ window.scrollTo(0,y); }
    var prev=card.style.boxShadow; card.style.transition='box-shadow .3s'; card.style.boxShadow='0 0 0 2px #6366f1';
    setTimeout(function(){ card.style.boxShadow=prev; },800);
  }
  window.__navJump=jump;
  function build(pageEl){
    var all=pageEl.querySelectorAll('.card'), cards=[], i;
    for(i=0;i<all.length;i++){ var ti=titleOf(all[i]); if(ti)cards.push({card:all[i],title:ti}); }
    // Change-detect on the actual card ELEMENTS (not just titles) so a re-render — same
    // titles, brand-new nodes — still rebuilds the chips and re-points them.
    var prev=pageEl.__navCards||[], same=(prev.length===cards.length);
    if(same)for(i=0;i<cards.length;i++){ if(prev[i].card!==cards[i].card||prev[i].title!==cards[i].title){ same=false; break; } }
    if(same)return;
    pageEl.__navCards=cards;
    var nav=pageEl.querySelector(':scope > .card-nav');
    if(cards.length<2){ if(nav)nav.remove(); return; } // not worth a nav for 0–1 cards
    if(!nav){ nav=document.createElement('div'); nav.className='card-nav'; pageEl.insertBefore(nav,pageEl.firstChild); }
    var html='';
    for(i=0;i<cards.length;i++){ var c=cards[i]; c.card.id='navc-'+(++NAVSEQ); // fresh unique id every build
      html+='<button class="card-nav-chip" onclick="__navJump(\''+c.card.id+'\')">'+c.title.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</button>'; }
    nav.innerHTML=html;
  }
  function buildAll(){ PAGES.forEach(function(id){ var el=document.getElementById(id); if(el)build(el); }); }
  function start(){
    buildAll();
    try{
      var t=null, schedule=function(){ clearTimeout(t); t=setTimeout(buildAll,150); };
      var mo=new MutationObserver(function(muts){
        for(var i=0;i<muts.length;i++){ var tgt=muts[i].target;
          if(tgt&&tgt.closest&&tgt.closest('.card-nav'))continue; // ignore our own writes
          schedule(); break; }
      });
      PAGES.forEach(function(id){ var el=document.getElementById(id); if(el)mo.observe(el,{childList:true,subtree:true}); });
    }catch(e){}
  }
  if(document.readyState!=='loading')start(); else document.addEventListener('DOMContentLoaded',start);
})();

/* ── payoff-at-expiration diagram ── */
function payoffSeries(spec){
  // Normalize any structure to a list of option legs (+ optional stock leg) so one routine draws
  // single-leg positions, covered calls, debit spreads and collars alike.
  const contracts=spec.contracts||1; let legs, stock=null;
  if(Array.isArray(spec.legs)&&spec.legs.length){
    legs=spec.legs.map(function(l){return {type:l.type,side:l.side,strike:+l.strike,prem:+l.prem||0,qty:l.qty||1};});
    if(spec.stock&&spec.stock.shares)stock={shares:spec.stock.shares,basis:+spec.stock.basis};
  } else {
    legs=[{type:spec.type,side:spec.side,strike:+spec.strike,prem:+spec.prem||0,qty:contracts}];
    if(spec.covered&&spec.type==='call'&&spec.side==='short'&&spec.costBasis!=null)stock={shares:100*contracts,basis:+spec.costBasis};
  }
  const strikes=legs.map(function(l){return l.strike;}).filter(function(s){return s>0;});
  const ref=(spec.px&&spec.px>0)?spec.px:(strikes[0]||1);
  const span=strikes.concat(ref);
  const lo=Math.max(0.01,Math.min.apply(null,span)*0.55), hi=Math.max.apply(null,span)*1.45, N=30;
  const labels=[], data=[];
  for(let i=0;i<=N;i++){ const S=lo+(hi-lo)*i/N; let pl=0;
    legs.forEach(function(l){ const intr=l.type==='call'?Math.max(S-l.strike,0):Math.max(l.strike-S,0); const m=100*l.qty;
      pl+=l.side==='long'?(intr-l.prem)*m:(l.prem-intr)*m; });
    if(stock)pl+=(S-stock.basis)*stock.shares;
    labels.push('$'+(S>=100?Math.round(S):S.toFixed(1))); data.push(+pl.toFixed(0));
  }
  return {labels,data};
}

  const sel=withE.filter(x=>x.e.days>=0).sort((a,b)=>a.e.days-b.e.days)[0]||withE.sort((a,b)=>b.e.days-a.e.days)[0];
  if(!sel){ if(card)card.style.display='none'; return; }
  if(card)card.style.display='';
  const {p,rank,e}=sel; const dt=new Date(e.date+'T00:00:00Z');
  const long=dt.toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',timeZone:'UTC'});

  const whenT=(e.when==='amc'||e.when==='post')?' after the close':(e.when==='bmo'||e.when==='pre')?' before the open':'';

  const thesis=Array.isArray(p.thesis)?p.thesis:[];
  const risk=thesis.find(t=>/^risk/i.test(t)); const bull=thesis.filter(t=>!/^risk/i.test(t)).slice(0,3);
  const tile=(l,v)=>`<div class="pk-m"><div class="pk-m-l">${l}</div><div class="pk-m-v">${v}</div></div>`;

/* Numeric value for a sortable column (parses the formatted strings the row carries). */
function pickSortVal(c,key){
  const liveRsi=_picksRSI[c.ticker]!=null?_picksRSI[c.ticker]:c.rsi;
  const liveP=(_picksLive[c.ticker]&&_picksLive[c.ticker].price)||c.price;
  switch(key){
    case 'ticker': return c.ticker;
    case 'price': return liveP;
    case 'rsi': return liveRsi;
    case 'fwdPE': { const n=parseFloat(c.fwdPE); return isFinite(n)?n:1e9; }
    case 'rr': { const n=parseFloat(c.rr); return isFinite(n)?n:-1; }
    case 'rev': { const n=parseFloat(String(c.revGrowth).replace('+','')); return isFinite(n)?n:-1e9; }
    case 'tech': return c.tech; case 'fund': return c.fund; case 'social': return c.social!=null?c.social:5;
    case 'rank': return c.rank;
    default: return c.composite;
  }
}

    const minP=Math.min(...prices)*0.97, maxP=Math.max(...prices)*1.02;

/* Grade one archived pick on a CLOSING basis since its scan date: walk daily closes in order — a
   close at/above a target counts as a hit (TP2 wins outright; TP1 banks then keeps watching), a
   close at/below the stop is a stop-out. Current return is planned entry → latest price. */
function gradePick(pk,bars,live,ts){
  const entry=pk.entryRef||pk.basePrice, tp1=pk.tp1, tp2=pk.tp2, sl=pk.sl;
  const series=(bars||[]).filter(b=>!ts||b.t>=ts).map(b=>b.c).filter(c=>c>0);
  let status='OPEN',hitT1=false;
  for(const c of series){
    if(sl!=null&&c<=sl){ status=hitT1?'TP1':'STOPPED'; break; }
    if(tp2!=null&&c>=tp2){ status='TP2'; break; }
    if(tp1!=null&&c>=tp1){ hitT1=true; status='TP1'; }
  }
  const cur=live||(series.length?series[series.length-1]:null)||pk.basePrice;
  const ret=entry?((cur-entry)/entry*100):null;
  return {status,ret,cur,entry};
}
/* Aggregate grade stats across ALL archived picks (Track Record card's tiles + the Action Plan's
   conviction line both read this, reusing gradePick so the two surfaces can't diverge). */
function picksTrackStats(){
  const hist=Array.isArray(PICK_HISTORY)?PICK_HISTORY.filter(h=>h&&Array.isArray(h.picks)&&h.picks.length):[];
  let wins=0,losses=0,open=0,retSum=0,retN=0;
  for(const h of hist)for(const pk of h.picks){
    const g=gradePick(pk,_picksHistBars[pk.ticker]||[],(_picksLive[pk.ticker]&&_picksLive[pk.ticker].price)||null,h.ts);
    if(g.status==='TP1'||g.status==='TP2')wins++; else if(g.status==='STOPPED')losses++; else open++;
    if(g.ret!=null){retSum+=g.ret;retN++;}
  }
  return {wins,losses,open,hitRate:(wins+losses)>0?Math.round(wins/(wins+losses)*100):null,avgRet:retN?retSum/retN:null};
}
function renderPicksTrack(){
  const el=document.getElementById('picks-track'); if(!el)return;
  const hist=Array.isArray(PICK_HISTORY)?PICK_HISTORY.filter(h=>h&&Array.isArray(h.picks)&&h.picks.length):[];
  if(!hist.length){
    el.innerHTML='<div class="fund-note" style="opacity:.85">Building a track record. Once the next scan replaces today’s picks, the outgoing set is archived here and graded against actual prices — hit TP1/TP2, stopped, or still open — with a running hit-rate.</div>';
    return;
  }
  let wins=0,losses=0,open=0,retSum=0,retN=0;
  const groups=hist.slice(0,8).map(h=>{
    const rows=h.picks.map(pk=>{
      const g=gradePick(pk,_picksHistBars[pk.ticker]||[],(_picksLive[pk.ticker]&&_picksLive[pk.ticker].price)||null,h.ts);
      if(g.status==='TP1'||g.status==='TP2')wins++; else if(g.status==='STOPPED')losses++; else open++;
      if(g.ret!=null){retSum+=g.ret;retN++;}
      const badge={TP2:['#065f46','#d1fae5','✅ TP2'],TP1:['#065f46','#d1fae5','✅ TP1'],STOPPED:['#991b1b','#fee2e2','⛔ Stopped'],OPEN:['#475569','#e2e8f0','• Open']}[g.status];
      const rc=g.ret==null?'#6b7280':g.ret>=0?'#10b981':'#ef4444';
      return '<div class="harv-line"><span style="white-space:nowrap"><b>'+pk.ticker+'</b> <span style="font-size:10px;color:#9ca3af">'+(pk.signal||'')+'</span></span>'
        +'<span style="flex:1;text-align:right;margin-left:8px;font-size:11.5px">'
          +'<span class="drift-flag" style="background:'+badge[1]+';color:'+badge[0]+'">'+badge[2]+'</span> '
          +'<b style="color:'+rc+'">'+(g.ret==null?'—':(g.ret>=0?'+':'')+fmt(g.ret,1)+'%')+'</b>'
          +'<div style="font-size:10px;color:#9ca3af">entry ~$'+fmt(g.entry)+' → $'+fmt(g.cur)+' · TP1 $'+(pk.tp1!=null?pk.tp1:'—')+' · stop $'+(pk.sl!=null?pk.sl:'—')+'</div>'
        +'</span></div>';
    }).join('');
    return '<div style="margin-bottom:10px"><div style="font-size:11px;color:#9ca3af;font-weight:600;margin-bottom:3px">'+(h.date||h.ts)+'</div>'+rows+'</div>';
  }).join('');
  const hitRate=(wins+losses)>0?Math.round(wins/(wins+losses)*100):null;
  const avgRet=retN?retSum/retN:null;
  const stat=(l,v,c)=>'<div class="pk-m"><div class="pk-m-l">'+l+'</div><div class="pk-m-v" style="color:'+(c||'var(--text)')+'">'+v+'</div></div>';
  el.innerHTML='<div class="pk-metrics" style="grid-template-columns:repeat(3,1fr);margin:2px 0 12px">'
      +stat('Hit rate',hitRate==null?'—':hitRate+'%',hitRate!=null&&hitRate>=50?'#065f46':'#92400e')
      +stat('Avg return',avgRet==null?'—':(avgRet>=0?'+':'')+fmt(avgRet,1)+'%',avgRet!=null&&avgRet>=0?'#065f46':'#991b1b')
      +stat('Resolved',wins+'W · '+losses+'L · '+open+' open','var(--text)')
    +'</div>'+groups
    +'<div class="fund-note">Graded on a <b>closing basis</b> since each scan date — a target counts if a daily close reached it; stopped if a close hit the stop. Assumes entry at the planned level; current return is entry → latest. Past results don’t guarantee anything.</div>';
}

/* Risk-on/off composite from the day moves of the gauges we already fetch: equities + high-yield

function riskAppetiteBanner(qMap){
  const g=s=>(qMap[s]&&qMap[s].chg!=null)?qMap[s].chg:null;
  const spy=g('SPY'),hyg=g('HYG'),ibit=g('IBIT'),gld=g('GLD'),tlt=g('TLT');
  let tilt=0,n=0; const add=(v,w)=>{ if(v!=null){ tilt+=w*v; n++; } };
  add(spy,1); add(hyg,1); add(ibit,0.5); add(gld,-1); add(tlt,-1);
  if(n<3)return '';
  const lab=tilt>0.4?'RISK-ON':tilt<-0.4?'RISK-OFF':'NEUTRAL';
  const col=tilt>0.4?'#10b981':tilt<-0.4?'#ef4444':'#f59e0b';
  const f=v=>(v>=0?'+':'')+fmt(v,1)+'%'; const parts=[];
  if(spy!=null)parts.push('S&P '+f(spy)); if(hyg!=null)parts.push('HY credit '+f(hyg));
  if(gld!=null)parts.push('gold '+f(gld)); if(tlt!=null)parts.push('20Y+ '+f(tlt));
  const pos=Math.max(-1,Math.min(1,tilt/2)); const pct=((pos+1)/2*100).toFixed(0);
  return `<div style="background:var(--surface-2);border-radius:10px;padding:10px 12px;margin-bottom:10px">

    <div style="position:relative;height:7px;border-radius:4px;background:linear-gradient(90deg,#ef4444,#f59e0b,#10b981)"><div style="position:absolute;top:-3px;left:calc(${pct}% - 6px);width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid ${col};box-shadow:0 1px 3px rgba(0,0,0,.3)"></div></div>
    <div style="font-size:10.5px;color:#9ca3af;margin-top:7px">Tilt from ${parts.join(' · ')} — equities/credit risk-on vs gold/long-bonds risk-off.</div>
  </div>`;
}

      const rs=(rsMode&&ytd!=null)?ytd-spyYtd:null; const metric=rsMode?rs:chg;
      const hi=rsMode?5:1.5, mid=rsMode?1:0.5, loN=rsMode?-1:-0.5, loNN=rsMode?-5:-1.5;
      const edge=metric==null?'#e5e7eb':metric>=hi?'#065f46':metric>=mid?'#10b981':metric>=0?'#86efac':metric>loN?'#fca5a5':metric>loNN?'#ef4444':'#991b1b';
      const big=metric==null?'—':(metric>=0?'+':'')+fmt(metric,1)+'%';
      const sub=rsMode?`YTD ${pf(ytd)} · day ${chg==null?'—':(chg>=0?'+':'')+fmt(chg,1)+'%'}`:`YTD ${pf(ytd)} · 5Y ${pf(fv)}`;
      return `<div class="sec-cell" style="background:var(--surface-2);border:2.5px solid ${edge};color:var(--text)"><div style="font-size:11px;font-weight:800">${i.s}</div><div style="font-size:9.5px;color:#6b7280">${i.n}</div><div style="font-size:13px;font-weight:800;margin-top:2px;color:${pcol(metric)}">${big}</div><div style="font-size:8.5px;color:#6b7280;margin-top:3px;line-height:1.3">${sub}</div></div>`; }).join('');
    let head;
    if(rsMode){ const ranked=MKT_SECTORS.map(i=>({i,rs:(qMap[i.s]&&qMap[i.s].ytd!=null)?qMap[i.s].ytd-spyYtd:null})).filter(x=>x.rs!=null).sort((a,b)=>b.rs-a.rs);
      const lead=ranked.slice(0,2).map(x=>x.i.s).join(', '); const lag=ranked.slice(-2).reverse().map(x=>x.i.s).join(', '); const above=ranked.filter(x=>x.rs>0).length;
      head=`<div style="font-size:12px;color:#6b7280;margin-bottom:10px"><b>${above} of ${ranked.length}</b> sectors beating the S&P YTD (${pf(spyYtd)}) — Leaders <b style="color:#10b981">${lead||'—'}</b> · Laggards <b style="color:#ef4444">${lag||'—'}</b>.</div>`;
    } else { const green=MKT_SECTORS.filter(i=>qMap[i.s]&&qMap[i.s].chg>0).length;
      head=`<div style="font-size:12px;color:#6b7280;margin-bottom:10px"><b>${green} of ${MKT_SECTORS.length}</b> sectors green today — ${green>=8?'broad risk-on':green>=5?'mixed tape':'risk-off / defensive'}.</div>`; }
    sec.innerHTML=head+`<div class="sec-grid">${cells}</div>`;
    const hint=document.getElementById('sec-hint'); if(hint)hint.textContent=rsMode?'(relative strength vs S&P YTD)':'(today · SPDR sectors)';
  }
}

function renderMktChart(h){ const c=document.getElementById('mkt-chart'); if(!c||!h.SPY||h.SPY.length<2)return; const norm=a=>{const c0=a[0].c;return a.map(b=>(b.c/c0-1)*100);}; const ax=h.SPY.map(b=>b.t); const ds=[{label:'US (S&P 500)',data:norm(h.SPY),borderColor:'#6366f1',borderWidth:2,pointRadius:0,tension:0.15}]; if(h.EFA&&h.EFA.length>1)ds.push({label:'Intl Developed (EFA)',data:norm(h.EFA),borderColor:'#10b981',borderWidth:2,pointRadius:0,tension:0.15}); if(h.EEM&&h.EEM.length>1)ds.push({label:'Emerging (EEM)',data:norm(h.EEM),borderColor:'#f59e0b',borderWidth:2,pointRadius:0,tension:0.15}); new Chart(c,{type:'line',data:{labels:ax,datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,labels:{boxWidth:12,font:{size:11},color:chTick()}},tooltip:{callbacks:{label:x=>' '+x.dataset.label+': '+(x.parsed.y>=0?'+':'')+x.parsed.y.toFixed(1)+'%'}}},scales:{x:{ticks:{maxTicksLimit:6,font:{size:10},color:chTick()},grid:{display:false}},y:{ticks:{callback:v=>v+'%',font:{size:10},color:chTick()},grid:{color:chGrid()}}}}}); }

function renderMktVsStats(h,mo){
  const el=document.getElementById('mkt-vs-stats'); if(!el)return;
  const series=[{k:'SPY',n:'US (S&P 500)',c:'#6366f1'},{k:'EFA',n:'Intl Developed',c:'#10b981'},{k:'EEM',n:'Emerging',c:'#f59e0b'}];
  const ret=a=>(a&&a.length>1&&a[0].c>0)?((a[a.length-1].c/a[0].c-1)*100):null;
  const pf=v=>v==null?'—':(v>=0?'+':'')+fmt(v,1)+'%', pc=v=>v==null?'#9ca3af':v>=0?'#10b981':'#ef4444';
  el.innerHTML='<div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-top:12px">'+series.map(s=>{
    const ytd=ret(h&&h[s.k]), fv=ret(mo&&mo[s.k]);
    return '<div style="background:var(--surface-2);border-radius:8px;padding:8px 10px;border-left:3px solid '+s.c+'"><div style="font-size:10.5px;color:#9ca3af;font-weight:600">'+s.n+'</div><div style="font-size:11.5px;margin-top:3px">YTD <b style="color:'+pc(ytd)+'">'+pf(ytd)+'</b> <span style="color:#d1d5db">·</span> 5Y <b style="color:'+pc(fv)+'">'+pf(fv)+'</b></div></div>';
  }).join('')+'</div>';
}

function renderMktMacro(m,qMap){ const el=document.getElementById('mkt-macro'); if(!el||!m)return; const vix=m.vix||(qMap&&qMap.VIXY&&null); const vc=m.vix?(m.vix>25?'#ef4444':m.vix>18?'#f97316':'#10b981'):'#374151';
  const haveCurve=m.tenYrYield!=null&&m.twoYrYield!=null; const spread=haveCurve?m.tenYrYield-m.twoYrYield:null;
  const sc2=spread==null?'#374151':spread<0?'#ef4444':spread<0.5?'#f97316':'#10b981';
  const curveTile=`<div class="macro-tile"><div class="macro-label">2s10s Curve</div><div class="macro-val" style="color:${sc2}">${spread==null?'—':(spread>=0?'+':'')+fmt(spread,2)+'%'}</div>${spread!=null?`<div style="font-size:9px;color:#9ca3af;margin-top:1px">${spread<0?'inverted ⚠️':'normal'}</div>`:''}</div>`;
  el.innerHTML=`<div class="macro-grid"><div class="macro-tile"><div class="macro-label">10yr Treasury</div><div class="macro-val">${m.tenYrYield?fmt(m.tenYrYield,2)+'%':'—'}</div></div>${curveTile}<div class="macro-tile"><div class="macro-label">Fed Funds</div><div class="macro-val">${m.fedFunds?fmt(m.fedFunds,2)+'%':'—'}</div></div><div class="macro-tile"><div class="macro-label">CPI YoY</div><div class="macro-val" style="color:${m.cpi!=null?(m.cpi>3?'#ef4444':m.cpi>2?'#f97316':'#10b981'):'#374151'}">${m.cpi!=null?fmt(m.cpi,1)+'%':'—'}</div></div><div class="macro-tile"><div class="macro-label">VIX</div><div class="macro-val" style="color:${vc}">${m.vix?fmt(m.vix,1):'—'}</div></div></div>`; }

/* Build today's biggest moves from the Markets universe we already fetched (indexes + sectors +
   risk gauges) — actual market structure, not just the account's holdings. */
function marketMovers(){
  const q=window.__MKTQ||{}; const lbl={}; for(const x of [...MKT_INDEX,...MKT_RISK,...MKT_SECTORS])lbl[x.s]=x.n;
  const rows=Object.keys(lbl).map(s=>({t:s,n:lbl[s],chg:q[s]&&q[s].chg!=null?q[s].chg:null})).filter(r=>r.chg!=null);
  rows.sort((a,b)=>b.chg-a.chg);
  return rows;
}
function renderBreadth(){
  const el=document.getElementById('mkt-breadth'); if(!el)return;
  const m=MKTX||{};
  const rows=marketMovers();
  let h='';
  if(rows.length>=4){
    const fc=v=>(v>=0?'+':'')+fmt(v,2)+'%';
    const g=rows.slice(0,4), l=rows.slice(-4).reverse();
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
    h+='<div><div style="font-size:11px;font-weight:700;color:#10b981;margin-bottom:4px">Leaders</div>'+g.map(x=>`<div class="risk-line"><span class="risk-name">${x.t} <span style="color:#9ca3af;font-weight:400;font-size:10.5px">${x.n}</span></span><span class="risk-val pos">${fc(x.chg)}</span></div>`).join('')+'</div>';
    h+='<div><div style="font-size:11px;font-weight:700;color:#ef4444;margin-bottom:4px">Laggards</div>'+l.map(x=>`<div class="risk-line"><span class="risk-name">${x.t} <span style="color:#9ca3af;font-weight:400;font-size:10.5px">${x.n}</span></span><span class="risk-val neg">${fc(x.chg)}</span></div>`).join('')+'</div></div>';
    h+='<div class="cov-note">Biggest moves today across the index, sector &amp; risk-gauge ETFs — the market\'s tape, not your book.</div>';
  } else if(m.movers){ // fall back to producer-supplied (your-book) movers if market quotes unavailable
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
    h+='<div><div style="font-size:11px;font-weight:700;color:#10b981;margin-bottom:4px">Your gainers</div>'+((m.movers.gainers||[]).map(x=>`<div class="risk-line"><span class="risk-name">${x.t}</span><span class="risk-val pos">${x.chg}</span></div>`).join(''))+'</div>';
    h+='<div><div style="font-size:11px;font-weight:700;color:#ef4444;margin-bottom:4px">Your losers</div>'+((m.movers.losers||[]).map(x=>`<div class="risk-line"><span class="risk-name">${x.t}</span><span class="risk-val neg">${x.chg}</span></div>`).join(''))+'</div></div>';
  }
  if(m.news){ const nb=(m.news.bullish+m.news.neutral+m.news.bearish)||1;
    h+=`<div style="margin-top:14px"><div style="font-size:12px;font-weight:700;margin-bottom:6px">News Sentiment <span style="font-weight:400;color:#9ca3af">(${m.news.bullish} bull · ${m.news.neutral} neu · ${m.news.bearish} bear)</span></div><div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:8px"><span style="width:${(m.news.bullish/nb*100).toFixed(1)}%;background:#10b981"></span><span style="width:${(m.news.neutral/nb*100).toFixed(1)}%;background:#d1d5db"></span><span style="width:${(m.news.bearish/nb*100).toFixed(1)}%;background:#ef4444"></span></div>`;
    h+=((m.news.items||[]).map(x=>`<div class="risk-line"><span class="risk-name"><b style="color:${x.sentiment==='bullish'?'#10b981':x.sentiment==='bearish'?'#ef4444':'#6b7280'}">${x.t}</b></span><span class="risk-val" style="font-weight:400;flex:1;text-align:right;color:var(--text);opacity:.8;font-size:11.5px;margin-left:8px">${x.title}</span></div>`).join(''))+'</div>';
  }
  el.innerHTML=h||'<div class="tech-empty">No breadth data.</div>';
}

/* Theme cycles Light → Dark → Neon → Light. The icon shows the theme you'll switch TO. */
var THEME_ORDER=['light','gold']; /* Light ⇄ Gold (champagne-on-black dark theme) */
function themeIcon(t){ return t==='gold'?'☀️':'✨'; } /* icon = the theme you'll switch TO (✨ = the gold dark theme) */
function themeColor(t){ return t==='gold'?'#000':'#16213e'; }
function toggleTheme(){ const h=document.documentElement; let cur=h.getAttribute('data-theme')||'light'; if(cur==='dark'||cur==='neon')cur='gold'; const next=THEME_ORDER[(THEME_ORDER.indexOf(cur)+1)%THEME_ORDER.length]; h.setAttribute('data-theme',next); try{localStorage.setItem('pf_theme',next);}catch(e){} const b=document.getElementById('theme-toggle'); if(b)b.textContent=themeIcon(next); const m=document.querySelector('meta[name="theme-color"]'); if(m)m.setAttribute('content',themeColor(next)); try{ if(typeof applyChartTheme==='function') applyChartTheme(); }catch(e){} try{ if(typeof renderHeatmap==='function') renderHeatmap(); }catch(e){} }

/* Privacy mode: blur your $ figures on the Portfolio tab (other tabs are market data, untouched). */
let _moneyMo=null,_moneyT=null;
function _wrapMoney(){
  const root=document.getElementById('page-portfolio'); if(!root)return;
  if(_moneyMo)_moneyMo.disconnect();
  try{
    const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode:function(n){
      if(!n.nodeValue||n.nodeValue.indexOf('$')<0)return NodeFilter.FILTER_REJECT;
      const p=n.parentNode; if(!p)return NodeFilter.FILTER_REJECT;
      if(p.classList&&p.classList.contains('money'))return NodeFilter.FILTER_REJECT;
      const t=p.nodeName; if(t==='SCRIPT'||t==='STYLE'||t==='CANVAS'||t==='TEXTAREA'||t==='INPUT')return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }});
    const g=/\$\d[\d,]*(?:\.\d+)?/g; const nodes=[];
    while(walker.nextNode()){ g.lastIndex=0; if(g.test(walker.currentNode.nodeValue))nodes.push(walker.currentNode); }
    nodes.forEach(function(n){
      const txt=n.nodeValue,frag=document.createDocumentFragment(); let last=0,m; g.lastIndex=0;
      while((m=g.exec(txt))){ if(m.index>last)frag.appendChild(document.createTextNode(txt.slice(last,m.index)));
        const s=document.createElement('span'); s.className='money'; s.textContent=m[0]; frag.appendChild(s); last=m.index+m[0].length; }
      if(last<txt.length)frag.appendChild(document.createTextNode(txt.slice(last)));
      if(n.parentNode)n.parentNode.replaceChild(frag,n);
    });
  }catch(e){}
  if(_moneyMo)_moneyMo.observe(root,{childList:true,subtree:true});
}
function startMoney(){ const root=document.getElementById('page-portfolio'); if(!root)return;
  if(!_moneyMo)_moneyMo=new MutationObserver(function(){ clearTimeout(_moneyT); _moneyT=setTimeout(_wrapMoney,150); });
  _wrapMoney(); }
function stopMoney(){ if(_moneyMo){ _moneyMo.disconnect(); _moneyMo=null; } }
function togglePrivacy(){ const on=!document.body.classList.contains('pf-private'); document.body.classList.toggle('pf-private',on); try{localStorage.setItem('pf_private',on?'1':'0');}catch(e){} const b=document.getElementById('pf-priv'); if(b)b.textContent=on?'🙈':'👁️'; if(on)startMoney(); else stopMoney(); }
window.togglePrivacy=togglePrivacy;
(function(){ try{ if(localStorage.getItem('pf_private')==='1'){ if(document.body)document.body.classList.add('pf-private'); startMoney(); } }catch(e){} })();
window.toggleTheme=toggleTheme;
(function(){ const b=document.getElementById('theme-toggle'); if(b)b.textContent=themeIcon(document.documentElement.getAttribute('data-theme')||'light'); })();
applyChartTheme();

load();
