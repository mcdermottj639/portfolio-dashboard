<script>
/* ═══════════════════════════════════════════════════════════════════
   PWA REPLAY SHIM  (consumer side)
   The live MCP bridge (window.cowork) only exists inside the Claude app.
   Outside it — e.g. this PWA on a phone — we stand in a replacement that
   replays responses pre-fetched into data.json by the producer agent
   (see producer/PRODUCER.md), refreshed ~every 15 min during market hours.
   Keys are derived identically here and in producer/build-data.mjs.
═══════════════════════════════════════════════════════════════════ */
(function(){
  function stable(o){ if(o===null||typeof o!=='object')return JSON.stringify(o); if(Array.isArray(o))return '['+o.map(stable).join(',')+']'; return '{'+Object.keys(o).sort().map(function(k){return JSON.stringify(k)+':'+stable(o[k]);}).join(',')+'}'; }
  /* Exact key for stable calls (portfolio, positions, Alpha Vantage). Quotes and
     historicals are NOT keyed — they're assembled per-symbol below, so any batching
     the app uses resolves regardless of how the producer fetched them. */
  function makeKey(server, args){ return server+'|'+stable(args||{}); }
  window.__pfKey=makeKey;
  /* ── decryption (matches producer/emit.mjs) ── */
  function b64d(s){ var bin=atob(s); var u=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return u; }
  function decryptEnvelope(env, pass){
    return crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey'])
      .then(function(km){ return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(env.salt),iterations:env.iter||150000,hash:'SHA-256'}, km, {name:'AES-GCM',length:256}, false, ['decrypt']); })
      .then(function(key){ return crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(env.iv)}, key, b64d(env.ct)); })
      .then(function(pt){ return JSON.parse(new TextDecoder().decode(pt)); });
  }
  var EMPTY={recorded:{},quotes:{},hist:{}};
  function loadData(){
    return fetch('./data.json',{cache:'no-store'}).then(function(r){ if(!r.ok)throw new Error('data.json '+r.status); return r.json(); })
      .then(function(raw){
        if(!raw||!raw.enc) return raw;                       // plaintext (dev / sample)
        // Normalize: trim, and convert "smart" dashes/minus back to a plain hyphen so a
        // mobile keyboard can't silently break an otherwise-correct passphrase.
        function norm(p){ return p==null?p:String(p).trim().replace(/[‐-―−⁃]/g,'-'); }
        var hk=(location.hash.match(/(?:^|[#&])key=([^&]+)/)||[])[1];
        if(hk){ try{hk=decodeURIComponent(hk);}catch(e){} history.replaceState(null,'',location.pathname+location.search); }
        var pass=norm(hk||localStorage.getItem('pf_pass')||null);
        // Custom unlock prompt — a real password input (no auto-capitalize / autocorrect /
        // smart-punctuation), unlike window.prompt which iOS mangles.
        function askPass(showErr){
          return new Promise(function(resolve){
            var host=document.body||document.documentElement;
            var ov=document.getElementById('pf-unlock');
            if(!ov){
              ov=document.createElement('div'); ov.id='pf-unlock';
              ov.style.cssText='position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);padding:24px';
              ov.innerHTML='<div style="background:#fff;border-radius:16px;padding:22px;max-width:340px;width:100%;font-family:-apple-system,BlinkMacSystemFont,sans-serif"><div style="font-size:15px;font-weight:700;color:#1c1c1e">🔒 Dashboard passphrase</div><div style="font-size:12px;color:#6b7280;margin:6px 0 12px">Enter your passphrase to unlock.</div><input id="pf-pass-input" type="password" autocapitalize="off" autocorrect="off" autocomplete="current-password" spellcheck="false" style="width:100%;padding:11px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:16px" placeholder="passphrase"><div id="pf-pass-err" style="font-size:12px;color:#dc2626;margin-top:8px;display:none">Incorrect — check capitalization and try again.</div><button id="pf-pass-go" style="margin-top:12px;width:100%;padding:12px;border:none;border-radius:10px;background:#00c244;color:#fff;font-size:15px;font-weight:700;cursor:pointer">Unlock</button></div>';
              host.appendChild(ov);
            }
            var inp=ov.querySelector('#pf-pass-input'); var err=ov.querySelector('#pf-pass-err');
            err.style.display=showErr?'block':'none'; inp.value=''; try{inp.focus();}catch(e){}
            function go(){ resolve(inp.value); }
            ov.querySelector('#pf-pass-go').onclick=go;
            inp.onkeydown=function(e){ if(e.key==='Enter')go(); };
          });
        }
        function closeAsk(){ var ov=document.getElementById('pf-unlock'); if(ov)ov.remove(); }
        function attempt(n){
          if(n>10) return Object.assign({error:'bad passphrase'},EMPTY);
          var get = pass!=null ? Promise.resolve(pass) : askPass(n>0);
          return get.then(function(entered){
            var p=norm(entered);
            if(!p){ pass=null; return attempt(n); }
            return decryptEnvelope(raw, p).then(function(obj){ try{localStorage.setItem('pf_pass',p);}catch(e){} closeAsk(); return obj; })
              .catch(function(){ try{localStorage.removeItem('pf_pass');}catch(e){} pass=null; return attempt(n+1); });
          });
        }
        return attempt(0);
      })
      .catch(function(e){ return Object.assign({error:String(e&&e.message||e)},EMPTY); });
  }
  window.__dataReady=loadData().then(function(d){ window.__DATA=d; return d; });
  window.cowork={ callMcpTool: function(server, args){
    return window.__dataReady.then(function(d){
      args=args||{};
      if(/update_artifact|create_artifact/.test(server)) return {ok:true,replayNoop:true};
      // quotes: assemble from per-symbol store
      if(/get_equity_quotes$/.test(server)){
        var qs=(d&&d.quotes)||{}; var syms=args.symbols||[];
        return { structuredContent: { results: syms.filter(function(s){return qs[s];}).map(function(s){return Object.assign({symbol:s}, qs[s]);}) } };
      }
      // historicals: assemble from per-symbol store for the requested interval
      if(/get_equity_historicals$/.test(server)){
        var hh=((d&&d.hist)||{})[args.interval||'day']||{}; var hsyms=args.symbols||[];
        return { structuredContent: { results: hsyms.filter(function(s){return hh[s];}).map(function(s){return {symbol:s, bars:hh[s]};}) } };
      }
      var rec=(d&&d.recorded)||{};
      var k=makeKey(server,args);
      if(Object.prototype.hasOwnProperty.call(rec,k)) return rec[k];
      console.warn('[replay miss]',k);
      return {__replayMiss:k};
    });
  }};
  function boot(){
    window.__dataReady.then(function(d){
      var locked=d&&d.locked, err=d&&d.error;
      var lab=(d&&d.generatedAtLabel)||(locked?'locked':'unknown');
      var bar=document.createElement('div');
      bar.id='pf-fresh';
      bar.style.cssText='font:600 11.5px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:'+(locked||err?'#7c2d12':'#475569')+';background:'+(locked||err?'#fff7ed':'#eef2f7')+';border:1px solid '+(locked||err?'#fed7aa':'#dbe2ea')+';border-radius:10px;padding:7px 12px;margin:0 0 10px;display:flex;justify-content:space-between;align-items:center;gap:8px';
      var left = locked ? '🔒 Locked — enter your passphrase to view'
               : err    ? '⚠️ Couldn’t load data ('+err+')'
               :          '📡 Snapshot: '+lab;
      var themeIcon=(document.documentElement.getAttribute('data-theme')==='dark')?'☀️':'🌙';
      var privOn=document.body&&document.body.classList.contains('pf-private');
      bar.innerHTML='<span>'+left+'</span><span style="display:flex;gap:16px;align-items:center"><span id="pf-priv" onclick="togglePrivacy()" style="cursor:pointer;font-size:15px" title="Hide my $ figures">'+(privOn?'🙈':'👁️')+'</span><span id="theme-toggle" onclick="toggleTheme()" style="cursor:pointer;font-size:15px" title="Light / dark">'+themeIcon+'</span><span id="pf-refresh" style="color:#2563eb;cursor:pointer">'+(locked?'🔓 Unlock':'↻ Refresh')+'</span></span>';
      if(document.body) document.body.insertBefore(bar, document.body.firstChild);
      var rb=document.getElementById('pf-refresh'); if(rb) rb.onclick=function(){ if(locked){ try{localStorage.removeItem('pf_pass');}catch(e){} } location.reload(); };
    });
    if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(function(){}); }
  }
  if(document.readyState!=='loading') boot(); else document.addEventListener('DOMContentLoaded', boot);
})();

/* ─── Config ─── */
const ACCOUNT   = 'ACCT';  // placeholder used only as a replay-lookup key; the real account number lives in producer/secret.local.json (git-ignored) and never ships to the public repo
const SMALL_THR = 250;
const RH = 'mcp__1ad8dd47-cf57-427a-8a28-facba69504fb__';
const AV = 'mcp__4ae6f0d3-5112-4955-94dc-c6bea90e45dd__TOOL_CALL';
const OVERVIEW_COVER = 14;   // # of top holdings to pull fundamentals/beta/sector for

const TTL = {
  TECH:  4*3600*1000, FUND:  24*3600*1000, EARN: 24*3600*1000,
  NEWS:  3600*1000, MACRO: 24*3600*1000, HIST: 12*3600*1000,
};

const CLUSTERS = {
  'Crypto / AI Compute': { tickers:['CIFR','IREN','WULF','CLSK'],           color:'#f59e0b' },
  'AI Semiconductor':    { tickers:['NVDA','AMD','AVGO','AMAT','MRVL','CRDO','TSM','TER','MU'], color:'#6366f1' },
  'Software / SaaS':     { tickers:['MSFT','NOW','DDOG','APP','PLTR','NBIS','ORCL','U'],        color:'#3b82f6' },
  'Big Tech':            { tickers:['META','AAPL','AMZN','GOOGL','GOOG'],   color:'#8b5cf6' },
  'Cybersecurity':       { tickers:['PANW','CRWD'],                          color:'#06b6d4' },
  'Healthcare':          { tickers:['LLY','HUM','ELV','ISRG'],              color:'#10b981' },
  'Gold / Commodities':  { tickers:['GLD','GLTR','NEM','CDE'],              color:'#d97706' },
  'Broad ETFs':          { tickers:['SPY','QQQ','DIA','SCHO'],              color:'#9ca3af' },
};

/* Asset-class classifier (overview Sector fills the rest) */
const ASSET_MAP = {
  SCHO:'Bonds', TLT:'Bonds', BND:'Bonds', AGG:'Bonds',
  GLD:'Gold/Commodities', GLTR:'Gold/Commodities', NEM:'Gold/Commodities', CDE:'Gold/Commodities',
  SPY:'Broad ETF', QQQ:'Broad ETF', DIA:'Broad ETF', IWM:'Broad ETF', ICOP:'Broad ETF', VOO:'Broad ETF',
};

/* ─── Risk thresholds ─── */
function risk(pct) {
  if (pct > 10) return { level:'CRITICAL', color:'#ef4444', bg:'#fee2e2', fg:'#991b1b' };
  if (pct >  5) return { level:'HIGH',     color:'#f97316', bg:'#ffedd5', fg:'#9a3412' };
  if (pct >  2) return { level:'WATCH',    color:'#eab308', bg:'#fef9c3', fg:'#854d0e' };
  return               { level:'GOOD',     color:'#10b981', bg:'#d1fae5', fg:'#065f46' };
}

/* ─── Formatting ─── */
function fmt(n,d=2){ if(n==null||isNaN(n))return'—'; return new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n); }
function fmtD(n){ if(n==null||isNaN(n))return'—'; return(n<0?'-$':'$')+fmt(Math.abs(n)); }
function fmtP(n){ if(n==null||isNaN(n))return'—'; return(n>=0?'+':'')+fmt(n)+'%'; }
function sc(n){ return n>0?'pos':n<0?'neg':'neu'; }

/* ─── Parsers ─── */
function parse(r){ if(!r||r.isError)return null; try{ if(r.structuredContent)return r.structuredContent; if(r.content?.[0]?.text)return JSON.parse(r.content[0].text);}catch(e){} return null; }
function parseAV(r){ if(!r||r.isError)return null; try{ if(r.structuredContent)return r.structuredContent; const t=r.content?.[0]?.text; if(t){ try{return JSON.parse(t);}catch(e){return t;} } if(Array.isArray(r))return r; if(typeof r==='object'&&(r.Symbol||r['Time Series (Daily)']))return r; }catch(e){} return null; }
function parseCSV(text){ if(!text||typeof text!=='string')return[]; const lines=text.trim().split('\n'); if(lines.length<2)return[]; const headers=lines[0].split(',').map(h=>h.trim()); return lines.slice(1).filter(l=>l.trim()).map(line=>{ const vals=line.split(','); const obj={}; headers.forEach((h,i)=>{obj[h]=(vals[i]||'').trim();}); return obj; }); }

/* ─── Cache ─── */
function cacheGet(key){ try{ const raw=localStorage.getItem('pf3_'+key); if(!raw)return null; const {ts,data,ttl}=JSON.parse(raw); if(Date.now()-ts>ttl)return null; return data; }catch(e){return null;} }
function cacheSet(key,data,ttl){ try{ localStorage.setItem('pf3_'+key,JSON.stringify({ts:Date.now(),data,ttl})); }catch(e){} }

async function avCall(toolName, args, cacheKey, ttl=TTL.FUND){
  if(cacheKey){ const c=cacheGet(cacheKey); if(c!==null)return c; }
  const r=await Promise.race([
    window.cowork.callMcpTool(AV,{tool_name:toolName, arguments:JSON.stringify(args)}),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('AV timeout')),18000))
  ]);
  const data=parseAV(r);
  if(cacheKey&&data!==null) cacheSet(cacheKey,data,ttl);
  return data;
}

function avSym(sym){ return sym.replace(/\./g,'-'); }

/* ─── RSI ─── */
function calcRSI(closes, period=14){
  if(!closes||closes.length<period+2)return null;
  const ch=[]; for(let i=1;i<closes.length;i++) ch.push(closes[i]-closes[i-1]);
  let ag=0,al=0; for(let i=0;i<period;i++){ if(ch[i]>0)ag+=ch[i]; else al+=Math.abs(ch[i]); }
  ag/=period; al/=period;
  for(let i=period;i<ch.length;i++){ ag=(ag*(period-1)+(ch[i]>0?ch[i]:0))/period; al=(al*(period-1)+(ch[i]<0?Math.abs(ch[i]):0))/period; }
  if(al===0)return 100; return 100-(100/(1+ag/al));
}
function parseDailyCloses(raw){
  if(!raw)return[];
  if(typeof raw==='string'){ const rows=parseCSV(raw); return rows.map(r=>parseFloat(r.close)).filter(v=>!isNaN(v)).reverse(); }
  if(typeof raw==='object'&&raw['Time Series (Daily)']){ const ts=raw['Time Series (Daily)']; return Object.keys(ts).sort().map(d=>parseFloat(ts[d]['4. close'])); }
  return[];
}

/* ─── Quote map ─── */
function buildQMap(raw){
  const map={}; if(!raw)return map;
  function addQ(sym,q){ if(!sym||!q||typeof q!=='object')return; const price=parseFloat(q.last_extended_hours_trade_price||q.last_trade_price||q.ask_price||q.mark_price||q.price||0)||0; const prev=parseFloat(q.adjusted_previous_close||q.previous_close||q.prev_close||q.prev||0)||0; if(price>0||prev>0) map[sym]={price,prev}; }
  const d=raw.data??raw;
  const topArr=Array.isArray(raw)?raw:Array.isArray(d)?d:null;
  if(topArr){ for(const item of topArr){ const q=item.quote??item; const sym=q?.symbol||q?.ticker; if(sym)addQ(sym,q); } if(Object.keys(map).length>0)return map; }
  const resArr=Array.isArray(d?.results)?d.results:Array.isArray(raw.results)?raw.results:null;

function enrich(positions,qMap,totalVal){

    const px=q.price||0, val=px*qty, cost=avg*qty, pnlD=val-cost;

    const dayP=q.prev>0?((px-q.prev)/q.prev)*100:null;
    const dayD=q.prev>0?(px-q.prev)*qty:0;
    const pct=totalVal>0?(val/totalVal)*100:0;
    return{...p,qty,avg,px,val,cost,pnlD,pnlP,dayP,dayD,pct,r:risk(pct)};
  });

/* ═══ COMPUTE ═══ */
/* RSI + beta from Robinhood daily historicals (no Alpha Vantage) */
function rsiFromHist(histMap, syms){
  const map={};
  for(const s of syms){ const ser=histMap[s]; if(ser&&ser.length>16){ const r=calcRSI(ser.map(b=>b.c)); if(r!=null)map[s]=r; } }
  return map;
}
function betaFromHist(histMap, enriched, syms){
  const spy=histMap['SPY']; if(!spy||spy.length<10) return {beta:null,coverage:0};
  const rets=a=>{const o=[];for(let i=1;i<a.length;i++)o.push(a[i].c/a[i-1].c-1);return o;};
  const sr=rets(spy); const n0=sr.length; const mx=sr.reduce((s,x)=>s+x,0)/n0; let vx=0; for(const x of sr)vx+=(x-mx)*(x-mx); vx/=n0;
  let wsum=0,bsum=0,covered=0; const eq=enriched.reduce((s,p)=>s+Math.max(p.val,0),0)||1;
  for(const s of syms){ const ser=histMap[s]; const p=enriched.find(e=>e.symbol===s); if(!ser||ser.length<10||!p||p.val<=0)continue; const r=rets(ser); const n=Math.min(r.length,sr.length); if(n<8)continue; const my=r.slice(-n).reduce((a,x)=>a+x,0)/n; let cov=0; for(let i=0;i<n;i++){ cov+=(sr[sr.length-n+i]-mx)*(r[r.length-n+i]-my); } cov/=n; const b=vx>0?cov/vx:null; if(b!=null){ bsum+=b*p.val; wsum+=p.val; covered+=p.val; } }
  return { beta: wsum>0?bsum/wsum:null, coverage: eq>0?covered/eq*100:0 };
}

function computeBeta(enriched, ovMap){
  let wsum=0, bsum=0, covered=0;
  for(const p of enriched){
    if(p.val<=0)continue;
    const ov=ovMap[p.symbol]; const b=ov?parseFloat(ov.Beta):NaN;
    if(!isNaN(b)){ bsum+=b*p.val; wsum+=p.val; covered+=p.val; }
  }
  const eqVal=enriched.reduce((s,p)=>s+Math.max(p.val,0),0);
  return { beta: wsum>0?bsum/wsum:null, coverage: eqVal>0?covered/eqVal*100:0 };
}

function assetClassOf(sym, ov){
  if(ASSET_MAP[sym]) return ASSET_MAP[sym];
  return 'Stocks';
}
function computeAllocation(enriched, ovMap, totalVal){
  const sectors={}, assets={};
  let covered=0;
  const eqVal=enriched.reduce((s,p)=>s+Math.max(p.val,0),0);
  for(const p of enriched){
    if(p.val<=0)continue;
    const ac=assetClassOf(p.symbol, ovMap[p.symbol]);
    assets[ac]=(assets[ac]||0)+p.val;
    const ov=ovMap[p.symbol];
    if(ac==='Stocks'){
      if(ov&&ov.Sector){ const s=titleCase(ov.Sector); sectors[s]=(sectors[s]||0)+p.val; covered+=p.val; }
      else { sectors['Uncategorized']=(sectors['Uncategorized']||0)+p.val; }
    }
  }
  const stockVal=Object.values(assets).reduce((s,v)=>s,0); // placeholder
  return { sectors, assets, eqVal, sectorCoverage: eqVal>0?covered/eqVal*100:0 };
}
function titleCase(s){ return (s||'').toLowerCase().replace(/\b\w/g,m=>m.toUpperCase()); }

function computeIncome(enriched, ovMap){
  let annual=0, costBasis=0, mktBasis=0; const exdiv=[];
  for(const p of enriched){
    if(p.val<=0)continue;
    const ov=ovMap[p.symbol]; if(!ov)continue;
    const dps=parseFloat(ov.DividendPerShare);
    if(!isNaN(dps)&&dps>0){
      const inc=dps*p.qty; annual+=inc; costBasis+=p.cost; mktBasis+=p.val;
      const ex=ov.ExDividendDate;
      if(ex&&ex!=='None'){ const d=new Date(ex); if(!isNaN(d)) exdiv.push({sym:p.symbol, date:ex, dps, inc}); }
    }
  }
  exdiv.sort((a,b)=>new Date(a.date)-new Date(b.date));
  return { annual, yieldOnMkt: mktBasis>0?annual/mktBasis*100:0, yieldOnCost: costBasis>0?annual/costBasis*100:0, exdiv };
}

function harvestCandidates(enriched){
  return enriched.filter(p=>p.val>=SMALL_THR && p.pnlD<0).sort((a,b)=>a.pnlD-b.pnlD);
}

async function pushToKyle(){
  const btn=document.getElementById('kyle-btn');
  const S=window.__SNAP;
  if(!S||!S.stats){ alert('Portfolio still loading — give it a moment.'); return; }
  if(!S.betaInfo||!S.perf){ alert('Beta and performance are still computing in the background (a few seconds after load). Try again shortly.'); return; }
  if(btn){ btn.disabled=true; btn.textContent='Pushing…'; }
  try{
    const html=buildKyleHTML();
    const r=await window.cowork.callMcpTool(KYLE+'update_artifact',{artifact_id:KYLE_PORTFOLIO_ID,title:'Portfolio — '+S.date,content:html});
    if(r&&r.isError) throw new Error('Kyle returned an error');
    const t=document.getElementById('toast'); if(t){ t.textContent='✅ Pushed to Kyle'; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
  }catch(e){ alert('Push to Kyle failed: '+(e&&e.message||e)); }
  if(btn){ btn.disabled=false; btn.textContent='📲 Push to Kyle'; }
}
window.pushToKyle=pushToKyle;

/* ═══ Performance vs benchmark ═══ */
function buildNorm(series){ if(!series||series.length<2)return null; const c0=series[0].c; return series.map(b=>({t:b.t, v:(b.c/c0-1)*100})); }
function renderPerformance(histMap, enriched, coveredSyms, macroData, stats){
  const el=document.getElementById('perf-content'); if(!el)return;
  const spy=histMap['SPY'], qqq=histMap['QQQ'];
  if(!spy||spy.length<2){ el.innerHTML=`<div class="tech-empty">Benchmark history unavailable.</div>`; return; }
  const axis=spy.map(b=>b.t);
  // portfolio normalized series from covered holdings, weighted by current value
  const wsyms=coveredSyms.filter(s=>histMap[s]&&histMap[s].length>1);
  const wmap={}; let wsum=0;
  for(const s of wsyms){ const p=enriched.find(e=>e.symbol===s); if(p&&p.val>0){ wmap[s]=p.val; wsum+=p.val; } }
  let portSeries=null;
  if(wsum>0){
    const idx={}; for(const s of Object.keys(wmap)){ const m={}; for(const b of histMap[s])m[b.t]=b.c; idx[s]={m,c0:histMap[s][0].c,last:histMap[s][0].c}; }
    portSeries=axis.map(t=>{
      let acc=0;
      for(const s of Object.keys(wmap)){ const o=idx[s]; if(o.m[t]!=null)o.last=o.m[t]; acc+=(wmap[s]/wsum)*(o.last/o.c0); }
      return {t, v:(acc-1)*100};
    });
  }
  const spyN=buildNorm(spy), qqqN=buildNorm(qqq);
  const lastV=a=>a&&a.length?a[a.length-1].v:null;
  const portYTD=lastV(portSeries), spyYTD=lastV(spyN), qqqYTD=lastV(qqqN);
  try{ if(window.__SNAP){ const _cv=wsum>0?(wsum/enriched.reduce((s,p)=>s+Math.max(p.val,0),0)*100):0; window.__SNAP.perf={labels:axis,port:portSeries?portSeries.map(x=>x.v):null,spy:spyN.map(x=>x.v),qqq:qqqN.map(x=>x.v),portYTD,spyYTD,qqqYTD,cov:_cv}; } }catch(e){}
  el.innerHTML=`
    <div class="perf-head">
      <div class="perf-metric"><div class="pm-l">Your holdings YTD*</div><div class="pm-v ${sc(portYTD)}">${portYTD!=null?fmtP(portYTD):'—'}</div></div>
      <div class="perf-metric"><div class="pm-l">S&P 500 (SPY)</div><div class="pm-v ${sc(spyYTD)}">${fmtP(spyYTD)}</div></div>
      <div class="perf-metric"><div class="pm-l">Nasdaq-100 (QQQ)</div><div class="pm-v ${sc(qqqYTD)}">${fmtP(qqqYTD)}</div></div>
      <div class="perf-metric"><div class="pm-l">Total return since cost</div><div class="pm-v ${sc(stats.totalPnL)}">${fmtP(stats.totalRet)}</div></div>
    </div>
    <div class="chart-wrap"><canvas id="perf-chart"></canvas></div>
    <div class="legend-row">
      <span class="legend-item"><span class="legend-dot" style="background:#6366f1"></span>Your holdings*</span>
      <span class="legend-item"><span class="legend-dot" style="background:#9ca3af"></span>SPY</span>
      <span class="legend-item"><span class="legend-dot" style="background:#10b981"></span>QQQ</span>
    </div>
    <div class="fund-note">*Price-return of your <b>current</b> holdings held at today's weights from Jan 1 — a like-for-like comparison vs the index, not a time-weighted account return (purchase history isn't available from the broker). Covers ${fmt(wsum>0?(wsum/enriched.reduce((s,p)=>s+Math.max(p.val,0),0)*100):0,0)}% of equity.</div>
    ${macroData?`<div class="macro-strip" style="display:grid;grid-template-columns:repeat(4,1fr);gap:10px;margin-top:14px;padding-top:14px;border-top:1px solid #f3f4f6">
      <div><div class="snap-lbl">10yr Treasury</div><div style="font-size:16px;font-weight:700">${macroData.tenYrYield?fmt(macroData.tenYrYield,2)+'%':'—'}</div></div>
      <div><div class="snap-lbl">Fed Funds</div><div style="font-size:16px;font-weight:700">${macroData.fedFunds?fmt(macroData.fedFunds,2)+'%':'—'}</div></div>
      <div><div class="snap-lbl">CPI YoY</div><div style="font-size:16px;font-weight:700;color:${macroData.cpi!=null?(macroData.cpi>3?'#ef4444':macroData.cpi>2?'#f97316':'#10b981'):'#1c1c1e'}">${macroData.cpi!=null?fmt(macroData.cpi,1)+'%':'—'}</div></div>
      <div><div class="snap-lbl">VIX</div><div style="font-size:16px;font-weight:700;color:${macroData.vix?(macroData.vix>25?'#ef4444':macroData.vix>18?'#f97316':'#10b981'):'#1c1c1e'}">${macroData.vix?fmt(macroData.vix,1):'—'}</div></div>
    </div>`:''}
  `;
  const ctx=document.getElementById('perf-chart'); if(!ctx)return;
  const ds=[];
  if(portSeries) ds.push({label:'Your holdings',data:portSeries.map(x=>x.v),borderColor:'#6366f1',backgroundColor:'rgba(99,102,241,0.08)',borderWidth:2.2,pointRadius:0,fill:true,tension:0.15});
  ds.push({label:'SPY',data:spyN.map(x=>x.v),borderColor:'#9ca3af',borderWidth:1.5,pointRadius:0,tension:0.15});
  ds.push({label:'QQQ',data:qqqN.map(x=>x.v),borderColor:'#10b981',borderWidth:1.5,pointRadius:0,tension:0.15});
  new Chart(ctx,{ type:'line', data:{labels:axis,datasets:ds},
    options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
      plugins:{legend:{display:false},tooltip:{callbacks:{title:items=>items[0].label, label:c=>` ${c.dataset.label}: ${c.parsed.y>=0?'+':''}${c.parsed.y.toFixed(1)}%`}}},

    }});
}

function buildActionFeed(enriched, port, clusters, totalVal, rsiMap, ovMap, earningsMap){
  const A=[]; const cash=parseFloat(port.cash||0); const equity=parseFloat(port.equity_value||1);
  const add=(o)=>A.push(o);
  if(cash<-1000){ const mp=Math.abs(cash)/equity*100; const t=[...enriched].filter(p=>p.pct>3&&p.px>0).sort((a,b)=>b.val-a.val)[0]; add({pr:0,icon:'🔴',c:'#ef4444',bg:'#fee2e2',fg:'#991b1b',tag:'MARGIN',title:`Margin in use — ${fmtD(Math.abs(cash))} (${fmt(mp,1)}% of equity)`,detail:t?`A drawdown is amplified by leverage. Trimming ~${Math.ceil(Math.abs(cash)/t.px)} sh of ${t.symbol} (~${fmtD(t.px)}) would clear it.`:`Leverage amplifies losses — top priority.`}); }
  const crits=[...enriched].filter(p=>p.pct>10&&p.px>0).sort((a,b)=>b.pct-a.pct);
  for(const p of crits.slice(0,2)){ const fpe=parseFloat(ovMap[p.symbol]?.ForwardPE)||null; const vN=fpe&&fpe>60?` Fwd P/E ${fmt(fpe,0)} adds valuation risk.`:''; add({pr:1,icon:'🔴',c:'#ef4444',bg:'#fee2e2',fg:'#991b1b',tag:'TRIM',title:`${p.symbol} is ${fmt(p.pct,1)}% of the book`,detail:`Single-name concentration is critical. A 20% drop in ${p.symbol} alone takes the portfolio down ~${fmt(p.pct*0.2,1)}%.${vN}`}); }
  const upE=Object.entries(earningsMap||{}).filter(([s,e])=>enriched.find(p=>p.symbol===s&&p.val>=SMALL_THR)&&e.daysAway<=14).sort((a,b)=>a[1].daysAway-b[1].daysAway);
  for(const [s,e] of upE.slice(0,3)){ const p=enriched.find(x=>x.symbol===s); const u=e.daysAway<=3?'IMMINENT':e.daysAway<=7?'THIS WEEK':'UPCOMING'; add({pr:2,icon:'🗓️',c:'#6366f1',bg:'#ede9fe',fg:'#4c1d95',tag:'EARNINGS',title:`${s} reports in ${e.daysAway}d (${e.reportDate}) — ${u}`,detail:`You hold ${fmtD(p?.val||0)} (${fmt(p?.pct||0,1)}%). Decide: hold through, trim, or set a stop.${e.estimate?` Est EPS $${parseFloat(e.estimate).toFixed(2)}.`:''}`}); }

  A.sort((a,b)=>a.pr-b.pr);

  function sig(rsi){ if(rsi>=75)return{l:'Overbought',bg:'#fee2e2',fg:'#991b1b',i:'🔴'}; if(rsi>=60)return{l:'Bullish',bg:'#d1fae5',fg:'#065f46',i:'🟢'}; if(rsi>=40)return{l:'Neutral',bg:'#f3f4f6',fg:'#6b7280',i:'⚪'}; if(rsi>=25)return{l:'Bearish',bg:'#ffedd5',fg:'#9a3412',i:'🟡'}; return{l:'Oversold',bg:'#dbeafe',fg:'#1e40af',i:'🔵'}; }

  h+='</tbody></table><div class="fund-note">14-day RSI on daily closes (top holdings). Overbought/oversold alone isn\'t a signal — confirm with thesis and size. ~15-min delayed via Alpha Vantage.</div>';

  function pec(v){if(!v)return'#374151';if(v>60)return'#ef4444';if(v>35)return'#f97316';if(v>20)return'#374151';return'#10b981';}

/* Make every card collapsible (cards rendered later are caught via MutationObserver). */
(function(){
  function enhance(card){
    var title=card.querySelector(':scope > .card-title');
    if(!title || title.dataset.coll) return;
    title.dataset.coll='1';
    if(title.classList.contains('collapsible')) return; // already wired (has its own toggleSection)
    var body=document.createElement('div'); body.className='card-body';
    var n=title.nextSibling; while(n){ var nx=n.nextSibling; body.appendChild(n); n=nx; }
    card.appendChild(body);
    if(!title.querySelector('.chevron')){ var ch=document.createElement('span'); ch.className='chevron'; ch.textContent='▼'; title.appendChild(ch); }
    title.classList.add('collapsible');
    title.addEventListener('click',function(){
      var hide=body.style.display!=='none'; body.style.display=hide?'none':'';
      var c=title.querySelector('.chevron'); if(c)c.style.transform=hide?'rotate(-90deg)':'';
    });
  }
  // Wrap any wide table in a horizontal-scroll container so it never spills the page.
  function wrapTables(root){ try{ (root||document).querySelectorAll('table').forEach(function(t){
    var p=t.parentElement; if(!p||p.dataset.tw)return;
    if((p.style&&p.style.overflowX==='auto'))return;
    var w=document.createElement('div'); w.dataset.tw='1'; w.style.overflowX='auto'; w.style.webkitOverflowScrolling='touch';
    p.insertBefore(w,t); w.appendChild(t);
  }); }catch(e){} }
  function scan(root){ try{ (root||document).querySelectorAll('.card').forEach(enhance); wrapTables(root); }catch(e){} }
  function start(){
    scan(document);
    try{
      var mo=new MutationObserver(function(muts){
        for(var i=0;i<muts.length;i++){ var a=muts[i].addedNodes;
          for(var j=0;j<a.length;j++){ var nd=a[j]; if(!nd||nd.nodeType!==1)continue;
            if(nd.classList&&nd.classList.contains('card'))enhance(nd);
            if(nd.querySelectorAll)nd.querySelectorAll('.card').forEach(enhance); }
          wrapTables(document); }
      });
      ['page-portfolio','page-markets','page-picks','page-options'].forEach(function(id){ var el=document.getElementById(id); if(el)mo.observe(el,{childList:true,subtree:true}); });
    }catch(e){}
  }
  if(document.readyState!=='loading')start(); else document.addEventListener('DOMContentLoaded',start);
})();

/* Per-page quick-nav: a chip row at the top of each page listing every card's title.
   Tap a chip to (expand if collapsed and) smooth-scroll to that card. Rebuilds itself
   when a page's cards change (debounced), so dynamic pages like Analyze stay in sync. */
(function(){
  var PAGES=['page-portfolio','page-markets','page-picks','page-options','page-analyze'];
  function titleOf(card){
    var t=card.querySelector(':scope > .card-title'); if(!t)return null;
    var c=t.cloneNode(true);
    c.querySelectorAll('.chevron,.card-hint').forEach(function(x){ x.remove(); });
    var s=(c.textContent||'').replace(/\s+/g,' ').trim();
    return s||null;
  }
  function jump(id){
    var card=document.getElementById(id); if(!card)return;
    var body=card.querySelector(':scope > .card-body');
    if(body&&body.style.display==='none'){ body.style.display=''; var ch=card.querySelector(':scope > .card-title .chevron'); if(ch)ch.style.transform=''; }
    try{ card.scrollIntoView({behavior:'smooth',block:'start'}); }catch(e){ card.scrollIntoView(); }
    var prev=card.style.boxShadow; card.style.transition='box-shadow .3s'; card.style.boxShadow='0 0 0 2px #6366f1';
    setTimeout(function(){ card.style.boxShadow=prev; },700);
  }
  window.__navJump=jump;
  function build(pageEl){
    var all=pageEl.querySelectorAll('.card'), cards=[], i;
    for(i=0;i<all.length;i++){ var ti=titleOf(all[i]); if(ti)cards.push({card:all[i],title:ti}); }
    var sig=cards.map(function(c){ return c.title; }).join('|');
    if(pageEl.__navSig===sig)return; pageEl.__navSig=sig;
    var nav=pageEl.querySelector(':scope > .card-nav');
    if(cards.length<2){ if(nav)nav.remove(); return; } // not worth a nav for 0–1 cards
    if(!nav){ nav=document.createElement('div'); nav.className='card-nav'; pageEl.insertBefore(nav,pageEl.firstChild); }
    var html='';
    for(i=0;i<cards.length;i++){ var c=cards[i]; if(!c.card.id)c.card.id=pageEl.id+'-c'+i;
      html+='<button class="card-nav-chip" onclick="__navJump(\''+c.card.id+'\')">'+c.title.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</button>'; }

function heldInfo(sym){ const P=window.__PORT; if(!P)return null; const p=P.enriched.find(e=>e.symbol===sym&&e.val>0); return p?{pct:p.pct,val:p.val}:null; }
function clusterFor(sym){ for(const [name,def] of Object.entries(CLUSTERS)){ if(def.tickers.includes(sym))return name; } return null; }
function parseRange(s){ const m=(s||'').match(/[\d.]+/g); if(!m)return null; const n=m.map(parseFloat); return {lo:Math.min(...n),hi:Math.max(...n)}; }
function ownBadge(sym){ const h=heldInfo(sym); return h?`<span class="own-badge">✓ OWN ${fmt(h.pct,1)}%</span>`:''; }

async function loadPicksData(){
  try{
    // Picks are produced by the scheduled producer (Robinhood scanner \u2192 scored) and
    // embedded in data.json as `picks`. The old Kyle-note source is retired.
    const data=await (window.__dataReady||Promise.resolve(window.__DATA||{}));
    const d=(data&&data.picks)||null;
    if(d){
      if(d.date)ANALYSIS_DATE=d.date;
      if(d.ts)ANALYSIS_TS=new Date(d.ts+'T00:00:00').getTime();
      if(Array.isArray(d.candidates)&&d.candidates.length)PICK_CANDIDATES=d.candidates;
      if(Array.isArray(d.picks)&&d.picks.length)PICK_PICKS=d.picks;
      if(Array.isArray(d.trim))PICK_TRIM=d.trim;
      if(Array.isArray(d.add))PICK_ADD=d.add;
      if(Array.isArray(d.income))PICK_INCOME=d.income;
      if(Array.isArray(d.history))PICK_HISTORY=d.history;
      if(d.markets)MKTX=d.markets;
      const el=document.getElementById('tab-picks-date'); if(el)el.textContent='\u00b7 '+ANALYSIS_DATE.replace(', 2026','');
    }
  }catch(e){ /* fall back to baked-in data */ }
}

async function fetchMarkets(){
  const all=[...MKT_INDEX,...MKT_RISK,...MKT_SECTORS].map(x=>x.s);
  const qMap={};
  try{
    const r=await window.cowork.callMcpTool(RH+'get_equity_quotes',{symbols:all});
    const d=parse(r); const res=(d&&d.data&&d.data.results)||(d&&d.results)||[];
    for(const it of res){ const q=it.quote??it; const sym=q&&q.symbol; if(!sym)continue; const px=parseFloat(q.last_trade_price||q.last_non_reg_trade_price||q.ask_price||0)||0; const pv=parseFloat(q.adjusted_previous_close||q.previous_close||0)||0; if(px>0)qMap[sym]={px,pv,chg:pv>0?(px-pv)/pv*100:null}; }
  }catch(e){}
  renderMktTiles(qMap);
  try{
    const tileSyms=[...MKT_INDEX,...MKT_RISK,...MKT_SECTORS].map(x=>x.s);
    const yStart=new Date(new Date().getFullYear(),0,1).toISOString().replace(/\.\d+Z$/,'Z');
    const f=new Date(); f.setFullYear(f.getFullYear()-5);
    const fStart=f.toISOString().replace(/\.\d+Z$/,'Z');
    const [yH,fH]=await Promise.all([fetchHistG(tileSyms,yStart,'day'),fetchHistG(tileSyms,fStart,'month')]);
    for(const sym of tileSyms){ const q=qMap[sym]; if(!q||!(q.px>0))continue; const yd=yH[sym]; if(yd&&yd.length&&yd[0].c>0)q.ytd=(q.px/yd[0].c-1)*100; const fv=fH[sym]; if(fv&&fv.length&&fv[0].c>0)q.fiveyr=(q.px/fv[0].c-1)*100; }
    renderMktTiles(qMap);
  }catch(e){}
  try{ const h=await fetchHist(['SPY','QQQ']); renderMktChart(h); }catch(e){}

}

  const rk=document.getElementById('mkt-risk'); if(rk)rk.innerHTML='<div class="mkt-grid">'+MKT_RISK.map(i=>mktTile(i,qMap[i.s])).join('')+'</div>';
  const sec=document.getElementById('mkt-sectors'); if(sec){
    const cells=MKT_SECTORS.map(i=>{ const q=qMap[i.s]; const chg=q&&q.chg; const ytd=q&&q.ytd!=null?q.ytd:null, fv=q&&q.fiveyr!=null?q.fiveyr:null; const pf=v=>v==null?'—':(v>=0?'+':'')+fmt(v,1)+'%'; const pcol=v=>v==null?'#6b7280':v>=0?'#10b981':'#ef4444'; const edge=chg==null?'#e5e7eb':chg>=1.5?'#065f46':chg>=0.5?'#10b981':chg>=0?'#86efac':chg>-0.5?'#fca5a5':chg>-1.5?'#ef4444':'#991b1b'; return `<div class="sec-cell" style="background:var(--surface-2);border:2.5px solid ${edge};color:var(--text)"><div style="font-size:11px;font-weight:800">${i.s}</div><div style="font-size:9.5px;color:#6b7280">${i.n}</div><div style="font-size:13px;font-weight:800;margin-top:2px;color:${pcol(chg)}">${chg==null?'—':(chg>=0?'+':'')+fmt(chg,1)+'%'}</div><div style="font-size:8.5px;color:#6b7280;margin-top:3px;line-height:1.3">YTD <b style="color:${pcol(ytd)}">${pf(ytd)}</b> · 5Y <b style="color:${pcol(fv)}">${pf(fv)}</b></div></div>`; }).join('');
    const green=MKT_SECTORS.filter(i=>qMap[i.s]&&qMap[i.s].chg>0).length;
    sec.innerHTML=`<div style="font-size:12px;color:#6b7280;margin-bottom:10px"><b>${green} of ${MKT_SECTORS.length}</b> sectors green today — ${green>=8?'broad risk-on':green>=5?'mixed tape':'risk-off / defensive'}.</div><div class="sec-grid">${cells}</div>`;
  }
}

function renderMktChart(h){ const c=document.getElementById('mkt-chart'); if(!c||!h.SPY||h.SPY.length<2)return; const norm=a=>{const c0=a[0].c;return a.map(b=>(b.c/c0-1)*100);}; const ax=h.SPY.map(b=>b.t); const ds=[{label:'SPY',data:norm(h.SPY),borderColor:'#6366f1',borderWidth:2,pointRadius:0,tension:0.15}]; if(h.QQQ&&h.QQQ.length>1)ds.push({label:'QQQ',data:norm(h.QQQ),borderColor:'#10b981',borderWidth:2,pointRadius:0,tension:0.15}); new Chart(c,{type:'line',data:{labels:ax,datasets:ds},options:{responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},plugins:{legend:{display:true,labels:{boxWidth:12,font:{size:11}}},tooltip:{callbacks:{label:x=>' '+x.dataset.label+': '+(x.parsed.y>=0?'+':'')+x.parsed.y.toFixed(1)+'%'}}},scales:{x:{ticks:{maxTicksLimit:6,font:{size:10},color:'#9ca3af'},grid:{display:false}},y:{ticks:{callback:v=>v+'%',font:{size:10},color:'#9ca3af'},grid:{color:'#f3f4f6'}}}}}); }

function renderMktMacro(m,qMap){ const el=document.getElementById('mkt-macro'); if(!el||!m)return; const vix=m.vix||(qMap&&qMap.VIXY&&null); const vc=m.vix?(m.vix>25?'#ef4444':m.vix>18?'#f97316':'#10b981'):'#374151'; el.innerHTML=`<div class="macro-grid"><div class="macro-tile"><div class="macro-label">10yr Treasury</div><div class="macro-val">${m.tenYrYield?fmt(m.tenYrYield,2)+'%':'—'}</div></div><div class="macro-tile"><div class="macro-label">Fed Funds</div><div class="macro-val">${m.fedFunds?fmt(m.fedFunds,2)+'%':'—'}</div></div><div class="macro-tile"><div class="macro-label">CPI YoY</div><div class="macro-val" style="color:${m.cpi!=null?(m.cpi>3?'#ef4444':m.cpi>2?'#f97316':'#10b981'):'#374151'}">${m.cpi!=null?fmt(m.cpi,1)+'%':'—'}</div></div><div class="macro-tile"><div class="macro-label">VIX</div><div class="macro-val" style="color:${vc}">${m.vix?fmt(m.vix,1):'—'}</div></div></div>`; }

function renderBreadth(){
  const el=document.getElementById('mkt-breadth'); if(!el)return;
  const m=MKTX; if(!m){ el.innerHTML='<div class="tech-empty">Breadth data populates on the next morning run.</div>'; return; }
  let h='';
  if(m.vix){ h+=`<div class="risk-line"><span class="risk-name">VIX (volatility)</span><span class="risk-val">${m.vix.level} <span style="font-weight:400;color:#9ca3af">${m.vix.chg||''}</span></span></div>`; }
  if(m.movers){ h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-top:8px">';
    h+='<div><div style="font-size:11px;font-weight:700;color:#10b981;margin-bottom:4px">Gainers</div>'+((m.movers.gainers||[]).map(x=>`<div class="risk-line"><span class="risk-name">${x.t}</span><span class="risk-val pos">${x.chg}</span></div>`).join(''))+'</div>';
    h+='<div><div style="font-size:11px;font-weight:700;color:#ef4444;margin-bottom:4px">Losers</div>'+((m.movers.losers||[]).map(x=>`<div class="risk-line"><span class="risk-name">${x.t}</span><span class="risk-val neg">${x.chg}</span></div>`).join(''))+'</div></div>';
  }
  if(m.news){ const nb=(m.news.bullish+m.news.neutral+m.news.bearish)||1;
    h+=`<div style="margin-top:14px"><div style="font-size:12px;font-weight:700;margin-bottom:6px">News Sentiment <span style="font-weight:400;color:#9ca3af">(${m.news.bullish} bull · ${m.news.neutral} neu · ${m.news.bearish} bear)</span></div><div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:8px"><span style="width:${(m.news.bullish/nb*100).toFixed(1)}%;background:#10b981"></span><span style="width:${(m.news.neutral/nb*100).toFixed(1)}%;background:#d1d5db"></span><span style="width:${(m.news.bearish/nb*100).toFixed(1)}%;background:#ef4444"></span></div>`;
    h+=((m.news.items||[]).map(x=>`<div class="risk-line"><span class="risk-name"><b style="color:${x.sentiment==='bullish'?'#10b981':x.sentiment==='bearish'?'#ef4444':'#6b7280'}">${x.t}</b></span><span class="risk-val" style="font-weight:400;flex:1;text-align:right;color:#374151;font-size:11.5px;margin-left:8px">${x.title}</span></div>`).join(''))+'</div>';
  }
  el.innerHTML=h||'<div class="tech-empty">No breadth data.</div>';
}

function toggleTheme(){ const h=document.documentElement; const t=h.getAttribute('data-theme')==='dark'?'light':'dark'; h.setAttribute('data-theme',t); try{localStorage.setItem('pf_theme',t);}catch(e){} const b=document.getElementById('theme-toggle'); if(b)b.textContent=t==='dark'?'☀️':'🌙'; const m=document.querySelector('meta[name="theme-color"]'); if(m)m.setAttribute('content',t==='dark'?'#000000':'#16213e'); }

/* Privacy mode: blur your $ figures on the Portfolio tab (other tabs are market data, untouched). */
let _moneyMo=null,_moneyT=null;
function _wrapMoney(){
  const root=document.getElementById('page-portfolio'); if(!root)return;
  if(_moneyMo)_moneyMo.disconnect();
  try{
    const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode:function(n){
      if(!n.nodeValue||n.nodeValue.indexOf('$')<0)return NodeFilter.FILTER_REJECT;
      const p=n.parentNode; if(!p)return NodeFilter.FILTER_REJECT;
      if(p.classList&&p.classList.contains('money'))return NodeFilter.FILTER_REJECT;
      const t=p.nodeName; if(t==='SCRIPT'||t==='STYLE'||t==='CANVAS'||t==='TEXTAREA'||t==='INPUT')return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }});
    const g=/\$\d[\d,]*(?:\.\d+)?/g; const nodes=[];
    while(walker.nextNode()){ g.lastIndex=0; if(g.test(walker.currentNode.nodeValue))nodes.push(walker.currentNode); }
    nodes.forEach(function(n){
      const txt=n.nodeValue,frag=document.createDocumentFragment(); let last=0,m; g.lastIndex=0;
      while((m=g.exec(txt))){ if(m.index>last)frag.appendChild(document.createTextNode(txt.slice(last,m.index)));
        const s=document.createElement('span'); s.className='money'; s.textContent=m[0]; frag.appendChild(s); last=m.index+m[0].length; }
      if(last<txt.length)frag.appendChild(document.createTextNode(txt.slice(last)));
      if(n.parentNode)n.parentNode.replaceChild(frag,n);
    });
  }catch(e){}
  if(_moneyMo)_moneyMo.observe(root,{childList:true,subtree:true});
}
function startMoney(){ const root=document.getElementById('page-portfolio'); if(!root)return;
  if(!_moneyMo)_moneyMo=new MutationObserver(function(){ clearTimeout(_moneyT); _moneyT=setTimeout(_wrapMoney,150); });
  _wrapMoney(); }
function stopMoney(){ if(_moneyMo){ _moneyMo.disconnect(); _moneyMo=null; } }
function togglePrivacy(){ const on=!document.body.classList.contains('pf-private'); document.body.classList.toggle('pf-private',on); try{localStorage.setItem('pf_private',on?'1':'0');}catch(e){} const b=document.getElementById('pf-priv'); if(b)b.textContent=on?'🙈':'👁️'; if(on)startMoney(); else stopMoney(); }
window.togglePrivacy=togglePrivacy;
(function(){ try{ if(localStorage.getItem('pf_private')==='1'){ if(document.body)document.body.classList.add('pf-private'); startMoney(); } }catch(e){} })();
window.toggleTheme=toggleTheme;
(function(){ const b=document.getElementById('theme-toggle'); if(b)b.textContent=document.documentElement.getAttribute('data-theme')==='dark'?'☀️':'🌙'; })();

load();
