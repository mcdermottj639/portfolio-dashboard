window.jumpToPick=jumpToPick;
function renderActionPlan(enriched, clusters, totalVal, betaInfo, rsiMap, ovMap, earningsMap, smaMap){
  const el=document.getElementById('plan-content'); if(!el)return;
  rsiMap=rsiMap||{}; ovMap=ovMap||{}; earningsMap=earningsMap||{}; smaMap=smaMap||{};
  const eq=enriched.reduce((s,p)=>s+Math.max(p.val,0),0)||1;
  const beta=betaInfo&&betaInfo.beta!=null?betaInfo.beta:null;
  const perSym=betaInfo&&betaInfo.perSym?betaInfo.perSym:null;
  const onMargin=(()=>{ try{ return (window.__SNAP&&window.__SNAP.stats&&window.__SNAP.stats.cashVal<0); }catch(e){ return false; } })();
  const marginAmt=onMargin?Math.abs(window.__SNAP.stats.cashVal):0;
  const P=v=>'$'+fmt(v, v>=1?2:4); // price label (finer precision under $1)

  // 1a · Harvest losers — banks a loss, frees cash, offsets gains realized in 1b.
  //      Exit is marketable (a GTC limit at the live price): the point is the loss + freed cash, not a few cents.
  const harv=enriched.filter(p=>p.val>=SMALL_THR&&p.pnlD<0&&p.px>0).sort((a,b)=>a.pnlD-b.pnlD);
  const harvProceeds=harv.reduce((s,p)=>s+p.val,0), bankedLoss=harv.reduce((s,p)=>s+p.pnlD,0); // bankedLoss ≤ 0
  const harvRows=harv.map(p=>`<tr><td><span class="sym">${p.symbol}</span></td><td class="tr">${fmt(p.qty,p.qty<1?3:2)}</td><td class="tr">${P(p.px)}</td><td class="tr">${fmtD(p.val)}</td><td class="tr"><span class="neg">${fmtD(p.pnlD)}</span> <span style="color:#9ca3af">(${fmtP(p.pnlP)})</span></td></tr>`).join('');

  // 1b · Right-size winners — trim only the EXCESS above the single-name cap (shackle removed).
  //      Trigger = concentration; RSI/fwd-P/E only annotate urgency. Limit = live price, worked GTC into strength.
  const trims=enriched.filter(p=>p.val>=SMALL_THR&&p.px>0&&p.val/eq>PLAN_SINGLE_CAP).map(p=>{
    const excess=p.val-PLAN_SINGLE_CAP*eq;
    const sh=Math.floor(excess/p.px);
    const proceeds=sh*p.px, gain=sh*(p.px-p.avg);
    const rsi=rsiMap[p.symbol], fpe=parseFloat(ovMap[p.symbol]&&ovMap[p.symbol].ForwardPE)||null;
    const why=[]; if(rsi>=70)why.push('RSI '+fmt(rsi,0)); if(fpe&&fpe>50)why.push('fwd P/E '+fmt(fpe,0));
    return {p,sh,proceeds,gain,curPct:p.val/eq*100,why};
  }).filter(t=>t.sh>0&&t.proceeds>=SMALL_THR).sort((a,b)=>b.proceeds-a.proceeds);
  const trimProceeds=trims.reduce((s,t)=>s+t.proceeds,0), realizedGain=trims.reduce((s,t)=>s+t.gain,0);
  const trimRows=trims.map(t=>`<tr><td><span class="sym">${t.p.symbol}</span> <span style="color:#9ca3af">${fmt(t.curPct,0)}%→${fmt(PLAN_SINGLE_CAP*100,0)}%</span></td><td class="tr">${t.sh}</td><td class="tr">${P(t.p.px)}</td><td class="tr">${fmtD(t.proceeds)}</td><td class="tr"><span class="${t.gain>=0?'pos':'neg'}">${fmtD(t.gain)}</span>${t.why.length?` <span style="color:#9ca3af">· ${t.why.join(' · ')}</span>`:''}</td></tr>`).join('');

  const freed=harvProceeds+trimProceeds;
  const netTaxable=realizedGain+bankedLoss; // gain realized trimming, offset by harvested loss
  // #6 — deployable pool = cash raised from sells + idle settled cash + margin borrowed up to a fixed
  // LEVERAGE CAP (`PLAN_MAX_LEVERAGE`, 1.5×). The cap is anchored to your own equity, not the broker's
  // shifting buying-power offer: allowed fresh loan = (lev−1)×equity = 0.5×equity, i.e. ≤ 50¢ of debt per
  // $1 you own. We only add leverage from a flat start; when already on margin (cashVal<0) the plan
  // deleverages instead (marginUse 0, pay the loan down first below). Never beyond what the broker lends.
  const cashAvail=(()=>{ try{ return Math.max(0,(window.__SNAP&&window.__SNAP.stats&&window.__SNAP.stats.cashVal)||0); }catch(e){ return 0; } })();
  const bpv=(()=>{ try{ return Math.max(0,(window.__SNAP&&window.__SNAP.stats&&window.__SNAP.stats.bpVal)||0); }catch(e){ return 0; } })();
  const equityBase=(()=>{ try{ return Math.max(0,(window.__SNAP&&window.__SNAP.stats&&window.__SNAP.stats.equityVal)||0); }catch(e){ return 0; } })();
  const marginCap=onMargin?0:(PLAN_MAX_LEVERAGE-1)*equityBase; // $ we may borrow before hitting the leverage cap
  const brokerRoom=Math.max(0,bpv-cashAvail);                  // what the broker will actually lend on top of cash
  const marginUse=Math.min(marginCap,brokerRoom);
  const pool=freed+cashAvail+marginUse;
  const poolParts=[]; if(cashAvail>0)poolParts.push(fmtD(cashAvail)+' cash'); if(marginUse>0)poolParts.push(fmtD(marginUse)+` margin (≤${fmt(PLAN_MAX_LEVERAGE,1)}×)`);
  const poolInclTxt=poolParts.length?` · incl. ${poolParts.join(' + ')}`:'';
  const poolNote=marginUse>0
    ? ` The pool borrows up to your ${fmt(PLAN_MAX_LEVERAGE,1)}× leverage cap — ${fmtD(marginUse)} of margin (≤ ${fmt((PLAN_MAX_LEVERAGE-1)*100,0)}¢ of debt per $1 of equity) on top of cash. That's leverage: a 10% market drop hits a ${fmt(PLAN_MAX_LEVERAGE,1)}× book ~${fmt(PLAN_MAX_LEVERAGE*10,0)}%. Size to your own risk tolerance.`
    : (cashAvail>0?' The pool is freed cash + idle settled cash — no margin used here.':'');

  // Concrete sell tickets (cash-raising): trims worked into strength, losers exited marketable.
  const sellOrders=[
    ...trims.map(t=>({side:'SELL',sym:t.p.symbol,qty:t.sh,limit:t.p.px,note:'trim to '+fmt(PLAN_SINGLE_CAP*100,0)+'% — GTC limit, sell into strength'})),
    ...harv.map(p=>({side:'SELL',sym:p.symbol,qty:+fmt(p.qty,p.qty<1?3:2),limit:p.px,note:'harvest the loss — marketable exit'}))
  ];

  // Step 2 helpers — ballast (lowest-β held), defensive sleeves, oversold high-conviction add.
  const lowBeta=perSym?enriched.filter(p=>p.val>0&&p.px>0&&perSym[p.symbol]!=null&&perSym[p.symbol]<0.9).map(p=>({p,b:perSym[p.symbol]})).sort((a,b)=>a.b-b.b):[];
  const defensive=enriched.filter(p=>p.val>0&&p.px>0&&(ASSET_MAP[p.symbol]==='Bonds'||ASSET_MAP[p.symbol]==='Gold/Commodities')).sort((a,b)=>b.val-a.val);
  const defName=defensive.length?defensive.slice(0,2).map(p=>p.symbol).join(' / ')+' (held)':'short-duration Treasuries or a defensive sector ETF';
  // Don't pitch adding to a name we're simultaneously trimming for concentration or harvesting (wash-sale).
  const raiseSet=new Set([...trims.map(t=>t.p.symbol),...harv.map(p=>p.symbol)]);
  const addCand=enriched.filter(p=>p.val>=SMALL_THR&&p.px>0&&!raiseSet.has(p.symbol)&&rsiMap[p.symbol]!=null&&rsiMap[p.symbol]<=33&&p.pnlP>-40).sort((a,b)=>rsiMap[a.symbol]-rsiMap[b.symbol])[0]||null;
  // The redeploy's high-conviction sleeve targets the Plan & Picks list directly — but as a SET, not a
  // single name. Up to 3 ideas you're not already over-weight in (and not simultaneously trimming/
  // harvesting), diversified by sector AND correlated cluster, skipping any that would pile onto a cluster
  // already over the cap. PRIMARY = the 3 vetted picks (hand-built levels); when those don't fill the
  // sleeve (held at cap / hot cluster / sector collision), BACKFILL from the scored top-10 candidates
  // (synthesized 50-DMA levels, labelled "screen backfill") rather than dumping the remainder to cash.
  const heldPct={},heldVal={}; enriched.forEach(p=>{ if(p.val>0){ heldPct[p.symbol]=p.pct; heldVal[p.symbol]=p.val; } });
  const clPctOf=(sym)=>{ try{ const c=clusterFor(sym); return c&&clusters[c]?clusters[c].pct:0; }catch(e){ return 0; } };
  const pickPickTickers=new Set(((typeof PICK_PICKS!=='undefined'&&Array.isArray(PICK_PICKS))?PICK_PICKS:[]).map(p=>p&&p.ticker).filter(Boolean));
  const pickAdds=(()=>{
    const out=[],usedSec=new Set();
    const eligible=(ticker,sector)=>{
      if(!ticker)return false;
      if(raiseSet.has(ticker))return false;                                     // #2 — not a name we're raising from
      if(heldPct[ticker]!=null&&heldPct[ticker]>=PLAN_SINGLE_CAP*100)return false; // already at the single-name cap
      if(clPctOf(ticker)>=PLAN_CLUSTER_CAP*100)return false;                     // #2 — would worsen an over-cap cluster
      const sec=String(sector||'').split('·')[0].trim();
      if(sec&&usedSec.has(sec))return false;                                    // #1 — sector-diversify the set
      return true;
    };
    const mark=(sector)=>{ const sec=String(sector||'').split('·')[0].trim(); if(sec)usedSec.add(sec); };
    // Primary: the 3 vetted picks with full hand-built levels.
    const picks=((typeof PICK_PICKS!=='undefined'&&Array.isArray(PICK_PICKS))?PICK_PICKS:[]);
    for(let i=0;i<picks.length&&out.length<3;i++){ const p=picks[i]; if(!p||!p.ticker)continue;
      if(!eligible(p.ticker,p.sector))continue; mark(p.sector); out.push({p,rank:i+1,backfill:false}); }
    // Backfill: only if the vetted picks left the sleeve unfilled — reach into the scored top-10.
    if(out.length<3){ const cands=((typeof PICK_CANDIDATES!=='undefined'&&Array.isArray(PICK_CANDIDATES))?PICK_CANDIDATES:[]);
      for(let i=0;i<cands.length&&out.length<3;i++){ const c=cands[i]; if(!c||!c.ticker)continue;
        if(pickPickTickers.has(c.ticker))continue;                              // already weighed as a top-3 pick
        if(!eligible(c.ticker,c.sector))continue;
        const sp=synthPickFromCandidate(c,smaMap); if(!sp)continue;
        mark(c.sector); out.push({p:sp,rank:c.rank||(i+1),backfill:true}); } }
    return out;
  })();
  // #7 — historical conviction from the graded Track Record, surfaced inline on the redeploy.
  const trk=(typeof picksTrackStats==='function')?picksTrackStats():null;
  // Buy-entry levels anchored to the 50-day average: pullback zone + a starter limit at the live price.
  const anchor=(p)=>{ const s=smaMap[p.symbol]; const px=p.px;
    if(s==null||!isFinite(s)) return {note:`starter limit ≤ ${P(px)}`, zone:`≤ ${P(px)}`};
    if(px<=s) return {note:`below its 50-DMA ${P(s)} — buy ≤ ${P(px)}, a reclaim of ${P(s)} confirms`, zone:`${P(Math.min(px,s*0.98))}–${P(px)}`};
    return {note:`extended above its 50-DMA ${P(s)} — scale: ½ ≤ ${P(px)}, ½ on a dip toward ${P(s)}`, zone:`${P(s)}–${P(px)}`};
  };

  // Step 3 helpers — top holdings, biggest cluster, fragile (highest-β) leg, near-term earnings.
  const top=[...enriched].filter(p=>p.val>0).sort((a,b)=>b.val-a.val);
  const t1=top[0]||{symbol:'—',val:0}, t2=top[1]||{symbol:'—',val:0};
  const t1p=t1.val/eq*100, t2p=t2.val/eq*100;
  const bigCl=Object.entries(clusters).filter(([,c])=>c.matched&&c.matched.length>1).sort((a,b)=>b[1].pct-a[1].pct)[0]||null;
  const fragile=perSym?enriched.filter(p=>p.val>0&&p.pct>=1.5&&perSym[p.symbol]!=null).map(p=>({p,b:perSym[p.symbol]})).sort((a,b)=>b.b-a.b)[0]:null;
  const earnT=[t1,t2].map(t=>({t,e:earningsMap[t.symbol]})).filter(x=>x.e&&x.e.daysAway!=null&&x.e.daysAway<=21).sort((a,b)=>a.e.daysAway-b.e.daysAway);

  el.innerHTML=`
    <div class="box-info" style="border-radius:10px;padding:10px 12px;font-size:12px;line-height:1.5;margin-bottom:12px">A standing playbook — <b>raise cash</b> (harvest losers <i>and</i> right-size any over-weight winner) → <b>redeploy</b> to pull risk down → <b>guardrails</b>. Winners are trimmed only where one name is above <b>${fmt(PLAN_SINGLE_CAP*100,0)}%</b> of equity: position discipline, not a call to sell a good stock.${beta!=null?` Book beta ≈ <b>${fmt(beta,2)}</b> — a 10% market drop ≈ ${fmtP(-10*beta)}.`:''}</div>

    <div class="col-title">1 · Raise cash <span class="card-hint">(≈ ${fmtD(freed)} freed)</span></div>
    <div style="font-size:11.5px;font-weight:700;color:var(--text);opacity:.75;margin:2px 0 6px">Harvest losers${harv.length?` — frees ${fmtD(harvProceeds)}, banks ${fmtD(bankedLoss)} loss`:''}</div>
    ${harv.length?`<table><thead><tr><th>Sell</th><th class="tr">Shares</th><th class="tr">Limit</th><th class="tr">Proceeds</th><th class="tr">Loss banked</th></tr></thead><tbody>${harvRows}<tr style="background:var(--surface-2);font-weight:700"><td>Total</td><td class="tr"></td><td class="tr"></td><td class="tr">${fmtD(harvProceeds)}</td><td class="tr neg">${fmtD(bankedLoss)}</td></tr></tbody></table>`:`<div class="tech-empty">No positions in the red above $${SMALL_THR}.</div>`}
    <div style="font-size:11.5px;font-weight:700;color:var(--text);opacity:.75;margin:12px 0 6px">Right-size winners — any name above ${fmt(PLAN_SINGLE_CAP*100,0)}% of equity</div>
    ${trims.length?`<table><thead><tr><th>Trim</th><th class="tr">Shares</th><th class="tr">Limit</th><th class="tr">Proceeds</th><th class="tr">Realized gain · why now</th></tr></thead><tbody>${trimRows}<tr style="background:var(--surface-2);font-weight:700"><td>Total</td><td class="tr"></td><td class="tr"></td><td class="tr">${fmtD(trimProceeds)}</td><td class="tr ${realizedGain>=0?'pos':'neg'}">${fmtD(realizedGain)}</td></tr></tbody></table>`:`<div class="tech-empty">No single name is above ${fmt(PLAN_SINGLE_CAP*100,0)}% of equity — nothing forced to trim.${top[0]?` Largest is ${t1.symbol} at ${fmt(t1p,1)}%.`:''}</div>`}
    ${trims.length?`<div class="fund-note">Tax netting: the trims realize ≈ <b>${fmtD(realizedGain)}</b> of gains${harv.length?`, offset by the ${fmtD(bankedLoss)} loss banked above → <b>net taxable ≈ ${fmtD(netTaxable)}</b>`:''}. ${harv.length?(netTaxable<0?'The harvest more than covers the gain — the excess loss carries forward. ':'Harvesting alongside the trim is what keeps the tax bill small. ')+'Mind the 30-day wash-sale window on the harvested names. ':'Gains are taxable — favour long-term lots (held &gt; 1yr) or pair with a loss harvest when one appears. '}Not tax advice.</div>`:(harv.length?`<div class="fund-note">Wash-sale: don’t rebuy the harvested names for 30 days. The real win is redeploying the proceeds out of the concentrated book.</div>`:'')}
    ${sellOrders.length?`<div style="margin-top:8px">${chatBtn('plan-sell',planOrdersPrompt(sellOrders,'Raise cash for the redeploy plan — harvest losers + right-size over-weight winners'),'🤖 Build '+(sellOrders.length>1?('these '+sellOrders.length+' sells'):'this sell')+' with Claude')}</div>`:''}

    <div class="col-title" style="margin-top:14px">2 · Redeploy the pool <span class="card-hint">(≈ ${fmtD(pool)} to put to work${poolInclTxt})</span></div>
    ${(()=>{
      if(pool<=0) return `<div class="tech-empty">Nothing freed above and no cash or margin headroom — no redeploy step until Step 1 raises cash.</div>`;
      // Margin clears automatically when Step 1's sells settle — so carve it off the top as already-spent,
      // then split the remainder. Tilt to ballast when beta is high.
      const payDown=onMargin?Math.min(freed,marginAmt):0; // the loan nets down against sale proceeds at the broker
      const rem=pool-payDown;
      const hiBeta=beta!=null&&beta>1.1;
      let wB=hiBeta?0.55:0.45, wD=0.30, wO=hiBeta?0.15:0.25;
      const sz=f=>` <span style="color:#9ca3af">≈ ${fmtD(f)}</span>`;
      const rows=[], buyOrders=[];
      const bar=()=>rows.length?'border-top:1px solid var(--surface-2)':'';
      if(payDown>0) rows.push(`<div style="padding:6px 0"><b style="color:#0969da">After clearing margin</b>${sz(payDown)} — selling above automatically pays your loan down first (it nets against the proceeds at the broker — not a separate order); only the rest below is new buying power.</div>`);
      // Low-beta ballast → concrete buy on the lowest-β held name.
      const bT=lowBeta.length?lowBeta[0].p:null;
      if(bT){ const d=rem*wB, q=Math.floor(d/bT.px), a=anchor(bT); if(q>0){ buyOrders.push({side:'BUY',sym:bT.symbol,qty:q,limit:bT.px,zone:a.zone,note:'low-β ballast'});
        rows.push(`<div style="padding:6px 0;${bar()}"><b style="color:#0969da">Low-beta ballast</b>${sz(d)} — <b>buy ~${q} sh ${bT.symbol}</b> (β ≈ ${fmt(lowBeta[0].b,2)}) · limit ${a.zone} · ${a.note}. Most direct way to pull portfolio beta down.</div>`); }
        else rows.push(`<div style="padding:6px 0;${bar()}"><b style="color:#0969da">Low-beta ballast</b>${sz(d)} — add to ${bT.symbol} (β ≈ ${fmt(lowBeta[0].b,2)}, held). Most direct way to pull beta down.</div>`); }
      else rows.push(`<div style="padding:6px 0;${bar()}"><b style="color:#0969da">Low-beta ballast</b>${sz(rem*wB)} — a broad-market or low-β holding. Most direct way to pull portfolio beta down.</div>`);
      // Defensive income → concrete buy on the largest held bond/gold sleeve.
      const dT=defensive.length?defensive[0]:null;
      if(dT){ const d=rem*wD, q=Math.floor(d/dT.px), a=anchor(dT); if(q>0){ buyOrders.push({side:'BUY',sym:dT.symbol,qty:q,limit:dT.px,zone:a.zone,note:'defensive sleeve'});
        rows.push(`<div style="padding:6px 0;border-top:1px solid var(--surface-2)"><b style="color:#0969da">Defensive income</b>${sz(d)} — <b>buy ~${q} sh ${dT.symbol}</b> · limit ${a.zone}. Ballast + yield, low correlation to the growth book.</div>`); }
        else rows.push(`<div style="padding:6px 0;border-top:1px solid var(--surface-2)"><b style="color:#0969da">Defensive income</b>${sz(d)} — ${defName}. Ballast + yield, low correlation to the growth book.</div>`); }
      else rows.push(`<div style="padding:6px 0;border-top:1px solid var(--surface-2)"><b style="color:#0969da">Defensive income</b>${sz(rem*wD)} — ${defName}. Ballast + yield, low correlation to the growth book.</div>`);
      // High-conviction sleeve → redeploy across today's top picks (#1–#3 from pickAdds), each with its
      // OWN entry/stop (read from pickLevels so the plan and the card never disagree), sized risk-based
      // (#3, 1% of book at the stop) and clamped so an add can't push a name past the single-name cap and
      // can't outrun the bucket it draws on. Earnings inside the swing window get flagged (#4). Falls back
      // to an oversold held name, then cash.
      const convBucket=rem*wO;
      const riskBudget=totalVal*0.01; // 1% of book at risk per add — matches the pick-card buy ticket
      const planAdds=[];              // {sym,px,zone,limit,stop,tp1,rank,shares,dollars,why,erWarn}
      if(pickAdds.length){
        const per=convBucket/pickAdds.length;
        for(const x of pickAdds){ const p=x.p, lv=pickLevels(p), px=lv.px; if(!(px>0))continue;
          const room=(PLAN_SINGLE_CAP*eq)-(heldVal[p.ticker]||0);                 // $ before this name hits the cap

          const bucketSh=Math.floor(per/px);
          const riskSh=(lv.stop>0&&px>lv.stop)?Math.floor(riskBudget/(px-lv.stop)):bucketSh;
          const q=Math.max(0,Math.min(bucketSh,capSh,riskSh));                    // #3 — risk-based AND cap-aware AND pool-bounded
          const er=(typeof azEarn==='function')?azEarn(p.ticker):null;           // #4 — earnings inside the swing window
          const erWarn=(er&&er.days!=null&&er.days>=0&&er.days<=14)?` <span style="color:#b45309">⚠️ earnings in ${er.days===0?'<1d':er.days+'d'} — size for the gap or wait for the print</span>`:'';
          const why=x.backfill

            : `<b>#${x.rank} pick</b>${p.signal?' · '+p.signal:''} — entry ${lv.zone}${lv.tp1?`, target $${lv.tp1}`:''}, stop ${P(lv.stop)}`;
          planAdds.push({sym:p.ticker,px,zone:lv.zone,limit:lv.limit,stop:lv.stop,tp1:lv.tp1,rank:x.rank,backfill:x.backfill,shares:q,dollars:q*px,erWarn,why});
        }

        const stop=(s!=null&&isFinite(s)&&s<px)?Math.min(s*0.97,px*0.93):px*0.90;

        planAdds.push({sym:addCand.symbol,px,zone:a.zone,limit:px,stop,tp1:null,rank:null,shares:q,dollars:q*px,erWarn:'',
          why:`oversold (RSI ${fmt(rsiMap[addCand.symbol],0)}) · limit ${a.zone}, stop ${P(stop)} — a dip-buy rather than parking it all in cash`});
      }
      const deployed=planAdds.reduce((s,a)=>s+a.dollars,0);
      // #5 — stash the plan's sized PRIMARY picks (not synth backfills, which have no Top-3 card) so the
      // cards can badge "the plan picked this"; repaint them.
      try{ const m={}; planAdds.forEach(a=>{ if(a.rank&&!a.backfill&&a.shares>0)m[a.sym]={rank:a.rank,shares:a.shares,dollars:a.dollars}; }); window.__PLAN_ADDS=m;

      if(planAdds.length){

        const convL=(trk&&trk.hitRate!=null&&(trk.wins+trk.losses)>=3)?` <span style="color:#9ca3af">· track record: ${trk.hitRate}% hit TP1+${trk.avgRet!=null?', avg '+(trk.avgRet>=0?'+':'')+fmt(trk.avgRet,1)+'%':''} (${trk.wins+trk.losses} resolved)</span>`:'';
        const scope=planAdds.length>1?`split across ${planAdds.length} ideas`:`into a single idea`;
        const backNote=nBack>0?` <span style="color:#9ca3af">(${nReal} vetted pick${nReal===1?'':'s'}${nBack?`, ${nBack} screen backfill from the top 10`:''})</span>`:'';
        const hdr=`<div style="padding:6px 0;border-top:1px solid var(--surface-2)"><b style="color:#0969da">High-conviction add${planAdds.length>1?'s':''}</b>${sz(convBucket)} — ${scope}${backNote}${convL}:</div>`;
        const items=planAdds.map(a=>{ const lbl=(a.rank&&!a.backfill)?`<span class="dp-link" onclick="jumpToPick('${a.sym}')">${a.sym}</span>`:a.sym;
          return `<div style="padding:5px 0 5px 10px;font-size:12px;line-height:1.45;border-top:1px dashed var(--surface-2)">${a.shares>0?`<b>buy ~${a.shares} sh ${lbl}</b> <span style="color:#9ca3af">≈ ${fmtD(a.dollars)}</span>`:`<b>${lbl}</b> <span style="color:#9ca3af">(no size — already at your cap / risk budget)</span>`} · ${a.why}${a.erWarn}</div>`; }).join('');
        rows.push(hdr+items);
        planAdds.forEach(a=>{ if(a.shares>0)buyOrders.push({side:'BUY',sym:a.sym,qty:a.shares,limit:a.limit,zone:a.zone,stop:a.stop,note:a.backfill?('screen backfill · #'+a.rank+' of top 10'):a.rank?('high-conviction add · #'+a.rank+' pick'):'oversold high-conviction add'}); });
        const leftover=convBucket-deployed;
        if(leftover>convBucket*0.15) rows.push(`<div style="padding:5px 0 5px 10px;font-size:11.5px;color:#9ca3af;border-top:1px dashed var(--surface-2)">Cap/risk limits leave ≈ ${fmtD(leftover)} of this sleeve undeployed — hold as cash for pullbacks.</div>`);
      } else {
        try{ window.__PLAN_ADDS={}; }catch(e){}
        rows.push(`<div style="padding:6px 0;border-top:1px solid var(--surface-2)"><b style="color:#0969da">Cash cushion</b>${sz(convBucket)} — ${onMargin?'hold against the margin; dry powder for pullbacks.':'dry powder for pullbacks and to stay nimble.'}</div>`);
      }
      const buyBtn=buyOrders.length?`<div style="margin-top:8px">${chatBtn('plan-buy',planOrdersPrompt(buyOrders,'Redeploy the freed cash into ballast / defensive / high-conviction names'),'🤖 Build '+(buyOrders.length>1?('these '+buyOrders.length+' buys'):'this buy')+' with Claude')}</div>`:'';
      return `<div style="font-size:12.5px;color:var(--text);opacity:.85;line-height:1.5">${rows.join('')}<div class="fund-note">${payDown>0?'Margin paid down first, then a ':'A '}${hiBeta?'beta-tilted':'balanced'} split of the remaining ${fmtD(rem)}. Buys are sized from each bucket at the live price; the 50-day average is the pullback anchor.${poolNote} Indicative — re-check the live mark and your buying power before each fill.</div>${buyBtn}</div>`;
    })()}

    <div class="col-title" style="margin-top:14px">3 · Guardrails <span class="card-hint">(standing trim &amp; stop rules)</span></div>

      <div style="padding:4px 0">▸ Any one name tops <b>${fmt(PLAN_SINGLE_CAP*100,0)}%</b> of equity → trim the excess (Step 1b sizes it) <span style="color:#9ca3af">(now ${t1.symbol} ${fmt(t1p,1)}% / ${t2.symbol} ${fmt(t2p,1)}%)</span>.</div>
      ${bigCl?`<div style="padding:4px 0">▸ <b>${bigCl[0]}</b> cluster tops <b>${fmt(PLAN_CLUSTER_CAP*100,0)}%</b> combined → de-risk across the group <span style="color:#9ca3af">(now ${fmt(bigCl[1].pct,1)}%)</span>.</div>`:''}

/* ═══ Agentic Portfolio (the recommended portfolio for the ••••3900 cash account) ═══
   Standalone card — formerly Step 4 of the Action Center, split out because the recommended
   portfolio is now the blueprint for the agentic cash account, not a restructuring of the margin
   book. Builds a from-scratch, long-only, UNLEVERED target from a FULLY-INDEPENDENT universe
   (top scored picks ∪ mega-cap leaders ∪ SPY/QQQ index core ∪ whatever ••••3900 already holds —
   the margin account is ignored), sector-diversified + conviction-weighted, capped at
   PLAN_SINGLE_CAP/name, sized to the account's own equity (cash + positions). Renders the target vs.
   the account's ACTUAL holdings vs. per-name drift, with a deploy/rebalance hand-off. Reads
   data.agentic (the account's real cash + positions, emitted by the producer); no-ops cleanly until
   picks + DOM exist, and shows target weights only until the first agentic snapshot lands. */
const AGENTIC_DRIFT=5; // pp — rebalance a name once it drifts this far from target (drift-triggered)
function renderAgenticCard(){
  const el=document.getElementById('agentic-content'); if(!el)return;
  const A=(window.__DATA&&window.__DATA.agentic)||null;

  const investedNow=heldPos.reduce((s,p)=>s+Math.max(0,+p.value||0),0);
  const equity=A?(+A.equity||(cash+investedNow)):0;
  const book=Math.max(0,equity);            // unlevered: the account's own equity IS the book (1×)
  const P=(v)=>'$'+(+v).toFixed(2);
  const ovMap=(window.__SNAP&&window.__SNAP.ovMap)||{};
  const smaMap=(window.__SNAP&&window.__SNAP.smaMap)||{};
  const secOfPick=(c)=>(typeof pickSector==='function')?pickSector(c):(String(c.sector||'').split('·')[0].trim()||'—');
  const secOf=(sym)=>{ const o=ovMap[sym]; let s=o&&o.Sector?titleCase(o.Sector):null;
    if(s&&/^(N\/?A|None|Trade Commercial)$/i.test(s))s=null;
    if(!s&&typeof ASSET_MAP!=='undefined'&&ASSET_MAP[sym]&&ASSET_MAP[sym]!=='Stocks')s=ASSET_MAP[sym];
    return s||'—'; };
  const pxOf=(sym)=>{ const h=heldPos.find(p=>p.symbol===sym); if(h&&h.px>0)return h.px;
    const pk=(typeof azPick==='function')?azPick(sym):null; if(pk&&pk.price>0)return pk.price;
    const q=(typeof azQuote==='function')?azQuote(sym):null;
    if(q){ const p=parseFloat(q.last_extended_hours_trade_price||q.last_trade_price||q.ask_price||q.mark_price||q.adjusted_previous_close||0)||0; if(p>0)return p; }
    return 0; };
  // ── target names: prefer the persisted research-driven target (data.agentic.target, refreshed weekly
  //    by the deep multi-factor research) so the card shows drift vs. the REAL deployed basket; fall back
  //    to an on-the-fly heuristic pool (top picks + leaders + index + held) only when it's absent. ──
  const T=(A&&A.target&&Array.isArray(A.target.names)&&A.target.names.length)?A.target.names:null;
  const heldValOf=(sym)=>{ const h=heldPos.find(p=>p.symbol===sym); return h?Math.max(0,+h.value||0):0; };
  let chosen, targetSrc, targetAsOf=(A&&A.target&&A.target.asOf)||null;
  if(T){
    targetSrc='research';

      return {sym,sector:n.sector||secOf(sym),tgt:+n.weightPct||0,px:pxOf(sym),curVal:cv,held:cv>0,kind:'',_stop:+n.stop||0,_tp:+n.target||0}; }).filter(Boolean);
    const tsum=chosen.reduce((s,x)=>s+x.tgt,0)||1; chosen.forEach(x=>{ x.tgt=x.tgt/tsum*100; });

  } else {
    targetSrc='heuristic';
    // candidate pool — fully independent of the margin book
    const pool=new Map();
  heldPos.forEach(p=>{ pool.set(p.symbol,{sym:p.symbol,sector:secOf(p.symbol),score:6,curVal:Math.max(0,+p.value||0),px:p.px||pxOf(p.symbol),held:true,kind:''}); });
  const pickRows=[...((typeof PICK_PICKS!=='undefined'&&Array.isArray(PICK_PICKS))?PICK_PICKS:[]),
                 ...((typeof PICK_CANDIDATES!=='undefined'&&Array.isArray(PICK_CANDIDATES))?PICK_CANDIDATES:[])];
  pickRows.forEach(c=>{ const t=c&&c.ticker; if(!t)return; const comp=(typeof c.composite==='number')?c.composite:null;
    if(pool.has(t)){ const e=pool.get(t); if(!e.kind)e.kind='pick'; if(comp!=null)e.score=Math.max(e.score,comp); }
    else if(comp!=null){ pool.set(t,{sym:t,sector:secOfPick(c)||'—',score:comp,curVal:0,px:pxOf(t),held:false,kind:'pick'}); } });
  [{sym:'SPY',base:6.4},{sym:'QQQ',base:5.9}].forEach(ix=>{ if(pool.has(ix.sym))return; const px=pxOf(ix.sym);
    let s=ix.base; const sm=smaMap[ix.sym]; if(sm&&px>0)s+= px>=sm?0.4:-0.6;
    pool.set(ix.sym,{sym:ix.sym,sector:'Index',score:s,curVal:0,px,held:false,kind:'index'}); });
  const LEADERS=(()=>{ try{ const dl=window.__DATA&&window.__DATA.leaders; if(Array.isArray(dl)&&dl.length)return dl; }catch(e){}
    return [{sym:'NVDA',sector:'Technology'},{sym:'MSFT',sector:'Technology'},{sym:'AAPL',sector:'Technology'},{sym:'AVGO',sector:'Technology'},{sym:'GOOGL',sector:'Communication Services'},{sym:'META',sector:'Communication Services'},{sym:'AMZN',sector:'Consumer Cyclical'},{sym:'LLY',sector:'Healthcare'},{sym:'UNH',sector:'Healthcare'},{sym:'JPM',sector:'Financial Services'},{sym:'V',sector:'Financial Services'},{sym:'COST',sector:'Consumer Defensive'},{sym:'WMT',sector:'Consumer Defensive'},{sym:'XOM',sector:'Energy'}]; })();
  LEADERS.forEach(ld=>{ const sym=ld&&ld.sym; if(!sym||pool.has(sym))return; const px=pxOf(sym); if(!(px>0))return;
    let s=6; const sm=smaMap[sym]; if(sm)s+= px>=sm?0.4:-0.4;
    pool.set(sym,{sym,sector:ld.sector||secOf(sym),score:s,curVal:0,px,held:false,kind:'leader'}); });
  // ── selection: incumbents (current agentic holdings) guaranteed in, best non-held fill, sector-capped ──
  const TOTAL_CAP=15, PER_SEC=4;

    chosen=heldArr.slice(0,TOTAL_CAP);

  // ── render ──
  const shFmt=(n)=>{ const a=Math.abs(n); return a>=10?fmt(a,0):fmt(a,2); };
  const holdThr=Math.max(5,(book||0)*0.01);
  const kindTag=x=>x.held?'':(x.kind==='index'?' <span style="color:#9ca3af;font-size:10px">index</span>':(x.kind==='pick'?' <span style="color:#9ca3af;font-size:10px">pick</span>':(x.kind==='leader'?' <span style="color:#9ca3af;font-size:10px">leader</span>':'')));
  const tradeCell=x=>{ if(book<=0||x.shares==null) return '<span style="color:#9ca3af">—</span>';

  const driftCell=x=>{ if(!x.held||book<=0) return '<span style="color:#9ca3af">—</span>';
    const hot=Math.abs(x.drift)>=AGENTIC_DRIFT; const col=hot?(x.drift>0?'#991b1b':'#0969da'):'#9ca3af';

  // ── Your holdings — performance: cost basis · day · YTD · unrealized P&L for what ••••3900 actually

  let perfBlock='';

    const pctCell=(v,dec=1)=>{ if(v==null||!isFinite(v))return '<span style="color:#9ca3af">—</span>';

    let totCost=0,totVal=0,totDayNow=0,totDayPrev=0,totYtdNow=0,totYtdBase=0;

      const q=azQuote(p.symbol); const prev=q?(parseFloat(q.adjusted_previous_close||q.previous_close||0)||0):0;

/* ═══ Holdings heatmap (treemap) ═══
   Tiles sized by position value, colored by day move or total P&L. */
function squarify(items, x, y, w, h){
  /* items: [{value, ...}] · returns [{d, x, y, w, h}] in the same px coords. */
  const rects=[]; const data=items.slice().filter(d=>d.value>0).sort((a,b)=>b.value-a.value);
  const sum=data.reduce((s,d)=>s+d.value,0); if(sum<=0||w<=0||h<=0) return rects;
  const scale=(w*h)/sum; const nodes=data.map(d=>({d, area:d.value*scale}));
  let X=x,Y=y,W=w,H=h;
  function worst(row, side){ let s=0,mn=Infinity,mx=0; for(const r of row){ s+=r.area; if(r.area<mn)mn=r.area; if(r.area>mx)mx=r.area; } return Math.max((side*side*mx)/(s*s),(s*s)/(side*side*mn)); }
  let i=0;
  while(i<nodes.length){
    const side=Math.min(W,H); let row=[nodes[i]]; let j=i+1;
    while(j<nodes.length){ const test=row.concat(nodes[j]); if(worst(test,side)<=worst(row,side)){ row=test; j++; } else break; }
    const rowArea=row.reduce((s,r)=>s+r.area,0); const thick=rowArea/side;
    if(W>=H){ let oy=Y; for(const r of row){ const rh=r.area/thick; rects.push({d:r.d,x:X,y:oy,w:thick,h:rh}); oy+=rh; } X+=thick; W-=thick; }
    else { let ox=X; for(const r of row){ const rw=r.area/thick; rects.push({d:r.d,x:ox,y:Y,w:rw,h:thick}); ox+=rw; } Y+=thick; H-=thick; }
    i=j;
  }
  return rects;
}
function hmColor(pct, div, gold){

  const t=Math.max(-1,Math.min(1,pct/div)); const mag=Math.abs(t);
  const l=gold?(26+mag*26):(30+mag*22); const s=gold?88:60; const h=pct>=0?(gold?158:152):(gold?342:356);
  return 'hsl('+h+' '+s+'% '+l+'%)';
}

/* ═══ Risk-adjusted metrics (volatility · Sharpe · max drawdown), YTD annualized ═══ */
function computeRiskMetrics(histMap, enriched, syms, macro){
  const wsyms=syms.filter(s=>histMap[s]&&histMap[s].length>20);
  const wmap={}; let wsum=0;
  for(const s of wsyms){ const p=enriched.find(e=>e.symbol===s); if(p&&p.val>0){ wmap[s]=p.val; wsum+=p.val; } }
  const keys=Object.keys(wmap); if(wsum<=0||!keys.length) return null;
  let minLen=Infinity; for(const s of keys) minLen=Math.min(minLen,histMap[s].length);
  if(!isFinite(minLen)||minLen<25) return null;
  const dr=new Array(minLen-1).fill(0);
  for(const s of keys){ const ser=histMap[s].slice(-minLen); const w=wmap[s]/wsum; for(let i=1;i<minLen;i++){ dr[i-1]+=w*(ser[i].c/ser[i-1].c-1); } }
  const N=dr.length; const mean=dr.reduce((a,b)=>a+b,0)/N;
  let v=0; for(const x of dr)v+=(x-mean)*(x-mean); v/=N; const sd=Math.sqrt(v);
  const volAnn=sd*Math.sqrt(252)*100, retAnn=mean*252*100;
  const rf=(macro&&macro.tenYrYield)?macro.tenYrYield:4.3;
  const sharpe=volAnn>0?(retAnn-rf)/volAnn:null;
  let cum=1,peak=1,mdd=0; for(const x of dr){ cum*=(1+x); if(cum>peak)peak=cum; const d=cum/peak-1; if(d<mdd)mdd=d; }
  const eq=enriched.reduce((s,p)=>s+Math.max(p.val,0),0)||1;
  return { vol:volAnn, sharpe, maxDD:mdd*100, retAnn, cov:wsum/eq*100 };
}

/* Make every card collapsible (cards rendered later are caught via MutationObserver). */
(function(){
  function enhance(card){
    var title=card.querySelector(':scope > .card-title');
    if(!title || title.dataset.coll) return;
    title.dataset.coll='1';
    if(title.classList.contains('collapsible')) return; // already wired (has its own toggleSection)
    var body=document.createElement('div'); body.className='card-body';
    var n=title.nextSibling; while(n){ var nx=n.nextSibling; body.appendChild(n); n=nx; }
    card.appendChild(body);
    if(!title.querySelector('.chevron')){ var ch=document.createElement('span'); ch.className='chevron'; ch.textContent='▼'; title.appendChild(ch); }
    title.classList.add('collapsible');
    title.addEventListener('click',function(e){
      // Only a bare-header tap collapses. Ignore taps on interactive controls that live in the
      // header (e.g. the heatmap "Day / vs S&P YTD" toggles) — otherwise one tap both flips the
      // toggle AND collapses the card.
      if(e.target.closest('button, a, select, input, label')) return;
      var hide=body.style.display!=='none'; body.style.display=hide?'none':'';
      var c=title.querySelector('.chevron'); if(c)c.style.transform=hide?'rotate(-90deg)':'';
    });
  }
  // Wrap any wide table in a horizontal-scroll container so it never spills the page.
  function wrapTables(root){ try{ (root||document).querySelectorAll('table').forEach(function(t){
    var p=t.parentElement; if(!p||p.dataset.tw)return;
    if((p.style&&p.style.overflowX==='auto'))return;
    var w=document.createElement('div'); w.dataset.tw='1'; w.style.overflowX='auto'; w.style.webkitOverflowScrolling='touch';
    p.insertBefore(w,t); w.appendChild(t);
  }); }catch(e){} }
  function scan(root){ try{ (root||document).querySelectorAll('.card').forEach(enhance); wrapTables(root); }catch(e){} }
  function start(){
    scan(document);
    try{
      var mo=new MutationObserver(function(muts){
        for(var i=0;i<muts.length;i++){ var a=muts[i].addedNodes;
          for(var j=0;j<a.length;j++){ var nd=a[j]; if(!nd||nd.nodeType!==1)continue;
            if(nd.classList&&nd.classList.contains('card'))enhance(nd);
            if(nd.querySelectorAll)nd.querySelectorAll('.card').forEach(enhance); }
          wrapTables(document); }
      });
      ['page-portfolio','page-markets','page-picks','page-options','page-analyze'].forEach(function(id){ var el=document.getElementById(id); if(el)mo.observe(el,{childList:true,subtree:true}); });
    }catch(e){}
  }
  if(document.readyState!=='loading')start(); else document.addEventListener('DOMContentLoaded',start);
})();

(function(){
  var PAGES=['page-portfolio','page-markets','page-picks','page-options','page-analyze'];
  var NAVSEQ=0; // globally-unique card ids so re-renders never collide with stale ids
  function titleOf(card){
    var t=card.querySelector(':scope > .card-title'); if(!t)return null;
    var c=t.cloneNode(true);
    c.querySelectorAll('.chevron,.card-hint,.help-btn').forEach(function(x){ x.remove(); });
    var s=(c.textContent||'').replace(/\s+/g,' ').trim();
    return s||null;
  }
  // Top offset to clear the sticky tab bar (which wraps to 2 rows on mobile) — measured live.
  function topOffset(){
    var tb=document.querySelector('.tabbar');
    if(tb){ var r=tb.getBoundingClientRect(); if(r.height>0)return Math.max(0,r.bottom)+8; }
    return 96;
  }
  function jump(id){
    var card=document.getElementById(id); if(!card)return;
    var body=card.querySelector(':scope > .card-body');
    if(body&&body.style.display==='none'){ body.style.display=''; var ch=card.querySelector(':scope > .card-title .chevron'); if(ch)ch.style.transform=''; }
    var y=card.getBoundingClientRect().top+(window.pageYOffset||document.documentElement.scrollTop||0)-topOffset();
    if(y<0)y=0;
    try{ window.scrollTo({top:y,behavior:'smooth'}); }catch(e){ window.scrollTo(0,y); }
    var prev=card.style.boxShadow; card.style.transition='box-shadow .3s'; card.style.boxShadow='0 0 0 2px #6366f1';
    setTimeout(function(){ card.style.boxShadow=prev; },800);
  }
  window.__navJump=jump;
  function build(pageEl){
    var all=pageEl.querySelectorAll('.card'), cards=[], i;
    for(i=0;i<all.length;i++){ var ti=titleOf(all[i]); if(ti)cards.push({card:all[i],title:ti}); }
    // Change-detect on the actual card ELEMENTS (not just titles) so a re-render — same
    // titles, brand-new nodes — still rebuilds the chips and re-points them.
    var prev=pageEl.__navCards||[], same=(prev.length===cards.length);
    if(same)for(i=0;i<cards.length;i++){ if(prev[i].card!==cards[i].card||prev[i].title!==cards[i].title){ same=false; break; } }
    if(same)return;
    pageEl.__navCards=cards;
    var nav=pageEl.querySelector(':scope > .card-nav');
    if(cards.length<2){ if(nav)nav.remove(); return; } // not worth a nav for 0–1 cards
    if(!nav){ nav=document.createElement('div'); nav.className='card-nav'; pageEl.insertBefore(nav,pageEl.firstChild); }
    var html='';
    for(i=0;i<cards.length;i++){ var c=cards[i]; c.card.id='navc-'+(++NAVSEQ); // fresh unique id every build
      html+='<button class="card-nav-chip" onclick="__navJump(\''+c.card.id+'\')">'+c.title.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</button>'; }
    nav.innerHTML=html;
  }
  function buildAll(){ PAGES.forEach(function(id){ var el=document.getElementById(id); if(el)build(el); }); }
  function start(){
    buildAll();
    try{
      var t=null, schedule=function(){ clearTimeout(t); t=setTimeout(buildAll,150); };
      var mo=new MutationObserver(function(muts){
        for(var i=0;i<muts.length;i++){ var tgt=muts[i].target;
          if(tgt&&tgt.closest&&tgt.closest('.card-nav'))continue; // ignore our own writes
          schedule(); break; }
      });
      PAGES.forEach(function(id){ var el=document.getElementById(id); if(el)mo.observe(el,{childList:true,subtree:true}); });
    }catch(e){}
  }
  if(document.readyState!=='loading')start(); else document.addEventListener('DOMContentLoaded',start);
})();

   Every card header gets a small "?" button; tapping it opens a teaching modal
   that explains what the card shows, what each stat/number means, and what to
   look for. Content is keyed by a normalized signature of the card title, so the
   same MutationObserver that catches late-rendered cards keeps help in sync.
   This is a pure UI overlay — it reads nothing from data.json and never blocks. */

  'all positions': { tag:'Portfolio', t:'All Positions', h:`

  'performance vs benchmark': { tag:'Portfolio', t:'Performance vs Benchmark', h:`
    <p>Your holdings' return this year versus the two benchmarks most growth/AI books are measured against — <b>SPY</b> (S&amp;P 500) and <b>QQQ</b> (Nasdaq-100). All three lines are indexed to <b>0% on Jan 1</b> so they're directly comparable.</p>
    <div class="hsub">How your line is built</div>
    <ul>
      <li>It's a <b>price return of your current holdings at today's weights</b>, priced back to Jan 1 — a like-for-like comparison vs the index, <i>not</i> a time-weighted account return (the broker doesn't expose full purchase history).</li>
      <li>The <b>coverage %</b> in the note is how much of your equity the line actually reflects (names with daily history).</li>

  'holdings heatmap': { tag:'Portfolio', t:'Holdings Heatmap', h:`
    <p>A <b>treemap</b> of your book: each tile is a holding, <b>sized by dollar value</b> and <b>colored by performance</b>. It's the fastest way to see where your money actually sits and what's moving it today. Tap any tile to Analyze that name.</p>

  'risk diversification': { tag:'Portfolio', t:'Risk &amp; Diversification', h:`
    <p>How much the whole book could move if the market drops, plus how concentrated you are. This is the "what could go wrong" card.</p>
    <div class="hsub">What the numbers mean</div>
    <ul>
      <li><span class="hk">Stress scenarios (−5/−10/−20%)</span> — your estimated loss if the market fell that much, scaled by your portfolio <b>beta</b>.</li>
      <li><span class="hk">Beta</span> — sensitivity to the market. Beta 1.3 means you tend to move ~1.3× the market, up <i>and</i> down. Above 1 = more volatile than the index.</li>
      <li><span class="hk">Sharpe ratio</span> — return earned per unit of volatility (risk-adjusted return). Higher is better; ~1+ is solid.</li>
      <li><span class="hk">Annualized volatility</span> — how much your book swings in a typical year.</li>
      <li><span class="hk">Max drawdown</span> — the worst peak-to-trough fall over the period. The pain test.</li>
      <li><span class="hk">Effective # of bets (1/HHI)</span> — how many <i>independent</i> positions you effectively hold. Far below your position count means a few names dominate.</li>
    </ul>
    <div class="hsub">What to look for</div>
    <ul>
      <li>A <b>correlated cluster</b> (names that move together) is hidden concentration — three "different" stocks that are really one AI bet.</li>
      <li>The <b>fragile leg</b> is your highest-beta name — first to fall hardest in a selloff.</li>
    </ul>` },
  'allocation': { tag:'Portfolio', t:'Allocation', h:`
    <p>Your equity split by <b>theme</b> (e.g. AI infrastructure, software, consumer), as a share of total value. Where your conviction actually sits, grouped by what these companies <i>do</i> rather than by ticker.</p>
    <div class="hsub">What to look for</div>
    <ul>
      <li>Themes that <b>overlap economically</b> (e.g. two AI sleeves) should be read as <i>one</i> larger position — they'll rise and fall together.</li>
      <li>A single theme above ~40% is a thematic concentration risk even if no single stock is oversized.</li>
      <li>Compare this to your conviction: are your biggest weights the themes you most believe in, or just the ones that ran up?</li>

  'income tax': { tag:'Portfolio', t:'Income &amp; Tax', h:`
    <p>The cash-and-tax side of the book: dividends, realized gains/losses for the year, options premium collected, and — the actionable part — <b>tax-loss harvesting</b> opportunities.</p>
    <div class="hsub">Key idea — loss harvesting</div>
    <ul>
      <li>Selling a position at a loss <b>realizes</b> that loss, which offsets realized <b>gains</b> elsewhere and lowers your taxable total.</li>
      <li><span class="hk">Wash-sale rule</span> — if you rebuy the same (or "substantially identical") security within <b>30 days</b>, the IRS disallows the loss. Wait the window or buy a different name.</li>
      <li>The itemized harvest list and the winner-trims those losses offset now live in the <b>Action Center</b> on the Plan tab.</li>
    </ul>
    <p>Dividend income is typically small for a growth/AI book — the tax lever here is harvesting, not yield. <i>Not tax advice.</i></p>` },
  'technical signals': { tag:'Portfolio', t:'Technical Signals', h:`
    <p>A quick momentum read on each holding using two classic indicators, so you can spot what's stretched or rolling over without opening every chart.</p>
    <div class="hsub">The two signals</div>
    <ul>
      <li><span class="hk">RSI (Relative Strength Index, 0–100)</span> — measures recent up- vs down-moves. <b>Above 70</b> = overbought (ran hot, may pull back); <b>below 30</b> = oversold (beaten down, may bounce); ~40–60 is neutral.</li>
      <li><span class="hk">Price vs 50-day SMA</span> — is the stock above or below its 50-day average price? <b>Above</b> = uptrend intact; <b>below</b> = trend weakening. The 50-DMA often acts as support/resistance.</li>
    </ul>
    <div class="hsub">What to look for</div>
    <ul>
      <li>RSI is a <i>context</i> tool, not a trigger — strong stocks can stay overbought for weeks. Use it with the trend.</li>
      <li>A name above 70 RSI <i>and</i> far above its 50-DMA is extended — a candidate to trim, not chase.</li>
    </ul>` },
  'fundamentals': { tag:'Portfolio', t:'Fundamentals', h:`
    <p>The business behind each ticker: valuation and growth metrics, so a position is judged on the company, not just the chart.</p>
    <div class="hsub">What the metrics mean</div>
    <ul>
      <li><span class="hk">P/E (price/earnings)</span> — price per $1 of annual earnings. Higher = more growth priced in (and more downside if growth disappoints).</li>
      <li><span class="hk">Forward P/E</span> — same, but on <i>next</i> year's expected earnings. Lower than trailing P/E means analysts expect earnings to grow.</li>
      <li><span class="hk">Revenue growth (YoY)</span> — how fast sales are expanding. The engine of a growth stock.</li>
      <li><span class="hk">Profit margin</span> — how much of each sales dollar becomes profit.</li>
      <li><span class="hk">Market cap</span> — total company value; <span class="hk">Div yield</span> — annual dividend as a % of price.</li>

    <p>Coverage accumulates across days as the data provider rotates through holdings, so a blank field usually fills in on a later run rather than meaning "no data."</p>` },
  'positions under': { tag:'Portfolio', t:'Small Positions', h:`

    <div class="hsub">What to look for</div>

  /* ════════ PLAN / PICKS TAB ════════ */
  'agentic portfolio': { tag:'Plan', t:'Agentic Portfolio', h:`
    <p>The <b>target blueprint</b> for the agentic cash account (••••3900) — a separate, unlevered cash account, distinct from your margin book. It shows the recommended basket and how far the account's <i>actual</i> holdings have drifted from it.</p>

    <div class="hsub">Reading the table</div>
