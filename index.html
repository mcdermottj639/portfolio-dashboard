    </ul>
    <p>The <b>🤖 hand-off button</b> carries a deploy/rebalance prompt that places fractional dollar orders after your review. Below the target sits a <b>per-holding performance</b> table (cost basis, Day %, YTD %, unrealized P&amp;L).</p>` },
  'action center': { tag:'Plan', t:'Action Center', h:`
    <p>The decide-and-act surface: a ranked feed of live signals, then a concrete cash-raising-and-redeploying plan. It's portfolio-derived, so it populates whether you open this tab before or after the portfolio finishes loading.</p>
    <div class="hsub">Two tiers</div>
    <ul>
      <li><span class="hk">Do-now</span> — the ranked live-signal feed (margin, concentration, earnings, overbought/oversold, correlated cluster, retail buzz).</li>
      <li><span class="hk">The-plan</span> — a structured 3-step plan.</li>
    </ul>
    <div class="hsub">The plan steps</div>
    <ul>
      <li><b>Step 1 — Raise cash:</b> harvest losers and <b>trim the excess</b> of any name over the single-name cap (25%). Includes a tax-netting line (gains from trims offset by harvested losses → net taxable).</li>
      <li><b>Step 2 — Redeploy:</b> pay down margin first if levered, then split the pool into ballast / defensive / high-conviction adds. The high-conviction sleeve flows into the Picks below — a diversified <i>set</i>, each sized risk-based (1% of book at its stop).</li>
      <li><b>Step 3 — Guardrails:</b> standing rules — single-name cap, cluster cap (40%), trim above RSI 75, fragile-leg trailing stop, reassess into earnings.</li>
    </ul>
    <p>Each step has a <b>🤖 hand-off button</b> that builds the order prompt. It's a framework, not advice.</p>` },
  'top picks today': { tag:'Plan', t:'Top 3 Picks Today', h:`
    <p>The three highest-conviction ideas from today's scan, each with a full setup: thesis, entry zone, stop, and profit targets. These are the names the plan's high-conviction sleeve deploys into.</p>
    <div class="hsub">What each card gives you</div>
    <ul>
      <li><span class="hk">Entry zone</span> — the price range to buy in; <span class="hk">Stop</span> — where the thesis is wrong, so you exit.</li>
      <li><span class="hk">TP1 / TP2</span> — first and second profit targets to scale out.</li>
      <li><span class="hk">Risk/reward</span> — the ratio of potential gain (to target) vs potential loss (to stop). Look for ≥ 2:1.</li>
      <li>A <b>catalyst-risk note</b> appears when earnings land inside the trade's swing window — a print can blow through your stop on a gap.</li>
    </ul>
    <p>The picks are <b>sector-diversified</b>, and a "🧭 the plan picked this" badge links a card back to its slot in the Action Center.</p>` },
  'composite scores': { tag:'Plan', t:'Composite Scores', h:`
    <p>The single 0–100 score that ranks every candidate, and the chart of how the top names stack up. It blends four independent angles so no one factor dominates.</p>
    <div class="hsub">The four components</div>
    <ul>
      <li><span class="hk">Technical — 33%</span> — momentum/setup, blending RSI with where price sits in its 52-week range.</li>
      <li><span class="hk">Fundamentals — 28%</span> — valuation and growth quality.</li>
      <li><span class="hk">Risk/Reward — 19%</span> — upside to target vs downside to stop.</li>
      <li><span class="hk">Social — 20%</span> — retail buzz (mention rank + velocity), a spotlight on names heating up.</li>
    </ul>
    <p>Finalists are <b>sector-diversified</b> (capped per sector) so the list isn't five flavors of the same trade. A higher composite = a more complete setup, not a guarantee.</p>` },
  'scoring breakdown': { tag:'Plan', t:'Scoring Breakdown', h:`
    <p>The full, sortable and sector-filterable table behind the composite — every candidate with its component scores exposed, so you can see <i>why</i> a name ranks where it does.</p>
    <div class="hsub">Reading the cues</div>
    <ul>
      <li><span class="hk">Social column</span> — retail buzz, 20% of the composite, with an inline label. <b>Grey</b> = no data (scored a neutral 5), not bearish.</li>
      <li><span class="hk">ᵛ marker</span> — value-only fundamentals (growth data unavailable from the provider that day).</li>
      <li>Sort by any component to find, say, the best <i>fundamental</i> names regardless of momentum, or vice-versa.</li>
    </ul>
    <p>Use the sector filter to screen within a theme you already understand.</p>` },
  'track record': { tag:'Plan', t:'Track Record', h:`
    <p>Honest scorekeeping: past picks graded on a closing basis, so the engine's accuracy is visible rather than assumed.</p>
    <div class="hsub">How picks are graded</div>
    <ul>
      <li>Each archived pick is marked <b>hit TP1</b>, <b>hit TP2</b>, <b>stopped out</b>, or <b>still open</b>, judged from daily closing prices.</li>
      <li><span class="hk">Hit-rate</span> — share of resolved picks that reached a target before stopping. <span class="hk">Avg return</span> — the mean outcome.</li>
    </ul>
    <div class="hsub">What to look for</div>
    <ul>
      <li>A hit-rate around or above 50% with risk/reward ≥ 2:1 is mathematically profitable even with plenty of losers.</li>
      <li>Small samples are noisy — weight this more as the resolved count grows.</li>
    </ul>` },
  'pick-earn': { tag:'Plan', t:'Earnings Preview', h:`
    <p>The next earnings report for the soonest-reporting top pick. Earnings are the single biggest scheduled catalyst — and the biggest scheduled <b>risk</b> — for a swing trade.</p>
    <div class="hsub">Why it matters</div>
    <ul>
      <li>A report can <b>gap</b> the stock through your stop overnight, so a normal stop won't protect you.</li>
      <li>Options often price in a big <b>implied move</b> beforehand and lose value (IV crush) right after.</li>
    </ul>
    <p>If a pick reports inside your intended holding window, size smaller or wait until after the print to enter.</p>` },
  'income ideas': { tag:'Plan', t:'Income Ideas', h:`
    <p>Covered-call opportunities on holdings where you own <b>≥ 100 shares</b> (one option contract = 100 shares). A way to generate cash income from stock you already hold.</p>
    <div class="hsub">How a covered call works</div>
    <ul>
      <li>You <b>sell</b> a call against your shares and keep the <b>premium</b> immediately.</li>
      <li>The suggested strike is the nearest <b>~30-delta monthly</b> call — roughly a 30% chance of finishing in-the-money.</li>
      <li>Trade-off: if the stock rockets past the strike, your shares get <b>called away</b> (sold) at that strike — you cap your upside in exchange for the income.</li>
    </ul>
    <p>Best on names you're neutral-to-mildly-bullish on and would be content to sell at the strike.</p>` },
  'catalysts news': { tag:'Plan', t:'Catalysts &amp; News', h:`
    <p>Recent headlines for your top picks, gathered during the morning research scan, color-coded by sentiment. Context for <i>why</i> a name is moving or being talked about.</p>
    <div class="hsub">Reading it</div>
    <ul>
      <li>Ticker color: <span style="color:#10b981;font-weight:700">green</span> = bullish, <span style="color:#ef4444;font-weight:700">red</span> = bearish, grey = neutral.</li>
      <li>News explains catalysts the score can't — an upgrade, a product launch, a regulatory headline.</li>
    </ul>
    <p>Headlines are a snapshot from scan time; confirm anything time-sensitive before acting.</p>` },

  /* ════════ OPTIONS TAB ════════ */
  'options exposure': { tag:'Options', t:'Options Exposure', h:`
    <p>A roll-up of the risk across all your open and pending option contracts — the "how exposed am I?" summary before you read individual positions.</p>
    <div class="hsub">What the figures mean</div>
    <ul>
      <li><span class="hk">Net delta</span> — your total directional exposure expressed in share-equivalents. Positive = net long (you profit if prices rise).</li>
      <li><span class="hk">Put cash secured</span> — cash you'd need if every short put were assigned (you'd be forced to buy the shares).</li>
      <li><span class="hk">Shares capped</span> — shares that could be called away by short calls.</li>
      <li><span class="hk">Open premium at risk</span> — net premium currently exposed in open positions.</li>
    </ul>
    <p>This is the single screen that tells you whether your options book is leaning bullish, bearish, or income-neutral.</p>` },
  'upcoming expirations': { tag:'Options', t:'Upcoming Expirations', h:`
    <p>A calendar of when your contracts expire. Expiration is a hard deadline — options decay fastest in their final weeks and become all-or-nothing at the end.</p>
    <div class="hsub">Why watch this</div>
    <ul>
      <li>Contracts near expiry need a decision: <b>close</b>, <b>roll</b> (move to a later date), or <b>let expire</b>.</li>
      <li>Short options near expiry that are in-the-money risk <b>assignment</b> — plan before the last day, not on it.</li>
      <li><span class="hk">Theta (time decay)</span> accelerates in the final ~2 weeks: good if you're the seller, painful if you're the buyer.</li>
    </ul>` },
  'your options': { tag:'Options', t:'Your Options', h:`
    <p>Each option you hold, with full live <b>greeks</b>, P&amp;L, assignment odds, and a payoff diagram. The greeks tell you how the position will react to what the stock does next.</p>
    <div class="hsub">The greeks</div>
    <ul>
      <li><span class="hk">Delta (Δ)</span> — change in option price per $1 move in the stock; also ≈ probability of finishing in-the-money.</li>
      <li><span class="hk">Theta (Θ)</span> — value lost per day to time decay. Negative for buyers, positive for sellers.</li>
      <li><span class="hk">Vega</span> — sensitivity to implied volatility. High vega = the position swings when fear/IV changes.</li>
      <li><span class="hk">Gamma (Γ)</span> — how fast delta itself changes; biggest near the strike and near expiry.</li>
    </ul>
    <div class="hsub">Other cues</div>
    <ul>
      <li><span class="hk">IV-rank badge</span> — whether the option is cheap or rich vs its own recent volatility range.</li>
      <li><span class="hk">Roll suggestions</span> on short calls — a named later expiry / higher strike to extend the trade.</li>
    </ul>` },
  'trade ideas': { tag:'Options', t:'Trade Ideas', h:`
    <p>Generated, filterable option setups that fit your holdings and the current read — research and education only, not recommendations.</p>
    <div class="hsub">The structures</div>
    <ul>
      <li><span class="hk">Long call</span> — leveraged bullish bet; defined risk (the premium), unlimited upside.</li>
      <li><span class="hk">Covered call</span> — income against shares you own; caps upside.</li>
      <li><span class="hk">Cash-secured put</span> — get paid to potentially buy a stock lower.</li>
      <li><span class="hk">Call debit spread / collar</span> — <b>defined-risk, multi-leg</b> structures (estimate-only); the payoff diagram is drawn from the combined legs.</li>
    </ul>
    <p>Single-leg ideas are <b>live-priced and delta-targeted</b>; multi-leg ones use a per-symbol volatility estimate. Always confirm the real bid/ask and open interest before trading.</p>` },
  'covered call income': { tag:'Options', t:'Covered-Call Income', h:`
    <p>An income ranker for your 100+ share holdings, sorted by <b>annualized yield</b> — so you can compare premium income across names on equal footing.</p>
    <div class="hsub">The math</div>
    <ul>
      <li><span class="hk">Annualized yield</span> = premium ÷ price × (365 ÷ days to expiry). It scales a one-off premium into a yearly rate for comparison.</li>
      <li><span class="hk">Income</span> — actual dollars you'd collect for selling the call now.</li>
    </ul>
    <div class="hsub">The trade-off</div>
    <p>You keep the premium no matter what, but you <b>cap your upside</b> at the strike — if the stock blows past it, the shares are called away. Best on names you're neutral on and happy to sell at the strike.</p>` },
  'cash secured put income': { tag:'Options', t:'Cash-Secured Put Income', h:`
    <p>An income ranker for <b>selling puts</b> — getting paid premium for agreeing to buy a stock at a lower price if it falls there.</p>
    <div class="hsub">How it works</div>
    <ul>
      <li>You set aside cash to cover the purchase (<b>cash-secured</b>) and sell a put below the current price.</li>
      <li>If the stock stays up, you keep the premium and never buy. If it falls below the strike, you buy the shares — at a net cost reduced by the premium.</li>
      <li><span class="hk">Annualized yield</span> lets you rank opportunities like any income stream.</li>
    </ul>
    <p>Only sell puts on names you'd genuinely be happy to <b>own</b> at the strike — assignment is the point, not a failure.</p>` },
  'options p l': { tag:'Options', t:'Options P&amp;L', h:`
    <p>Your <b>closed</b> option trades and what they actually made or lost — the realized scoreboard for your options activity.</p>
    <div class="hsub">What to look for</div>
    <ul>
      <li>Separates options results from your stock P&amp;L so you can see whether the options program is adding value on its own.</li>
      <li>Look at the <b>pattern</b>: are losses small and wins larger (healthy), or the reverse (selling premium and getting run over)?</li>
    </ul>` },
  'options knowledge': { tag:'Options', t:'Options Knowledge', h:`
    <p>A built-in primer on the options concepts used throughout this tab — keep it open as a glossary while you read the other cards.</p>
    <p>Covers the greeks, intrinsic vs extrinsic value, implied volatility and IV rank, assignment, and the common strategies (calls, puts, spreads, covered calls, cash-secured puts). Education only.</p>` },

  /* ════════ ANALYZE TAB ════════ */
  'cmp-head': { tag:'Analyze', t:'Comparison', h:`
    <p>A side-by-side of the two tickers you're comparing — valuation, momentum, and quality metrics in one table so relative strengths and weaknesses jump out.</p>
    <div class="hsub">How to use it</div>
    <ul>
      <li>Compare names in the <b>same theme</b> to decide which is the better expression of a trade (e.g. one chip-maker vs another).</li>
      <li>Lower P/E with similar growth = the cheaper bet; higher RSI = more extended near-term.</li>
      <li>No single column wins — weigh valuation against growth and momentum together.</li>
    </ul>` },
  'recommendation': { tag:'Analyze', t:'Recommendation', h:`
    <p>The headline verdict for this ticker — a setup score and a plain-English read that blends the technical picture with the fundamentals.</p>
    <div class="hsub">What feeds the score</div>
    <ul>
      <li><span class="hk">Pattern 34% · Signal 30% · Risk 21% · Fundamentals 15%</span> — the setup combines chart structure, momentum, risk/reward, and a fundamentals/quality sub-score.</li>
      <li>Two <b>confidence dampeners</b> (they don't move the score, only your confidence): an <b>imminent earnings print</b> (≤7 days → gap/IV-crush risk) and a <b>high-VIX regime</b> on a bullish call.</li>
    </ul>
    <p>The meta line shows the fundamentals score and any dampeners transparently, so you see exactly what's driving the call. It's a structured read, not advice.</p>` },
  'interactive chart': { tag:'Analyze', t:'Interactive Chart', h:`
    <p>Opens the full <b>Chart Analyzer</b> — one large price chart you can actually work with.</p>
    <div class="hsub">What it does</div>
    <ul>
      <li><span class="hk">Timeframes</span> — 1M / 3M / 6M / YTD (daily) and 1Y / 5Y (monthly). Moving averages are computed over full history so they span the whole view.</li>
      <li><span class="hk">Line or Candles</span>, plus a volume overlay and an RSI(14) sub-panel.</li>
      <li><span class="hk">Pattern scanner</span> — tap a filter to detect head &amp; shoulders (and inverse), cup &amp; handle, double bottom, bull flag, ascending/descending triangles, falling/rising wedges, or to draw trendlines and support/resistance zones.</li>
      <li>Each detected pattern marks its swing points, draws the neckline/rim &amp; a measured target, and adds a volume/RSI confirmation check plus a historical hit-rate for that pattern on that name.</li>
      <li>When a pattern is selected, the <b>timeframe chips glow</b> (●) for every timeframe that also shows it — your at-a-glance confluence map.</li>
    </ul>
    <div class="hsub">Timeframes change the read</div>
    <ul>
      <li><span class="hk">Short (1M/3M)</span> — a quick, smaller move (days–2 weeks); tighter target/stop, noisier. Tactical.</li>
      <li><span class="hk">Medium (6M/YTD)</span> — a swing move over weeks; larger target, the level matters more. Size like a real position.</li>
      <li><span class="hk">Long (1Y/5Y)</span> — a major structural move over months; slowest but most significant.</li>
      <li><span class="hk">Confluence</span> — the same pattern glowing on several frames is the strongest setup. If frames disagree, the <b>longer</b> one usually wins the bigger picture.</li>
    </ul>
    <p>Heuristic and for research only — a read is a tendency, not a signal.</p>` },
  'limited snapshot data': { tag:'Analyze', t:'Limited Snapshot Data', h:`
    <p>This name doesn't have enough captured history yet for the full analysis, so some cards are locked.</p>
    <p>The producer fetches heavy historical data once per day. A ticker outside your holdings/picks may only get partial coverage until the <b>next full run</b> records its daily bars. Nothing is broken — check back after the next morning scan.</p>` },
  'your position': { tag:'Analyze', t:'Your Position', h:`
    <p>If you already hold this ticker, this card grounds the analysis in <i>your</i> actual position — shares, average cost, current value, and unrealized P&amp;L.</p>
    <p>It changes the question from "is this a good stock?" to "what should <b>I</b> do with what I hold?" — add, trim, hold, or exit — and makes the levels below personally relevant.</p>` },
  'understanding this analysis': { tag:'Analyze', t:'Understanding This Analysis', h:`
    <p>A guide to how the Analyze tab is built and how to read it well — open this first if the other cards feel dense.</p>
    <p>It explains the setup score's components, why the dampeners are confidence-only, what "market-implied vs estimated" means on the scenario band, and the limits of any single-stock read. The goal is to teach the method, not just hand you a verdict.</p>` },
  'earnings': { tag:'Analyze', t:'Earnings', h:`
    <p>This ticker's next earnings date and recent history. Earnings are the biggest scheduled catalyst — and risk — for a single name.</p>
    <div class="hsub">What to look for</div>
    <ul>
      <li><b>Days until the report</b> — inside ~1–2 weeks, expect elevated option premiums and gap risk.</li>
      <li>Trading <i>through</i> a print is a coin-flip on the reaction; many traders size down or wait until after.</li>
    </ul>` },
  'indicators': { tag:'Analyze', t:'Indicators', h:`
    <p>The full technical indicator panel for this ticker — the momentum, trend, and volatility readings that build the setup score.</p>
    <div class="hsub">Common reads</div>
    <ul>
      <li><span class="hk">RSI</span> — overbought above 70 / oversold below 30.</li>
      <li><span class="hk">Moving averages (50/200-day)</span> — price above = uptrend; a "golden cross" (50 over 200) is a bullish trend signal, a "death cross" the opposite.</li>
      <li><span class="hk">Trend vs the averages</span> tells you whether momentum agrees with the thesis.</li>
    </ul>
    <p>No single indicator is a trigger — they're strongest when several line up.</p>` },
  'historical edge': { tag:'Analyze', t:'Historical Edge', h:`
    <p>A back-test of what <i>usually</i> happened next when this stock was in a similar condition (e.g. a similar RSI). It answers "is this setup actually favorable, historically?"</p>
    <div class="hsub">Reading it</div>
    <ul>
      <li>The <b>match band</b> widens automatically (RSI ±8 up to ±20) until there's a usable sample size — a bigger sample is more reliable.</li>
      <li>It shows the average forward return and how often the move was positive after similar setups.</li>
    </ul>
    <p>History is a guide, not a guarantee — regime changes (rates, sentiment) can break past patterns.</p>` },
  'multi timeframe': { tag:'Analyze', t:'Multi-Timeframe', h:`
    <p>The trend on several horizons at once — short, medium, and long. A setup is strongest when the timeframes <b>agree</b>.</p>
    <div class="hsub">Why it matters</div>
    <ul>
      <li>A stock can be up on the day but in a longer downtrend — a "dead-cat bounce." Multi-timeframe catches that conflict.</li>
      <li><b>Alignment</b> (all timeframes up) = trend with the wind at your back. <b>Divergence</b> = wait for clarity or trade smaller.</li>
    </ul>` },
  'key levels': { tag:'Analyze', t:'Key Levels', h:`
    <p>The specific prices where this stock has repeatedly found <b>support</b> (buyers step in) or <b>resistance</b> (sellers step in). The map for entries, stops, and targets.</p>
    <div class="hsub">How to use them</div>
    <ul>
      <li><span class="hk">Support</span> — a logical place to buy and to set a stop just below.</li>
      <li><span class="hk">Resistance</span> — a logical place to take profit; a clean break above it on volume can become new support.</li>
    </ul>
    <p>Levels are zones, not exact lines — expect some overshoot.</p>` },
  'scenarios': { tag:'Analyze', t:'Scenarios', h:`
    <p>A bull / base / bear projection for the stock, anchored to an <b>expected-move band</b> rather than guesswork.</p>
    <div class="hsub">The expected-move band</div>
    <ul>
      <li>It's a <b>±1σ (one standard deviation)</b> range — statistically, the stock stays inside it about <b>~68%</b> of the time over the window.</li>
      <li>Labeled <span class="hk">market-implied</span> when built from live option IV (the market's own forecast), or <span class="hk">estimated</span> when using a realized-volatility proxy.</li>
    </ul>
    <p>Use it to sanity-check targets and stops: a target outside the ±1σ band is an aggressive ask.</p>` },
  'exact trade levels': { tag:'Analyze', t:'Exact Trade Levels', h:`
    <p>A concrete, ready-to-use plan: where to enter, where to stop out, and where to take profit — the four numbers that turn a thesis into a trade.</p>
    <div class="hsub">The levels</div>
    <ul>
      <li><span class="hk">Entry zone</span> — the price range to buy.</li>
      <li><span class="hk">Stop</span> — where the idea is invalidated; exit to cap the loss.</li>
      <li><span class="hk">TP1 / TP2</span> — scale-out targets to lock in gains in stages.</li>
    </ul>
    <p>The distance from entry to stop vs entry to target is your <b>risk/reward</b> — aim for ≥ 2:1. These share one source with the Picks levels, so the plan and the cards never disagree.</p>` },
  'position sizing': { tag:'Analyze', t:'Position Sizing', h:`
    <p>How <b>many shares</b> to buy — derived from your risk, not a round-number guess. The most overlooked half of a trade plan.</p>
    <div class="hsub">The method</div>
    <ul>
      <li>Risk a fixed slice of the book (≈ <b>1%</b>) on the distance from <b>entry to stop</b>. A tight stop → more shares; a wide stop → fewer.</li>
      <li>This keeps every loss roughly the same size regardless of the stock's price or volatility.</li>
      <li>The size is also <b>clamped</b> so no single name breaches the concentration cap.</li>
    </ul>
    <p>Good sizing means being right less than half the time and still coming out ahead.</p>` },
  'options play': { tag:'Analyze', t:'Options Play', h:`
    <p>An options expression of this stock's setup — a way to trade the same thesis with defined risk or leverage instead of shares.</p>
    <div class="hsub">Notes</div>
    <ul>
      <li>It's an <b>estimate</b> unless you already hold live contracts on the name (then it flags your real greeks instead).</li>
      <li>Links over to the full <b>Options</b> tab to build it out.</li>
      <li>Confirm the actual bid/ask and open interest before trading — thin chains can erase the edge.</li>
    </ul>` },
  'valuation catalysts': { tag:'Analyze', t:'Valuation &amp; Catalysts', h:`
    <p>The fundamental case: is the stock cheap or expensive for its growth, and what upcoming events could move it?</p>
    <div class="hsub">What it covers</div>
    <ul>
      <li><span class="hk">Valuation</span> — forward P/E, PEG, analyst target upside; whether the price already bakes in the growth.</li>
      <li><span class="hk">Catalysts</span> — earnings, product cycles, or news that could re-rate the stock.</li>
    </ul>
    <p>Valuation tells you the <i>odds</i>; catalysts tell you the <i>timing</i>. A great business at a stretched price can still be a poor near-term entry.</p>` },
  'news sentiment': { tag:'Analyze', t:'News Sentiment', h:`
    <p>Recent headlines for this ticker, scored bullish / neutral / bearish, to give qualitative context the numbers miss.</p>
    <div class="hsub">What to look for</div>
    <ul>
      <li>A cluster of bullish headlines into a rising price = narrative and momentum agreeing.</li>
      <li>Bearish news while the stock holds up can signal resilience — or a delayed reaction. Read the actual headlines, not just the color.</li>
    </ul>
    <p>Sentiment is a snapshot from research time; it lags fast-breaking events.</p>` },
  'social pulse': { tag:'Analyze', t:'Social Pulse', h:`
    <p>Retail <b>buzz</b> for this name from social/Reddit mention data — a measure of attention, not opinion.</p>
    <div class="hsub">Important nuance</div>
    <ul>
      <li>The source has <b>no bull/bear sentiment</b> — buzz is built from <b>mention rank + velocity</b> (how much it's being talked about and how fast that's rising).</li>
      <li>Rising buzz can precede volatility in <i>either</i> direction — it's a spotlight, not a signal of which way.</li>
      <li>Most quality large-caps barely register here; a neutral reading just means "not a meme right now."</li>
    </ul>` },
  'overlap with your book': { tag:'Analyze', t:'Overlap With Your Book', h:`
    <p>How this ticker relates to what you <b>already own</b> — so you don't accidentally double down on the same bet.</p>
    <div class="hsub">Why it matters</div>
    <ul>
      <li>Buying a name that's <b>highly correlated</b> with your big holdings adds concentration, not diversification — they'll fall together.</li>
      <li>Low or negative correlation to your book is what genuinely <b>diversifies</b> risk.</li>
    </ul>
    <p>Check this before adding: a "new" idea that moves with your top position isn't really new exposure.</p>` },
  'compare': { tag:'Analyze', t:'Compare', h:`
    <p>Type a second ticker to put it head-to-head with the one you're analyzing. The fastest way to choose between two candidates.</p>
    <p>Enter a symbol and the comparison table below fills in — valuation, momentum, and quality side by side. Great for "which chipmaker?" or "is my holding still the best name in its theme?"</p>` },
  'when this analysis is wrong': { tag:'Analyze', t:'When This Analysis Is Wrong', h:`
    <p>The pre-mortem: the specific conditions that would <b>break</b> this thesis. The most valuable card on the page, because it's where discipline lives.</p>
    <div class="hsub">How to use it</div>
    <ul>
      <li>It names the levels and events that invalidate the setup — your <b>exit triggers</b>, decided in advance while you're calm.</li>
      <li>Knowing your "I'm wrong" line <i>before</i> entering is what keeps a small planned loss from becoming a big emotional one.</li>
    </ul>
    <p>If you can't articulate what would make you wrong, the position is too speculative to size up.</p>` },

  /* ════════ MARKETS TAB ════════ */
  'indexes': { tag:'Markets', t:'Indexes', h:`
    <p>The major market benchmarks at a glance, with YTD and 5-year context — the backdrop every individual stock trades against.</p>
    <div class="hsub">What to look for</div>
    <ul>
      <li>A stock fighting a falling market needs a strong reason; most names follow the index.</li>
      <li>Compare <b>YTD vs 5Y</b> to gauge whether the current year is normal or stretched relative to the longer trend.</li>
    </ul>` },
  'risk gauges': { tag:'Markets', t:'Risk Gauges', h:`
    <p>A <b>risk-on / risk-off</b> read on market mood, synthesized from how risk assets are moving versus safe havens today.</p>
    <div class="hsub">The logic</div>
    <ul>
      <li><span class="hk">Risk-on</span> — equities and credit outperforming gold and long bonds; appetite for risk is high.</li>
      <li><span class="hk">Risk-off</span> — money fleeing to gold and Treasuries; defensive, fearful tape.</li>
    </ul>
    <p>It frames your day: adding aggressive longs into a hard risk-off tape is fighting the current.</p>` },
  'sector heatmap': { tag:'Markets', t:'Sector Heatmap', h:`
    <p>All eleven market sectors colored by performance — where money is flowing today and over the year. Tap the toggle to switch views.</p>
    <div class="hsub">The two views</div>
    <ul>
      <li><span class="hk">Day</span> — today's move per sector; the short-term rotation.</li>
      <li><span class="hk">vs S&amp;P YTD (relative strength)</span> — each sector's return <i>minus</i> the S&amp;P's, surfacing true <b>leaders and laggards</b> rather than just what's up.</li>
    </ul>
    <p>Leadership rotation is a tell: defensives leading often signals caution; cyclicals/tech leading signals appetite.</p>` },
  'us vs international': { tag:'Markets', t:'US vs International', h:`
    <p>US stocks (SPY) against developed-international (EFA) and emerging markets (EEM), all indexed to compare returns directly.</p>
    <div class="hsub">Why it matters</div>
    <ul>
      <li>Leadership rotates between regions over multi-year cycles; a US-heavy book is a bet that US outperformance continues.</li>
      <li>Persistent international strength can be an early sign of a weakening dollar or shifting growth — a diversification cue.</li>
    </ul>` },
  'macro signals': { tag:'Markets', t:'Macro Signals', h:`
    <p>The big-picture economic gauges that set the weather for all stocks — rates, inflation, volatility, and the yield curve.</p>
    <div class="hsub">The signals</div>
    <ul>
      <li><span class="hk">10-yr Treasury yield</span> — the "risk-free" rate; rising yields pressure high-growth valuations.</li>
      <li><span class="hk">Fed Funds rate</span> — the policy rate; sets the cost of money.</li>
      <li><span class="hk">CPI</span> — inflation; hotter prints can mean higher-for-longer rates.</li>
      <li><span class="hk">2s10s yield curve (10yr − 2yr)</span> — when <b>negative (inverted)</b>, it has historically preceded recessions. The tile flags inversion.</li>
      <li><span class="hk">VIX</span> — the market's "fear gauge"; above ~20 is elevated, above ~30 is stressed.</li>
    </ul>` },
  'breadth movers news': { tag:'Markets', t:'Breadth, Movers &amp; News', h:`
    <p>Market <b>breadth</b> — the real leaders and laggards across the index, sector, and risk ETFs (not just your book) — alongside news sentiment.</p>
    <div class="hsub">Why breadth matters</div>
    <ul>
      <li>A rally led by <b>many</b> names is healthier than one carried by a handful of mega-caps (narrow breadth often precedes pullbacks).</li>
      <li>The movers show where today's energy actually is; the news adds the "why."</li>
    </ul>` },
  'retail buzz': { tag:'Markets', t:'Retail Buzz', h:`
    <p>What retail traders are talking about most, from social/Reddit mention data — a read on <b>crowd attention</b>.</p>
    <div class="hsub">How to read it</div>
    <ul>
      <li>Buzz measures <b>volume of mentions and how fast it's rising</b>, not bullish/bearish opinion (the source has no sentiment).</li>
      <li>Surging buzz can mean a name is about to get volatile — useful as a heads-up, not a buy signal.</li>
      <li>Contrarian use: peak retail euphoria has often marked short-term tops.</li>
    </ul>` }
  };

  /* dynamic titles whose text varies → match by prefix */
  var PREFIX = [['earnings preview','pick-earn']];

  function sig(title){
    var c=title.cloneNode(true);
    c.querySelectorAll('.chevron,.card-hint,.badge,.help-btn,button,a,select,input,label').forEach(function(x){ x.remove(); });
    return (c.textContent||'').toLowerCase().replace(/[^a-z]+/g,' ').trim();
  }
  function keyFor(title){
    if(title.dataset.help) return title.dataset.help;
    var s=sig(title); if(!s) return null;
    if(HELP[s]) return s;
    for(var i=0;i<PREFIX.length;i++){ if(s.indexOf(PREFIX[i][0])===0) return PREFIX[i][1]; }
    return null;
  }
  function decorate(card){
    var title=card.querySelector(':scope > .card-title');
    if(!title || title.dataset.helpDone) return;
    title.dataset.helpDone='1';
    var key=keyFor(title);
    if(!key || !HELP[key]) return;
    var b=document.createElement('button');
    b.type='button'; b.className='help-btn'; b.textContent='?';
    b.setAttribute('aria-label','What is this card?');
    b.addEventListener('click',function(e){ e.stopPropagation(); e.preventDefault(); openHelp(key); });
    var chev=title.querySelector(':scope > .chevron');
    if(chev) title.insertBefore(b,chev); else title.appendChild(b);
  }

  var modal,elTag,elTitle,elBody;
  function buildModal(){
    modal=document.createElement('div'); modal.className='help-modal'; modal.id='help-modal';
    modal.innerHTML='<div class="help-box" role="dialog" aria-modal="true"><div class="help-head"><div style="min-width:0"><div class="help-tag" id="help-tag"></div><div class="help-title" id="help-title"></div></div><button class="help-x" type="button" aria-label="Close">×</button></div><div class="help-body" id="help-body"></div></div>';
    document.body.appendChild(modal);
    elTag=modal.querySelector('#help-tag'); elTitle=modal.querySelector('#help-title'); elBody=modal.querySelector('#help-body');
    modal.addEventListener('click',function(e){ if(e.target===modal) closeHelp(); });
    modal.querySelector('.help-x').addEventListener('click',closeHelp);
    document.addEventListener('keydown',function(e){ if(e.key==='Escape') closeHelp(); });
  }
  function openHelp(key){
    var d=HELP[key]; if(!d) return; if(!modal) buildModal();
    elTag.textContent=d.tag||''; elTitle.innerHTML=d.t; elBody.innerHTML=d.h;
    modal.classList.add('open');
    var box=modal.querySelector('.help-box'); if(box) box.scrollTop=0;
  }
  function closeHelp(){ if(modal) modal.classList.remove('open'); }
  window.openHelp=openHelp;

  function scan(root){ try{ (root||document).querySelectorAll('.card').forEach(decorate); }catch(e){} }
  function start(){
    scan(document);
    try{
      var mo=new MutationObserver(function(muts){
        for(var i=0;i<muts.length;i++){ var a=muts[i].addedNodes;
          for(var j=0;j<a.length;j++){ var nd=a[j]; if(!nd||nd.nodeType!==1) continue;
            if(nd.classList&&nd.classList.contains('card')) decorate(nd);
            if(nd.querySelectorAll) nd.querySelectorAll('.card').forEach(decorate); } }
      });
      ['page-portfolio','page-markets','page-picks','page-options','page-analyze'].forEach(function(id){ var el=document.getElementById(id); if(el) mo.observe(el,{childList:true,subtree:true}); });
    }catch(e){}
  }
  if(document.readyState!=='loading') start(); else document.addEventListener('DOMContentLoaded',start);
})();

/* ═══════════════════════════════════════════
   OPTIONS PAGE  (your contracts · ideas · knowledge)

let _optionsInit=false;
function initOptions(){ const app=document.getElementById('options-app'); if(!app)return; (window.__dataReady||Promise.resolve(window.__DATA||{})).then(function(d){ try{ renderOptions(app,(d&&d.options)||null); }catch(e){ app.innerHTML='<div class="card"><div class="tech-empty">Options data error: '+(e&&e.message)+'</div></div>'; } }); }

function optSideBadge(o){ const isShort=o.side==='short'; const c=isShort?'#f59e0b':'#6366f1'; return '<span class="badge" style="background:'+(isShort?'#fef3c7':'#ede9fe')+';color:'+(isShort?'#92400e':'#5b21b6')+'">'+(o.side||'').toUpperCase()+' '+(o.type||'').toUpperCase()+'</span>'; }
// IV rank badge — where today's implied vol sits in its trailing range. High = options rich
// (favors selling premium), low = cheap (favors buying). Builds with history, so it may be absent.
function ivRankBadge(r){ if(r==null)return ''; const rich=r>=60, cheap=r<=30;
  const bg=rich?'#fef3c7':cheap?'#d1fae5':'var(--surface-2)', fg=rich?'#92400e':cheap?'#065f46':'#6b7280';
  return '<span class="badge" title="Implied-vol rank: where IV sits in its ~1y range. High = rich (sell), low = cheap (buy)." style="background:'+bg+';color:'+fg+'">IV rank '+r+'</span>'; }
/* ── payoff-at-expiration diagram ── */
function payoffSeries(spec){
  // Normalize any structure to a list of option legs (+ optional stock leg) so one routine draws
  // single-leg positions, covered calls, debit spreads and collars alike.
  const contracts=spec.contracts||1; let legs, stock=null;
  if(Array.isArray(spec.legs)&&spec.legs.length){
    legs=spec.legs.map(function(l){return {type:l.type,side:l.side,strike:+l.strike,prem:+l.prem||0,qty:l.qty||1};});
    if(spec.stock&&spec.stock.shares)stock={shares:spec.stock.shares,basis:+spec.stock.basis};
  } else {
    legs=[{type:spec.type,side:spec.side,strike:+spec.strike,prem:+spec.prem||0,qty:contracts}];
    if(spec.covered&&spec.type==='call'&&spec.side==='short'&&spec.costBasis!=null)stock={shares:100*contracts,basis:+spec.costBasis};
  }
  const strikes=legs.map(function(l){return l.strike;}).filter(function(s){return s>0;});
  const ref=(spec.px&&spec.px>0)?spec.px:(strikes[0]||1);
  const span=strikes.concat(ref);
  const lo=Math.max(0.01,Math.min.apply(null,span)*0.55), hi=Math.max.apply(null,span)*1.45, N=30;
  const labels=[], data=[];
  for(let i=0;i<=N;i++){ const S=lo+(hi-lo)*i/N; let pl=0;
    legs.forEach(function(l){ const intr=l.type==='call'?Math.max(S-l.strike,0):Math.max(l.strike-S,0); const m=100*l.qty;
      pl+=l.side==='long'?(intr-l.prem)*m:(l.prem-intr)*m; });
    if(stock)pl+=(S-stock.basis)*stock.shares;
    labels.push('$'+(S>=100?Math.round(S):S.toFixed(1))); data.push(+pl.toFixed(0));
  }
  return {labels,data};
}

    const depth=(rim-bv)/rim; if(depth<0.12||depth>0.55)continue; const rimSym=Math.abs(L.price-R.price)/rim; if(rimSym>0.08)continue;
    const posFrac=(bi-L.i)/cupLen; // U-shape → bottom near the middle (V-bottoms penalized)
    // handle: shallow pullback after the right rim, not retracing more than ~half the cup
    const tail=c.slice(R.i); let hLow=R.price,hIdx=R.i; for(let i=R.i;i<n;i++)if(c[i]<hLow){hLow=c[i];hIdx=i;}
    const handleDepth=(R.price-hLow)/R.price, handleLen=n-1-R.i, hasHandle=handleLen>=2&&handleDepth>0.005&&handleDepth<depth*0.6;
    let conf=60; conf+=(1-Math.min(rimSym,0.08)/0.08)*12; conf+=(1-Math.abs(posFrac-0.5)/0.5)*12; conf+=hasHandle?14:-6;
    conf+=(depth>=0.15&&depth<=0.4)?4:0; conf=Math.max(35,Math.min(93,Math.round(conf)));
    if(!best||conf>best.conf)best={conf,L,R,bi,bv,rim,depth,hasHandle,hLow,hIdx,handleDepth}; } }
  if(!best)return _cmNF(title,'Saw highs but no rounded base recovering to a matching rim with a shallow handle.');
  const {L,R,bi,bv,rim,depth,hasHandle,hLow,hIdx}=best, tgt=rim+depth*rim;
  const pts=[{i:L.i,price:L.price,color:'#f59e0b',label:'Left rim'},{i:bi,price:bv,color:'#6366f1',label:'Cup base'},{i:R.i,price:R.price,color:'#f59e0b',label:'Right rim'}];
  if(hasHandle)pts.push({i:hIdx,price:hLow,color:'#10b981',label:'Handle low'});
  return { found:true, conf:best.conf, title, bias:'bullish',
    points:pts,
    lines:[{i0:L.i,p0:rim,i1:S.length-1,p1:rim,color:'#6366f1',dash:[6,4],width:1.6,label:'Rim / breakout'},
           {i0:bi,p0:tgt,i1:S.length-1,p1:tgt,color:'#10b981',dash:[3,4],width:1.2,label:'Target'}],
    target:tgt, breakout:+rim.toFixed(2),
    summary:'Bullish continuation — a '+(depth*100).toFixed(0)+'%-deep rounded base recovered to its rim'+(hasHandle?', then a shallow handle drift':' (handle not yet clearly formed)')+'. A breakout above the rim ($'+rim.toFixed(2)+') projects roughly the cup depth to about $'+tgt.toFixed(2)+'.',
    how:'Buy strength through the rim, ideally as handle volume dries up then expands on the breakout. Invalidated if it sinks back into the lower half of the cup or the handle gives back more than ~half its depth.' }; }

// Double Bottom — two swing lows at a similar level with a peak between (W), reversal up.
function azCMDouble(S){ const title='Double Bottom'; const piv=azCMPivots(S); const lows=piv.filter(p=>p.type==='L');
  if(lows.length<2)return _cmNF(title,'No two swing lows at a matching level with a peak between them.');
  const c=S.map(b=>b.c), n=S.length; let best=null;
  for(let a=0;a<lows.length-1;a++){ for(let b=a+1;b<lows.length;b++){ const L1=lows[a],L2=lows[b]; if(L2.i-L1.i<6)continue;
    const eq=Math.abs(L1.price-L2.price)/Math.min(L1.price,L2.price); if(eq>0.04)continue;
    let mi=L1.i,mv=-Infinity; for(let i=L1.i;i<=L2.i;i++)if(c[i]>mv){mv=c[i];mi=i;} const lowAvg=(L1.price+L2.price)/2;
    const prom=(mv-lowAvg)/lowAvg; if(prom<0.04)continue; const trend=_cmTrendBefore(S,L1.i);
    let conf=64; conf+=(1-Math.min(eq,0.04)/0.04)*16; conf+=Math.min(prom,0.2)/0.2*12; conf+=trend<0?6:-6; conf=Math.max(35,Math.min(94,Math.round(conf)));
    if(!best||conf>best.conf)best={conf,L1,L2,mi,mv,lowAvg}; } }
  if(!best)return _cmNF(title,'Found swing lows but none paired at a similar level with a strong enough peak between them.');
  const {L1,L2,mi,mv,lowAvg}=best, tgt=mv+(mv-lowAvg);
  return { found:true, conf:best.conf, title, bias:'bullish',
    points:[{i:L1.i,price:L1.price,color:'#10b981',label:'Bottom 1'},{i:mi,price:mv,color:'#6366f1',label:'Middle peak'},{i:L2.i,price:L2.price,color:'#10b981',label:'Bottom 2'}],
    lines:[{i0:mi,p0:mv,i1:n-1,p1:mv,color:'#6366f1',dash:[6,4],width:1.6,label:'Neckline'},

    target:tgt, neckline:+mv.toFixed(2),
    summary:'Bullish reversal — two lows near $'+lowAvg.toFixed(2)+' (a "W") with a peak between. A close above the middle peak / neckline ($'+mv.toFixed(2)+') confirms and projects to about $'+tgt.toFixed(2)+' (the W height added to the breakout).',
    how:'Trigger on a neckline breakout, ideally with the second bottom on lighter volume and the breakout on heavier. Invalidated on a close below the lower of the two bottoms.' }; }

// Bull Flag — a sharp pole, then a shallow downward/sideways consolidation, continuation up.
function azCMFlag(S){ const title='Bull Flag'; const c=S.map(b=>b.c), n=S.length; if(n<12)return _cmNF(title,'Needs a sharp advance (pole) then a short pullback (flag) — window too short.');
  let best=null;
  for(let pe=6;pe<n-2;pe++){ for(let pl=4;pl<=16;pl++){ const ps=pe-pl; if(ps<0)continue; const pole=(c[pe]-c[ps])/c[ps]; if(pole<0.12)continue;
    const flagLen=n-1-pe; if(flagLen<3||flagLen>pl*1.6)continue; let fmin=c[pe],fmax=c[pe]; for(let i=pe;i<n;i++){ if(c[i]<fmin)fmin=c[i]; if(c[i]>fmax)fmax=c[i]; }
    const retr=(c[pe]-fmin)/(c[pe]-c[ps]); if(retr<0.1||retr>0.5)continue;     // a genuine, shallow pullback (not just continued trend)
    if(fmax>c[pe]*1.08)continue;                                              // a flag consolidates — it shouldn't keep making big new highs (that's just trend)
    if(c[n-1]<fmin*1.001)continue;                                            // flag not broken down
    const tight=(fmax-fmin)/c[pe];                                            // tight channel preferred
    let conf=58; conf+=Math.min(pole,0.5)/0.5*16; conf+=(1-Math.min(retr,0.5)/0.5)*14; conf+=(0.12-Math.min(tight,0.12))/0.12*8;
    conf=Math.max(35,Math.min(93,Math.round(conf)));
    if(!best||conf>best.conf)best={conf,ps,pe,pole,fmin,fmax,flagLen}; } }
  if(!best)return _cmNF(title,'No sharp pole followed by a shallow, intact consolidation — either no strong run or the pullback ran too deep.');
  const {ps,pe,pole,fmin,fmax}=best, n2=S.length; const tgt=fmax+(c[pe]-c[ps]);
  return { found:true, conf:best.conf, title, bias:'bullish',
    points:[{i:ps,price:c[ps],color:'#6366f1',label:'Pole base'},{i:pe,price:c[pe],color:'#10b981',label:'Pole top'},{i:n2-1,price:c[n2-1],color:'#f59e0b',label:'Flag (now)'}],
    lines:[{i0:pe,p0:fmax,i1:n2-1,p1:fmax,color:'#6366f1',dash:[6,4],width:1.6,label:'Flag top / breakout'},
           {i0:ps,p0:tgt,i1:n2-1,p1:tgt,color:'#10b981',dash:[3,4],width:1.2,label:'Target'}],
    target:tgt, breakout:+fmax.toFixed(2),
    summary:'Bullish continuation — a +'+(pole*100).toFixed(0)+'% pole then a shallow consolidation that held above support. A breakout over the flag top ($'+fmax.toFixed(2)+') projects the pole height to about $'+tgt.toFixed(2)+'.',
    how:'Enter on the flag-top breakout, ideally on a volume expansion after the pullback’s volume faded. Invalidated if it breaks below the flag low (the consolidation’s bottom).' }; }

// Least-squares fit over pivot points → {m:slope per bar, b:intercept}.
function _cmFit(pts){ const n=pts.length; if(n<2)return null; let sx=0,sy=0,sxx=0,sxy=0; for(const p of pts){ sx+=p.i; sy+=p.price; sxx+=p.i*p.i; sxy+=p.i*p.price; } const d=n*sxx-sx*sx; if(!d)return null; const m=(n*sxy-sx*sy)/d; return {m,b:(sy-m*sx)/n}; }
// Converging trendline geometry from recent swing highs/lows — drives triangles & wedges.
function _cmGeom(S){ const piv=azCMPivots(S); const H=piv.filter(p=>p.type==='H'), L=piv.filter(p=>p.type==='L'); if(H.length<2||L.length<2)return null;
  const hh=H.slice(-3), ll=L.slice(-3), fh=_cmFit(hh), fl=_cmFit(ll); if(!fh||!fl)return null;
  const avg=S.reduce((a,b)=>a+b.c,0)/S.length, i0=Math.min(hh[0].i,ll[0].i), iL=Math.max(hh[hh.length-1].i,ll[ll.length-1].i), i1=S.length-1;
  const res=i=>fh.m*i+fh.b, sup=i=>fl.m*i+fl.b, wStart=res(i0)-sup(i0), wEnd=res(iL)-sup(iL);
  // convergence measured over the pivot span (not extrapolated past the data, where lines cross at the apex)
  const apex=(fh.m-fl.m)!==0?(fl.b-fh.b)/(fh.m-fl.m):1e9;
  return { H:hh, L:ll, fh, fl, avg, i0, iL, i1, apex, mhN:fh.m/avg, mlN:fl.m/avg, wStart, wEnd, converging:wEnd>0&&wEnd<wStart*0.85 }; }
// Triangles (flat side + sloping side) and wedges (both sides sloping, converging).
function azCMTriWedge(S,kind){ const titles={asctri:'Ascending Triangle',desctri:'Descending Triangle',fallwedge:'Falling Wedge',risewedge:'Rising Wedge'};
  const g=_cmGeom(S), title=titles[kind]; if(!g)return _cmNF(title,'Needs at least two swing highs and two swing lows forming converging trendlines — not present here.');
  // triangle = one side flat + the other clearly sloped; wedge = both sides sloped the same way + converging.
  const FLAT=0.0018, SLOPE=0.0025; const up=v=>v>SLOPE, dn=v=>v<-SLOPE, flat=v=>Math.abs(v)<=FLAT, dnAny=v=>v<-FLAT, upAny=v=>v>FLAT;
  const minH=Math.abs(g.wStart)/g.avg>=0.03; let ok=false, bias='neutral';
  if(kind==='asctri'){ ok=flat(g.mhN)&&up(g.mlN); bias='bullish'; }       // flat ceiling + rising lows
  else if(kind==='desctri'){ ok=flat(g.mlN)&&dn(g.mhN); bias='bearish'; } // flat floor + falling highs
  else if(kind==='fallwedge'){ ok=dnAny(g.mhN)&&dnAny(g.mlN)&&g.converging; bias='bullish'; }
  else if(kind==='risewedge'){ ok=upAny(g.mhN)&&upAny(g.mlN)&&g.converging; bias='bearish'; }
  ok=ok&&minH;
  if(!ok)return _cmNF(title,'Found swing structure but the trendline slopes don’t match a '+title.toLowerCase()+' (highs '+(g.mhN>FLAT?'rising':g.mhN<-FLAT?'falling':'flat')+', lows '+(g.mlN>FLAT?'rising':g.mlN<-FLAT?'falling':'flat')+(minH?'':'; range too tight')+').');
  const n=S.length, resAt=i=>g.fh.m*i+g.fh.b, supAt=i=>g.fl.m*i+g.fl.b, height=Math.abs(g.wStart);
  // draw the converging lines out to the apex (or the last bar, whichever comes first) so they don't cross visually
  const iEnd=(g.apex>g.iL&&g.apex<n-1)?Math.round(g.apex):n-1;
  const bullBreak=bias==='bullish', bk=bullBreak?resAt(iEnd):supAt(iEnd), tgt=bullBreak?bk+height:bk-height;
  const pts=g.H.map(p=>({i:p.i,price:p.price,color:'#ef4444',label:'Swing high'})).concat(g.L.map(p=>({i:p.i,price:p.price,color:'#10b981',label:'Swing low'})));
  const conf=Math.max(40,Math.min(90,Math.round(58+(g.converging?12:0)+Math.min(g.H.length+g.L.length,6)*3+(height/g.avg>0.05?6:0))));
  return { found:true, conf, title, bias, points:pts,
    lines:[{i0:g.i0,p0:resAt(g.i0),i1:iEnd,p1:resAt(iEnd),color:'#ef4444',dash:[6,4],width:1.5,label:'Resistance'},
           {i0:g.i0,p0:supAt(g.i0),i1:iEnd,p1:supAt(iEnd),color:'#10b981',dash:[6,4],width:1.5,label:'Support'},
           {i0:Math.floor((g.i0+n-1)/2),p0:tgt,i1:n-1,p1:tgt,color:bullBreak?'#10b981':'#ef4444',dash:[3,4],width:1.2,label:'Target'}],
    breakout:+bk.toFixed(2), target:tgt,
    summary:(bias==='bullish'?'Bullish':'Bearish')+' — '+(kind==='asctri'?'a flat resistance ceiling with higher lows pressing into it':kind==='desctri'?'a flat support floor with lower highs pressing down':kind==='fallwedge'?'two down-sloping lines converging (a falling wedge typically resolves up)':'two up-sloping lines converging (a rising wedge typically resolves down)')+'. A '+(bullBreak?'break above resistance':'break below support')+' (~$'+bk.toFixed(2)+') projects the pattern height to about $'+tgt.toFixed(2)+'.',
    how:'Wait for a decisive close '+(bullBreak?'above the upper line':'below the lower line')+' — ideally on expanding volume. Until it breaks, price can keep ping-ponging inside the lines; the apex is where it must resolve. Invalidated on a close back through the opposite line.' }; }
// Auto trendlines — regression channel through recent swing highs and lows.
function azCMTrend(S){ const g=_cmGeom(S), title='Trendlines'; if(!g)return _cmNF(title,'Not enough swing highs/lows to fit trendlines yet.');
  const n=S.length, resAt=i=>g.fh.m*i+g.fh.b, supAt=i=>g.fl.m*i+g.fl.b, px=S[n-1].c;
  const dir=Math.abs(g.mlN)>Math.abs(g.mhN)?g.mlN:g.mhN, slope=(g.mhN+g.mlN)/2;
  const bias=slope>0.001?'bullish':slope<-0.001?'bearish':'neutral';
  const toRes=(resAt(n-1)/px-1)*100, toSup=(px/supAt(n-1)-1)*100;
  return { found:true, info:true, title, bias, points:[],
    lines:[{i0:g.i0,p0:resAt(g.i0),i1:n-1,p1:resAt(n-1),color:'#ef4444',dash:[6,4],width:1.5,label:'Resistance'},
           {i0:g.i0,p0:supAt(g.i0),i1:n-1,p1:supAt(n-1),color:'#10b981',dash:[6,4],width:1.5,label:'Support'}],
    levelsList:[{label:'Upper line (now)',price:+resAt(n-1).toFixed(2)},{label:'Lower line (now)',price:+supAt(n-1).toFixed(2)}],
    summary:'The channel is '+(bias==='bullish'?'rising':bias==='bearish'?'falling':'roughly sideways')+'. Price sits ~'+Math.abs(toSup).toFixed(1)+'% above the lower line and ~'+Math.abs(toRes).toFixed(1)+'% below the upper line.',
    how:'Trendlines connect the swing '+'highs (resistance) and lows (support). Buys near the lower line with a stop just under it / sells or trims near the upper line are the classic plays; a clean break of either line often starts the next move.' }; }
// Support/Resistance zones — cluster pivots into horizontal levels, rank by touch count.
function azCMSR(S){ const title='Support / Resistance', piv=azCMPivots(S); const px=S[S.length-1].c; if(piv.length<2)return _cmNF(title,'Not enough swing points to map support/resistance zones.');
  const tol=0.018, zones=[]; piv.slice().sort((a,b)=>a.price-b.price).forEach(p=>{ const z=zones.find(z=>Math.abs(z.price-p.price)/z.price<=tol); if(z){ z.price=(z.price*z.touches+p.price)/(z.touches+1); z.touches++; z.lastI=Math.max(z.lastI,p.i); } else zones.push({price:p.price,touches:1,lastI:p.i}); });
  const sup=zones.filter(z=>z.price<px).sort((a,b)=>b.touches-a.touches||b.price-a.price).slice(0,3);
  const res=zones.filter(z=>z.price>=px).sort((a,b)=>b.touches-a.touches||a.price-b.price).slice(0,3);
  const n=S.length, mk=(z,c,lab)=>({i0:0,p0:z.price,i1:n-1,p1:z.price,color:c,dash:[2,4],width:1+Math.min(z.touches-1,3)*0.4,label:lab});
  const lines=sup.map(z=>mk(z,'#10b981','S')).concat(res.map(z=>mk(z,'#ef4444','R')));
  const levelsList=res.sort((a,b)=>a.price-b.price).map(z=>({label:'Resistance',price:+z.price.toFixed(2),touches:z.touches})).concat(sup.sort((a,b)=>b.price-a.price).map(z=>({label:'Support',price:+z.price.toFixed(2),touches:z.touches})));
  return { found:true, info:true, title, bias:'neutral', points:[], lines, levelsList,
    summary:'Mapped '+sup.length+' support and '+res.length+' resistance zone'+((sup.length+res.length)===1?'':'s')+' from where price repeatedly turned. Thicker lines = more touches = a level the market respects more.',
    how:'Zones with more touches matter more. Expect reactions (bounces/rejections) as price approaches them; a high-volume break and hold through a level often flips it (old resistance becomes support, and vice-versa).' }; }

/* ── draw + verdict ───────────────────────────────────────────────── */
function azCMDrawChart(W,det){ const cv=document.getElementById('cm-canvas'); if(!cv||typeof Chart==='undefined')return;

  if(det&&det.found){ const N=c.length;

      ds.push({label:L.label,data:arr,borderColor:L.color,borderWidth:L.width||1.4,borderDash:L.dash||[5,4],pointRadius:0,spanGaps:false,tension:0,order:1}); if(L.label&&keep.indexOf(L.label)<0)keep.push(L.label); });

    if(L==='_body'){ const i=x.dataIndex; return 'O '+open[i].toFixed(2)+' H '+hi[i].toFixed(2)+' L '+lo[i].toFixed(2)+' C '+c[i].toFixed(2); }
    if(L==='Vol')return 'Vol: '+fmt(x.parsed.y,0); return L+': $'+(+x.parsed.y).toFixed(2); };

}
// RSI(14) sub-panel under the main chart (uses the window's full-history RSI).
function azCMDrawRsi(W){ const cv=document.getElementById('cm-rsi'), wrap=document.getElementById('cm-rsi-wrap'); if(!cv)return;

  const when=e.days<0?`Last reported ${long} (${-e.days}d ago).`:e.days===0?`Reports <b>today</b> (${long})${whenT}.`:`Reports <b>${long}</b>${whenT} — in <b>${e.days} days</b>.`;
  const sig=(p.signal||'BUY'), su=sig.toUpperCase();
  const sc=su.indexOf('SELL')>=0?'#ef4444':su.indexOf('CAUT')>=0?'#f59e0b':su.indexOf('HOLD')>=0?'#9ca3af':'#10b981';
  const thesis=Array.isArray(p.thesis)?p.thesis:[];
  const risk=thesis.find(t=>/^risk/i.test(t)); const bull=thesis.filter(t=>!/^risk/i.test(t)).slice(0,3);
  const tile=(l,v)=>`<div class="pk-m"><div class="pk-m-l">${l}</div><div class="pk-m-v">${v}</div></div>`;
  el.innerHTML=
    `<div class="card-title collapsible" data-toggle="b-earn" onclick="toggleSection('b-earn')"><span>📅 Earnings Preview · ${p.ticker} <span class="card-hint">(#${rank} pick · ${e.days>=0?'reports '+short:'last report'})</span></span><span class="chevron">▼</span></div>`+
    `<div id="b-earn" style="font-size:12.5px;color:var(--text);opacity:.9;line-height:1.55">`+
      `<div class="box-info" style="border-radius:10px;padding:10px 12px;margin:4px 0 12px">${when} <b>${p.ticker}</b> is ranked <b>#${rank}</b> in today’s screen — <b style="color:${sc}">${sig}</b>, RSI ${p.rsi!=null?p.rsi:'—'}${p.confidence!=null?`, ${p.confidence}% confidence`:''}.</div>`+
      `<div class="pk-metrics" style="grid-template-columns:repeat(2,1fr);margin-bottom:12px">${tile('Next earnings',e.days>=0?short+(e.days===0?' (today)':` (${e.days}d)`):'reported')}${tile('Est. EPS',e.eps!=null?'$'+(+e.eps).toFixed(2):'—')}</div>`+
      (bull.length?`<div style="font-weight:700;margin-bottom:5px">Why it’s ranked</div><ul class="thesis2" style="margin-bottom:12px">${bull.map(t=>`<li>${t}</li>`).join('')}</ul>`:'')+
      `<div style="display:grid;grid-template-columns:1fr 1fr;gap:10px">`+
        `<div class="box-bull" style="border-radius:8px;padding:9px 11px;font-size:11.5px;line-height:1.45"><b>Bull</b> — ${sig} setup${p.entry?`; entry ${p.entry}`:''}${p.tp1?`, targets $${p.tp1.price}`:''}${p.tp2?` → $${p.tp2.price}`:''}${p.rr?` (R/R ${p.rr})`:''}. A beat or raise into RSI ${p.rsi!=null?p.rsi:''} can spark a sharp move.</div>`+
        `<div class="box-bear" style="border-radius:8px;padding:9px 11px;font-size:11.5px;line-height:1.45"><b>Bear</b> — ${risk?risk.replace(/^risk[:\s-]*/i,''):`a soft print breaks the setup; invalidation below the ${p.sl?'$'+p.sl.price+' stop':'stop'}.`}</div>`+
      `</div>`+
      `<div style="font-size:10px;color:#9ca3af;margin-top:10px">Auto-generated from today’s top-ranked pick + the earnings calendar — research, not financial advice.</div>`+
    `</div>`;
}

/* Numeric value for a sortable column (parses the formatted strings the row carries). */
function pickSortVal(c,key){
  const liveRsi=_picksRSI[c.ticker]!=null?_picksRSI[c.ticker]:c.rsi;
  const liveP=(_picksLive[c.ticker]&&_picksLive[c.ticker].price)||c.price;
  switch(key){
    case 'ticker': return c.ticker;
    case 'price': return liveP;
    case 'rsi': return liveRsi;
    case 'fwdPE': { const n=parseFloat(c.fwdPE); return isFinite(n)?n:1e9; }
    case 'rr': { const n=parseFloat(c.rr); return isFinite(n)?n:-1; }
    case 'rev': { const n=parseFloat(String(c.revGrowth).replace('+','')); return isFinite(n)?n:-1e9; }
    case 'tech': return c.tech; case 'fund': return c.fund; case 'social': return c.social!=null?c.social:5;
    case 'rank': return c.rank;
    default: return c.composite;
  }
}

/* Grade one archived pick on a CLOSING basis since its scan date: walk daily closes in order — a
   close at/above a target counts as a hit (TP2 wins outright; TP1 banks then keeps watching), a
   close at/below the stop is a stop-out. Current return is planned entry → latest price. */
function gradePick(pk,bars,live,ts){
  const entry=pk.entryRef||pk.basePrice, tp1=pk.tp1, tp2=pk.tp2, sl=pk.sl;
  const series=(bars||[]).filter(b=>!ts||b.t>=ts).map(b=>b.c).filter(c=>c>0);
  let status='OPEN',hitT1=false;
  for(const c of series){
    if(sl!=null&&c<=sl){ status=hitT1?'TP1':'STOPPED'; break; }
    if(tp2!=null&&c>=tp2){ status='TP2'; break; }
    if(tp1!=null&&c>=tp1){ hitT1=true; status='TP1'; }
  }
  const cur=live||(series.length?series[series.length-1]:null)||pk.basePrice;
  const ret=entry?((cur-entry)/entry*100):null;
  return {status,ret,cur,entry};
}
/* Aggregate grade stats across ALL archived picks (Track Record card's tiles + the Action Plan's
   conviction line both read this, reusing gradePick so the two surfaces can't diverge). */
function picksTrackStats(){
  const hist=Array.isArray(PICK_HISTORY)?PICK_HISTORY.filter(h=>h&&Array.isArray(h.picks)&&h.picks.length):[];
  let wins=0,losses=0,open=0,retSum=0,retN=0;
  for(const h of hist)for(const pk of h.picks){
    const g=gradePick(pk,_picksHistBars[pk.ticker]||[],(_picksLive[pk.ticker]&&_picksLive[pk.ticker].price)||null,h.ts);
    if(g.status==='TP1'||g.status==='TP2')wins++; else if(g.status==='STOPPED')losses++; else open++;
    if(g.ret!=null){retSum+=g.ret;retN++;}
  }
  return {wins,losses,open,hitRate:(wins+losses)>0?Math.round(wins/(wins+losses)*100):null,avgRet:retN?retSum/retN:null};
}
function renderPicksTrack(){
  const el=document.getElementById('picks-track'); if(!el)return;
  const hist=Array.isArray(PICK_HISTORY)?PICK_HISTORY.filter(h=>h&&Array.isArray(h.picks)&&h.picks.length):[];
  if(!hist.length){
    el.innerHTML='<div class="fund-note" style="opacity:.85">Building a track record. Once the next scan replaces today’s picks, the outgoing set is archived here and graded against actual prices — hit TP1/TP2, stopped, or still open — with a running hit-rate.</div>';
    return;
  }
  let wins=0,losses=0,open=0,retSum=0,retN=0;
  const groups=hist.slice(0,8).map(h=>{
    const rows=h.picks.map(pk=>{
      const g=gradePick(pk,_picksHistBars[pk.ticker]||[],(_picksLive[pk.ticker]&&_picksLive[pk.ticker].price)||null,h.ts);
      if(g.status==='TP1'||g.status==='TP2')wins++; else if(g.status==='STOPPED')losses++; else open++;
      if(g.ret!=null){retSum+=g.ret;retN++;}
      const badge={TP2:['#065f46','#d1fae5','✅ TP2'],TP1:['#065f46','#d1fae5','✅ TP1'],STOPPED:['#991b1b','#fee2e2','⛔ Stopped'],OPEN:['#475569','#e2e8f0','• Open']}[g.status];
      const rc=g.ret==null?'#6b7280':g.ret>=0?'#10b981':'#ef4444';

/* Risk-on/off composite from the day moves of the gauges we already fetch: equities + high-yield
   credit (+ crypto) tilt risk-on; gold + long Treasuries tilt risk-off. One read instead of 4 numbers. */
function riskAppetiteBanner(qMap){
  const g=s=>(qMap[s]&&qMap[s].chg!=null)?qMap[s].chg:null;
  const spy=g('SPY'),hyg=g('HYG'),ibit=g('IBIT'),gld=g('GLD'),tlt=g('TLT');
  let tilt=0,n=0; const add=(v,w)=>{ if(v!=null){ tilt+=w*v; n++; } };
  add(spy,1); add(hyg,1); add(ibit,0.5); add(gld,-1); add(tlt,-1);
  if(n<3)return '';
  const lab=tilt>0.4?'RISK-ON':tilt<-0.4?'RISK-OFF':'NEUTRAL';
  const col=tilt>0.4?'#10b981':tilt<-0.4?'#ef4444':'#f59e0b';
  const f=v=>(v>=0?'+':'')+fmt(v,1)+'%'; const parts=[];
  if(spy!=null)parts.push('S&P '+f(spy)); if(hyg!=null)parts.push('HY credit '+f(hyg));
  if(gld!=null)parts.push('gold '+f(gld)); if(tlt!=null)parts.push('20Y+ '+f(tlt));
  const pos=Math.max(-1,Math.min(1,tilt/2)); const pct=((pos+1)/2*100).toFixed(0);
  return `<div style="background:var(--surface-2);border-radius:10px;padding:10px 12px;margin-bottom:10px">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:7px"><span style="font-size:11px;color:#9ca3af;font-weight:700;text-transform:uppercase;letter-spacing:.5px">Risk appetite (today)</span><span style="font-weight:800;color:${col}">${lab}</span></div>
    <div style="position:relative;height:7px;border-radius:4px;background:linear-gradient(90deg,#ef4444,#f59e0b,#10b981)"><div style="position:absolute;top:-3px;left:calc(${pct}% - 6px);width:12px;height:12px;border-radius:50%;background:#fff;border:2px solid ${col};box-shadow:0 1px 3px rgba(0,0,0,.3)"></div></div>
    <div style="font-size:10.5px;color:#9ca3af;margin-top:7px">Tilt from ${parts.join(' · ')} — equities/credit risk-on vs gold/long-bonds risk-off.</div>
  </div>`;
}

  const curveTile=`<div class="macro-tile"><div class="macro-label">2s10s Curve</div><div class="macro-val" style="color:${sc2}">${spread==null?'—':(spread>=0?'+':'')+fmt(spread,2)+'%'}</div>${spread!=null?`<div style="font-size:9px;color:#9ca3af;margin-top:1px">${spread<0?'inverted ⚠️':'normal'}</div>`:''}</div>`;
  el.innerHTML=`<div class="macro-grid"><div class="macro-tile"><div class="macro-label">10yr Treasury</div><div class="macro-val">${m.tenYrYield?fmt(m.tenYrYield,2)+'%':'—'}</div></div>${curveTile}<div class="macro-tile"><div class="macro-label">Fed Funds</div><div class="macro-val">${m.fedFunds?fmt(m.fedFunds,2)+'%':'—'}</div></div><div class="macro-tile"><div class="macro-label">CPI YoY</div><div class="macro-val" style="color:${m.cpi!=null?(m.cpi>3?'#ef4444':m.cpi>2?'#f97316':'#10b981'):'#374151'}">${m.cpi!=null?fmt(m.cpi,1)+'%':'—'}</div></div><div class="macro-tile"><div class="macro-label">VIX</div><div class="macro-val" style="color:${vc}">${m.vix?fmt(m.vix,1):'—'}</div></div></div>`; }

/* Build today's biggest moves from the Markets universe we already fetched (indexes + sectors +
   risk gauges) — actual market structure, not just the account's holdings. */
function marketMovers(){
  const q=window.__MKTQ||{}; const lbl={}; for(const x of [...MKT_INDEX,...MKT_RISK,...MKT_SECTORS])lbl[x.s]=x.n;
  const rows=Object.keys(lbl).map(s=>({t:s,n:lbl[s],chg:q[s]&&q[s].chg!=null?q[s].chg:null})).filter(r=>r.chg!=null);
  rows.sort((a,b)=>b.chg-a.chg);
  return rows;
}
function renderBreadth(){
  const el=document.getElementById('mkt-breadth'); if(!el)return;
  const m=MKTX||{};
  const rows=marketMovers();
  let h='';
  if(rows.length>=4){
    const fc=v=>(v>=0?'+':'')+fmt(v,2)+'%';
    const g=rows.slice(0,4), l=rows.slice(-4).reverse();
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
    h+='<div><div style="font-size:11px;font-weight:700;color:#10b981;margin-bottom:4px">Leaders</div>'+g.map(x=>`<div class="risk-line"><span class="risk-name">${x.t} <span style="color:#9ca3af;font-weight:400;font-size:10.5px">${x.n}</span></span><span class="risk-val pos">${fc(x.chg)}</span></div>`).join('')+'</div>';
    h+='<div><div style="font-size:11px;font-weight:700;color:#ef4444;margin-bottom:4px">Laggards</div>'+l.map(x=>`<div class="risk-line"><span class="risk-name">${x.t} <span style="color:#9ca3af;font-weight:400;font-size:10.5px">${x.n}</span></span><span class="risk-val neg">${fc(x.chg)}</span></div>`).join('')+'</div></div>';
    h+='<div class="cov-note">Biggest moves today across the index, sector &amp; risk-gauge ETFs — the market\'s tape, not your book.</div>';
  } else if(m.movers){ // fall back to producer-supplied (your-book) movers if market quotes unavailable
    h+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px">';
    h+='<div><div style="font-size:11px;font-weight:700;color:#10b981;margin-bottom:4px">Your gainers</div>'+((m.movers.gainers||[]).map(x=>`<div class="risk-line"><span class="risk-name">${x.t}</span><span class="risk-val pos">${x.chg}</span></div>`).join(''))+'</div>';
    h+='<div><div style="font-size:11px;font-weight:700;color:#ef4444;margin-bottom:4px">Your losers</div>'+((m.movers.losers||[]).map(x=>`<div class="risk-line"><span class="risk-name">${x.t}</span><span class="risk-val neg">${x.chg}</span></div>`).join(''))+'</div></div>';
  }
  if(m.news){ const nb=(m.news.bullish+m.news.neutral+m.news.bearish)||1;
    h+=`<div style="margin-top:14px"><div style="font-size:12px;font-weight:700;margin-bottom:6px">News Sentiment <span style="font-weight:400;color:#9ca3af">(${m.news.bullish} bull · ${m.news.neutral} neu · ${m.news.bearish} bear)</span></div><div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:8px"><span style="width:${(m.news.bullish/nb*100).toFixed(1)}%;background:#10b981"></span><span style="width:${(m.news.neutral/nb*100).toFixed(1)}%;background:#d1d5db"></span><span style="width:${(m.news.bearish/nb*100).toFixed(1)}%;background:#ef4444"></span></div>`;
    h+=((m.news.items||[]).map(x=>`<div class="risk-line"><span class="risk-name"><b style="color:${x.sentiment==='bullish'?'#10b981':x.sentiment==='bearish'?'#ef4444':'#6b7280'}">${x.t}</b></span><span class="risk-val" style="font-weight:400;flex:1;text-align:right;color:var(--text);opacity:.8;font-size:11.5px;margin-left:8px">${x.title}</span></div>`).join(''))+'</div>';
  }
  el.innerHTML=h||'<div class="tech-empty">No breadth data.</div>';
}
window.__onPortReady=function(){ if(_picksInit){ renderPicksTable(); renderPicksCards(); renderPicksTrack(); } };

(function(){
  try{ const d=document.getElementById('tab-picks-date'); if(d)d.textContent='· '+ANALYSIS_DATE.replace(', 2026',''); }catch(e){}
  try{ const _dt=localStorage.getItem('dash_tab'); if(_dt==='picks'||_dt==='markets')switchTab(_dt); }catch(e){}
})();

/* Theme cycles Light → Dark → Neon → Light. The icon shows the theme you'll switch TO. */
var THEME_ORDER=['light','gold']; /* Light ⇄ Gold (champagne-on-black dark theme) */
function themeIcon(t){ return t==='gold'?'☀️':'✨'; } /* icon = the theme you'll switch TO (✨ = the gold dark theme) */
function themeColor(t){ return t==='gold'?'#000':'#16213e'; }
function toggleTheme(){ const h=document.documentElement; let cur=h.getAttribute('data-theme')||'light'; if(cur==='dark'||cur==='neon')cur='gold'; const next=THEME_ORDER[(THEME_ORDER.indexOf(cur)+1)%THEME_ORDER.length]; h.setAttribute('data-theme',next); try{localStorage.setItem('pf_theme',next);}catch(e){} const b=document.getElementById('theme-toggle'); if(b)b.textContent=themeIcon(next); const m=document.querySelector('meta[name="theme-color"]'); if(m)m.setAttribute('content',themeColor(next)); try{ if(typeof applyChartTheme==='function') applyChartTheme(); }catch(e){} try{ if(typeof renderHeatmap==='function') renderHeatmap(); }catch(e){} }

/* Privacy mode: blur your $ figures on the Portfolio tab (other tabs are market data, untouched). */
let _moneyMo=null,_moneyT=null;
function _wrapMoney(){
  const root=document.getElementById('page-portfolio'); if(!root)return;
  if(_moneyMo)_moneyMo.disconnect();
  try{
    const walker=document.createTreeWalker(root,NodeFilter.SHOW_TEXT,{acceptNode:function(n){
      if(!n.nodeValue||n.nodeValue.indexOf('$')<0)return NodeFilter.FILTER_REJECT;
      const p=n.parentNode; if(!p)return NodeFilter.FILTER_REJECT;
      if(p.classList&&p.classList.contains('money'))return NodeFilter.FILTER_REJECT;
      const t=p.nodeName; if(t==='SCRIPT'||t==='STYLE'||t==='CANVAS'||t==='TEXTAREA'||t==='INPUT')return NodeFilter.FILTER_REJECT;
      return NodeFilter.FILTER_ACCEPT;
    }});
    const g=/\$\d[\d,]*(?:\.\d+)?/g; const nodes=[];
    while(walker.nextNode()){ g.lastIndex=0; if(g.test(walker.currentNode.nodeValue))nodes.push(walker.currentNode); }
    nodes.forEach(function(n){
      const txt=n.nodeValue,frag=document.createDocumentFragment(); let last=0,m; g.lastIndex=0;
      while((m=g.exec(txt))){ if(m.index>last)frag.appendChild(document.createTextNode(txt.slice(last,m.index)));
        const s=document.createElement('span'); s.className='money'; s.textContent=m[0]; frag.appendChild(s); last=m.index+m[0].length; }
      if(last<txt.length)frag.appendChild(document.createTextNode(txt.slice(last)));
      if(n.parentNode)n.parentNode.replaceChild(frag,n);
    });
  }catch(e){}
  if(_moneyMo)_moneyMo.observe(root,{childList:true,subtree:true});
}
function startMoney(){ const root=document.getElementById('page-portfolio'); if(!root)return;
  if(!_moneyMo)_moneyMo=new MutationObserver(function(){ clearTimeout(_moneyT); _moneyT=setTimeout(_wrapMoney,150); });
  _wrapMoney(); }
function stopMoney(){ if(_moneyMo){ _moneyMo.disconnect(); _moneyMo=null; } }
function togglePrivacy(){ const on=!document.body.classList.contains('pf-private'); document.body.classList.toggle('pf-private',on); try{localStorage.setItem('pf_private',on?'1':'0');}catch(e){} const b=document.getElementById('pf-priv'); if(b)b.textContent=on?'🙈':'👁️'; if(on)startMoney(); else stopMoney(); }
window.togglePrivacy=togglePrivacy;
(function(){ try{ if(localStorage.getItem('pf_private')==='1'){ if(document.body)document.body.classList.add('pf-private'); startMoney(); } }catch(e){} })();
window.toggleTheme=toggleTheme;
(function(){ const b=document.getElementById('theme-toggle'); if(b)b.textContent=themeIcon(document.documentElement.getAttribute('data-theme')||'light'); })();
applyChartTheme();

load();
