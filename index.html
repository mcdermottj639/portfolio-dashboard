.help-x { flex: 0 0 auto; border: none; background: var(--surface-2); color: var(--text); width: 30px; height: 30px; border-radius: 50%; font-size: 18px; line-height: 1; cursor: pointer; }
.help-body { font-size: 13.5px; line-height: 1.55; }
.help-body p { margin: 9px 0; }
.help-body ul { margin: 8px 0; padding-left: 17px; }
.help-body li { margin: 5px 0; }
.help-body b { font-weight: 700; }
.help-body .hk { color: var(--accent); font-weight: 700; }
.help-body .hsub { font-size: 11.5px; font-weight: 800; text-transform: uppercase; letter-spacing: .4px; color: #9ca3af; margin: 14px 0 4px; }
html[data-theme="dark"] .help-box { --hb-bg: #161617; border: 1px solid #2a2a2c; }
html[data-theme="gold"] .help-box { --hb-bg: #0b0b0c; border: 1px solid var(--nx-bd); box-shadow: 0 20px 60px rgba(0,0,0,.7), 0 0 30px rgba(227,192,116,.08); }
/* Privacy mode — blur personal $ figures (Portfolio tab) so the app can be shown without revealing balances */
.money { transition: filter .12s; }
body.pf-private .money { filter: blur(7px); -webkit-user-select: none; user-select: none; }
.tab { flex: 1 1 auto; min-width: 74px; max-width: 260px; padding: 11px 12px; border-radius: 12px; border: none; background: white; color: #6b7280; font-size: 13.5px; font-weight: 600; cursor: pointer; box-shadow: 0 1px 4px rgba(0,0,0,0.05); transition: all 0.15s; display: flex; align-items: center; justify-content: center; gap: 6px; font-family: inherit; white-space: nowrap; }
.tab:hover { color: #1c1c1e; }
.tab.active { background: linear-gradient(135deg, #1a1a2e 0%, #0f3460 100%); color: white; box-shadow: 0 2px 8px rgba(15,52,96,0.3); }
.tab .tab-sub { font-size: 10px; opacity: 0.7; font-weight: 500; margin-left: 4px; }
@media (max-width:760px){ .tabbar{ gap:6px; } .tab{ padding:10px 5px; font-size:12px; gap:4px; } .tab .tab-sub{ display:none; } }

/* ─── Daily Picks page ─── */
.picks-hero { background: linear-gradient(135deg, #0f3460 0%, #16213e 60%, #1a1a2e 100%); color: white; padding: 20px 24px; border-radius: 16px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; }
.ph-label { font-size: 11px; opacity: 0.6; text-transform: uppercase; letter-spacing: 0.8px; }
.ph-date { font-size: 24px; font-weight: 700; letter-spacing: -0.5px; margin-top: 2px; }
.ph-stale { font-size: 11.5px; opacity: 0.75; margin-top: 4px; }
.run-btn { background: rgba(255,255,255,0.14); color: white; border: 1px solid rgba(255,255,255,0.25); padding: 9px 16px; border-radius: 10px; font-size: 13px; font-weight: 600; cursor: pointer; font-family: inherit; white-space: nowrap; }
.run-btn:hover { background: rgba(255,255,255,0.24); }

.score-pill2 { display:inline-flex; align-items:center; justify-content:center; min-width:42px; padding:3px 9px; border-radius:999px; font-weight:700; font-size:12.5px; }
.own-badge { display:inline-block; background:#ede9fe; color:#5b21b6; font-size:9.5px; font-weight:700; padding:2px 6px; border-radius:999px; margin-left:5px; white-space:nowrap; vertical-align:middle; }
.drift-flag { font-size:10px; font-weight:700; padding:2px 6px; border-radius:5px; white-space:nowrap; display:inline-block; }

.picks-grid2 { display:grid; grid-template-columns:repeat(auto-fit,minmax(300px,1fr)); gap:14px; }
.pk-head { display:flex; justify-content:space-between; align-items:flex-start; margin-bottom:14px; gap:8px; }
.pk-tkr { font-size:22px; font-weight:800; }
.pk-name { font-size:11.5px; color:#9ca3af; margin-top:1px; }
.pk-meta { font-size:11px; color:#9ca3af; margin-top:3px; }
.pk-sig { padding:4px 11px; border-radius:999px; font-size:11px; font-weight:700; white-space:nowrap; }
.pk-sig.buy { background:#d1fae5; color:#065f46; }
.pk-sig.cautious { background:#fef9c3; color:#854d0e; }
.ladder2 { margin:0 0 14px; }
.ld-row { display:flex; align-items:center; gap:8px; margin-bottom:6px; }
.ld-lbl { width:46px; text-align:right; font-size:9.5px; font-weight:700; text-transform:uppercase; letter-spacing:0.05em; color:#9ca3af; }
.ld-bar { height:22px; border-radius:5px; display:flex; align-items:center; padding:0 9px; font-weight:700; font-size:11.5px; color:#fff; }
.ld-pct { width:54px; font-size:10.5px; color:#9ca3af; }
.pk-metrics { display:grid; grid-template-columns:1fr 1fr 1fr; gap:8px; margin-bottom:12px; }
.pk-m { background:#f9fafb; border-radius:8px; padding:8px 10px; }
.pk-m-l { font-size:9px; text-transform:uppercase; letter-spacing:0.05em; color:#9ca3af; font-weight:700; margin-bottom:3px; }
.pk-m-v { font-size:13px; font-weight:700; }
.conf2 { display:flex; align-items:center; gap:8px; margin-bottom:12px; }
.conf2-lbl { font-size:11px; color:#9ca3af; width:74px; }
.conf2-track { flex:1; height:6px; background:#f3f4f6; border-radius:3px; }
.conf2-fill { height:100%; border-radius:3px; background:linear-gradient(to right,#6366f1,#10b981); }
.conf2-pct { font-weight:700; font-size:12px; width:34px; }
.thesis2 { list-style:none; padding:0; margin:0; }
.thesis2 li { font-size:11.5px; color:#374151; padding:3px 0 3px 15px; position:relative; line-height:1.5; }
.thesis2 li::before { content:"→"; position:absolute; left:0; color:#6366f1; font-size:11px; top:3px; }
.cross-note { font-size:11px; padding:8px 11px; border-radius:8px; margin-bottom:10px; line-height:1.45; }
.tv-link { display:inline-flex; align-items:center; gap:4px; font-size:11px; color:#6366f1; text-decoration:none; margin-top:10px; padding:5px 11px; border:1px solid #e5e7eb; border-radius:6px; }
.tv-link:hover { background:#f5f3ff; }
.teaser-bar { background:#f5f3ff; border:1px solid #ddd6fe; border-radius:10px; padding:9px 12px; margin-bottom:10px; display:flex; justify-content:space-between; align-items:center; gap:8px; flex-wrap:wrap; }
.teaser-link { font-size:11.5px; font-weight:700; color:white; background:#6366f1; padding:5px 12px; border-radius:7px; cursor:pointer; white-space:nowrap; }
.teaser-link:hover { background:#4f46e5; }
.fund-note { font-size: 11px; color: #9ca3af; margin-top: 10px; }
.rsi-pill { display: inline-block; padding: 2px 8px; border-radius: 999px; font-size: 11px; font-weight: 700; }
.tech-empty { font-size: 12px; color: #9ca3af; }
.dp-link { display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:600; color:#4f46e5; cursor:pointer; }
.mkt-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media (max-width:760px){.mkt-grid{grid-template-columns:repeat(2,1fr)}}
.mkt-tile{background:#f9fafb;border-radius:10px;padding:12px 14px}
.mkt-name{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.5px}
.mkt-sym{font-size:13px;font-weight:700;margin:2px 0}
.mkt-price{font-size:18px;font-weight:700}
.mkt-chg{font-size:12px;font-weight:600;margin-top:2px}
.sec-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:6px}
@media (max-width:760px){.sec-grid{grid-template-columns:repeat(3,1fr)}}
.sec-cell{border-radius:8px;padding:9px;text-align:center}
.macro-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:10px}
@media (max-width:760px){.macro-grid{grid-template-columns:repeat(2,1fr)}}
.macro-tile{background:#f9fafb;border-radius:10px;padding:11px 14px}
.macro-label{font-size:10px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.5px;margin-bottom:3px}
.macro-val{font-size:20px;font-weight:700;color:#1c1c1e}
.kyle-btn{background:rgba(255,255,255,0.16);color:#fff;border:1px solid rgba(255,255,255,0.3);padding:8px 14px;border-radius:10px;font-size:12.5px;font-weight:600;cursor:pointer;font-family:inherit;white-space:nowrap}.kyle-btn:hover{background:rgba(255,255,255,0.26)}.kyle-btn:disabled{opacity:0.6;cursor:default}

/* ═══ Cash-App-inspired theming (Cash green accent · bold · light/dark) ═══ */
:root{ --accent:#00c244; --surface-2:#f9fafb; --text:#1c1c1e; }
html[data-theme="dark"]{ color-scheme:dark; --accent:#00d632; --surface-2:#202124; --text:#ffffff; }

/* Both themes: a bold near-black "wealth" hero + cash-green accents in place of indigo */
.header,.picks-hero{ background:linear-gradient(140deg,#0c1f17 0%,#06100b 100%); }
.tab.active{ background:linear-gradient(140deg,#0c1f17 0%,#06100b 100%); box-shadow:0 2px 10px rgba(0,194,68,0.25); }
.h-tag{ background:rgba(0,214,80,0.18); }
.dp-link,.tv-link{ color:var(--accent); }
.thesis2 li::before{ color:var(--accent); }
.conf2-fill{ background:linear-gradient(to right,#00c244,#00d632); }
.teaser-link{ background:var(--accent); } .teaser-link:hover{ filter:brightness(0.92); }
.card,.col-card{ border-radius:18px; }
.theme-toggle{ flex:0 0 auto!important; max-width:50px!important; font-size:17px; padding:11px 0!important; }

/* ═══ DARK THEME surfaces ═══ */
html[data-theme="dark"] body{ background:#000; color:var(--text); }
html[data-theme="dark"] .tabbar{ background:#000; }
html[data-theme="dark"] .tab{ background:#161616; color:#9a9aa0; box-shadow:none; }
html[data-theme="dark"] .tab:hover{ color:#fff; }
html[data-theme="dark"] .card,
html[data-theme="dark"] .col-card{ background:#161616; box-shadow:none; border:1px solid #242427; }
html[data-theme="dark"] .col-title{ color:var(--text); }
html[data-theme="dark"] .macro-val{ color:var(--text); }
html[data-theme="dark"] .snap,
html[data-theme="dark"] .mkt-tile,
html[data-theme="dark"] .macro-tile,
html[data-theme="dark"] .pk-m{ background:var(--surface-2); }
html[data-theme="dark"] thead th{ border-bottom-color:#262629; }
html[data-theme="dark"] thead th.sortable:hover,
html[data-theme="dark"] thead th.active{ color:#fff; }
html[data-theme="dark"] tbody tr{ border-bottom-color:#1d1d1f; }
html[data-theme="dark"] tbody tr:hover{ background:#1a1a1c; }
html[data-theme="dark"] .risk-line,
html[data-theme="dark"] .exdiv-line,
html[data-theme="dark"] .harv-line{ border-bottom-color:#242427; }
html[data-theme="dark"] .risk-name{ color:#c9c9ce; }
html[data-theme="dark"] .thesis2 li{ color:#c9c9ce; }
html[data-theme="dark"] .alloc-track,
html[data-theme="dark"] .conf2-track,
html[data-theme="dark"] .gauge{ background:#2a2a2e; }
html[data-theme="dark"] .scn{ border-color:#2a2a2e; }
html[data-theme="dark"] .tv-link{ border-color:#2a2a2e; }
html[data-theme="dark"] .small-chip{ background:#3a2f0a; color:#fde68a; }
html[data-theme="dark"] .pk-sig.buy{ background:#06371f; color:#34d399; }
html[data-theme="dark"] .pk-sig.cautious{ background:#3a2f0a; color:#fde68a; }
html[data-theme="dark"] .margin-banner{ background:#2a1414; border-color:#7f1d1d; }
html[data-theme="dark"] .inc-tile{ background:#0c2417; border-color:#14532d; }
html[data-theme="dark"] .harvest-tile{ background:#2a1414; border-color:#7f1d1d; }
html[data-theme="dark"] #pf-fresh{ background:#161616!important; color:#9a9aa0!important; border-color:#242427!important; }
html[data-theme="dark"] .teaser-bar{ background:#0c2417; border-color:#14532d; }
html[data-theme="dark"] .cross-note{ background:#10241f!important; color:#a7f3d0!important; }
/* Reusable tinted info boxes — light + dark variants so they never render as white blocks */
.box-bull{ background:#f0fdf4; border:1px solid #bbf7d0; color:#14532d; }
.box-bear{ background:#fef2f2; border:1px solid #fecaca; color:#991b1b; }
.box-info{ background:#eef2ff; border:1px solid #c7d2fe; color:#3730a3; }
.box-warn{ background:#fff7ed; border:1px solid #fed7aa; color:#9a3412; }
html[data-theme="dark"] .box-bull{ background:#0c2417; border-color:#14532d; color:#a7f3d0; }
html[data-theme="dark"] .box-bear{ background:#2a1414; border-color:#7f1d1d; color:#fca5a5; }
html[data-theme="dark"] .box-info{ background:#171a3a; border-color:#312e81; color:#c7d2fe; }
html[data-theme="dark"] .box-warn{ background:#2a1a08; border-color:#7c4a03; color:#fed7aa; }

/* ═══ Holdings heatmap (treemap) — theme-agnostic shell ═══ */
.heatmap{ position:relative; width:100%; height:340px; border-radius:12px; overflow:hidden; background:var(--surface-2); }
@media (max-width:760px){ .heatmap{ height:300px; } }
.hm-tile{ position:absolute; border-radius:6px; overflow:hidden; display:flex; flex-direction:column; justify-content:center; align-items:center; padding:2px; color:#fff; border:1px solid rgba(0,0,0,0.18); cursor:pointer; transition:left .28s ease,top .28s ease,width .28s ease,height .28s ease,background .25s; }
.hm-tile:hover{ filter:brightness(1.12); }
.hm-sym{ font-weight:800; line-height:1; letter-spacing:-0.3px; text-shadow:0 1px 2px rgba(0,0,0,0.35); }
.hm-chg{ font-weight:600; line-height:1.1; margin-top:2px; opacity:0.95; text-shadow:0 1px 2px rgba(0,0,0,0.35); }
.hm-tg{ font-size:11px; font-weight:700; padding:4px 11px; border-radius:999px; border:none; cursor:pointer; background:var(--surface-2); color:var(--text); font-family:inherit; }
.hm-tg.active{ background:var(--accent); color:#04140a; }
html[data-theme="dark"] .hm-tile,html[data-theme="gold"] .hm-tile{ border-color:rgba(255,255,255,0.07); }

/* ═══ Dark theme — "Gold" luxe HUD (champagne-on-flat-black). data-theme="gold";
   legacy "dark"/"neon" prefs auto-migrate to it (see boot script + toggleTheme). Light stays untouched. ═══ */
html[data-theme="gold"]{ color-scheme:dark; --accent:#e3c074; --surface-2:#0e0e0f; --text:#f2ebdc;
  /* var names are historical (cyan/mag/pur) — repurposed to the rich-gold palette */
  --nx-cyan:#e3c074; --nx-mag:#c98a3a; --nx-pur:#caa24a; --nx-grn:#3fcf94; --nx-red:#ef8278; --nx-bd:rgba(201,168,100,.18); --nx-muted:#9c917b; }
html[data-theme="gold"] body{ background:#000; color:var(--text); }
html[data-theme="gold"] .tabbar{ background:transparent; }
html[data-theme="gold"] .tab{ background:#0c0c0d; color:#9c917b; box-shadow:none; border:1px solid var(--nx-bd); }
html[data-theme="gold"] .tab:hover{ color:var(--text); }
html[data-theme="gold"] .tab.active{ background:linear-gradient(140deg,rgba(227,192,116,.16),rgba(201,138,58,.07)); color:#fff5e0; border-color:rgba(227,192,116,.55); box-shadow:none; }
html[data-theme="gold"] .card,
html[data-theme="gold"] .col-card{ background:#0b0b0c; border:1px solid var(--nx-bd); box-shadow:0 8px 26px rgba(0,0,0,.65), 0 0 22px rgba(227,192,116,.07), inset 0 1px 0 rgba(227,192,116,.05); -webkit-backdrop-filter:none; backdrop-filter:none; }
html[data-theme="gold"] .col-title,
html[data-theme="gold"] .card-title,
html[data-theme="gold"] .macro-val{ color:var(--text); }
html[data-theme="gold"] .snap,
html[data-theme="gold"] .mkt-tile,
html[data-theme="gold"] .macro-tile,
html[data-theme="gold"] .pk-m{ background:#0e0e0f; border:1px solid var(--nx-bd); }
/* hero stat tiles (portfolio .snap-grid only) — true black with warm rich-gold/jewel edges, no glow */
html[data-theme="gold"] .snap-grid .snap{ border-width:1px; background:#0c0c0d; }
html[data-theme="gold"] .snap-grid .snap:nth-child(5n+1){ background:linear-gradient(160deg,rgba(46,160,110,.10),#080a09 62%); border-color:rgba(70,190,140,.30); box-shadow:0 0 18px rgba(63,200,140,.06); }
html[data-theme="gold"] .snap-grid .snap:nth-child(5n+2){ background:linear-gradient(160deg,rgba(196,135,55,.12),#0c0a07 62%); border-color:rgba(214,150,70,.34); box-shadow:0 0 18px rgba(206,142,62,.06); }
html[data-theme="gold"] .snap-grid .snap:nth-child(5n+3){ background:linear-gradient(160deg,rgba(214,175,90,.11),#0c0b07 62%); border-color:rgba(227,192,116,.34); box-shadow:0 0 18px rgba(227,192,116,.06); }
html[data-theme="gold"] .snap-grid .snap:nth-child(5n+4){ background:linear-gradient(160deg,rgba(176,96,72,.11),#0c0908 62%); border-color:rgba(198,122,92,.32); box-shadow:0 0 18px rgba(188,108,82,.06); }
html[data-theme="gold"] .snap-grid .snap:nth-child(5n+5){ background:linear-gradient(160deg,rgba(227,192,116,.12),#0c0b07 62%); border-color:rgba(227,192,116,.36); box-shadow:0 0 18px rgba(227,192,116,.07); }
html[data-theme="gold"] .snap-grid .snap .snap-lbl{ color:#b3a98f; }
html[data-theme="gold"] thead th{ border-bottom-color:rgba(201,168,100,.20); color:#a89c80; }
html[data-theme="gold"] thead th.sortable:hover,
html[data-theme="gold"] thead th.active{ color:#fff5e0; }
html[data-theme="gold"] tbody tr{ border-bottom-color:rgba(201,168,100,.09); }
html[data-theme="gold"] tbody tr:hover{ background:rgba(227,192,116,.06); }
html[data-theme="gold"] .risk-line,
html[data-theme="gold"] .exdiv-line,
html[data-theme="gold"] .harv-line{ border-bottom-color:var(--nx-bd); }
html[data-theme="gold"] .risk-name,
html[data-theme="gold"] .thesis2 li{ color:#cabfa6; }
html[data-theme="gold"] .alloc-track,
html[data-theme="gold"] .conf2-track,
html[data-theme="gold"] .gauge{ background:#1a1610; }
html[data-theme="gold"] .scn{ border-color:var(--nx-bd); background:#0e0e0f; }
html[data-theme="gold"] .tv-link{ border-color:var(--nx-bd); }
/* accent colors + glow on the headline numbers */
html[data-theme="gold"] .pos{ color:var(--nx-grn); }
html[data-theme="gold"] .neg{ color:var(--nx-red); }
html[data-theme="gold"] .neu{ color:var(--nx-muted); }
/* hero value = champagne-gold gradient text with a warm glow */
html[data-theme="gold"] .h-value{ background:linear-gradient(180deg,#f6e2a8 0%,#e3c074 48%,#c69a4a 100%);
  -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:#e3c074;
  filter:drop-shadow(0 0 16px rgba(227,192,116,.40)); }
html[data-theme="gold"] .snap-val,
html[data-theme="gold"] .perf-val,
html[data-theme="gold"] .pm-v,
html[data-theme="gold"] .stress-big,
html[data-theme="gold"] .scn-val,
html[data-theme="gold"] .inc-val,
html[data-theme="gold"] .macro-val{ text-shadow:0 0 12px rgba(227,192,116,.18); }
html[data-theme="gold"] .card-hint,
html[data-theme="gold"] .snap-lbl,
html[data-theme="gold"] .perf-lbl,
html[data-theme="gold"] .macro-label{ color:#8a7f68; }
/* hero gets a HUD frame + corner brackets */
html[data-theme="gold"] .header,
html[data-theme="gold"] .picks-hero{ position:relative; background:radial-gradient(130% 130% at 0% 0%, rgba(227,192,116,.10), transparent 52%), #070707; border:1px solid rgba(227,192,116,.32); box-shadow:0 0 30px rgba(227,192,116,.09), inset 0 1px 0 rgba(227,192,116,.06); }
html[data-theme="gold"] .header::before,
html[data-theme="gold"] .header::after,
html[data-theme="gold"] .picks-hero::before,

html[data-theme="gold"] .header::before,

html[data-theme="gold"] .h-tag{ background:rgba(227,192,116,.14); border:1px solid rgba(227,192,116,.32); color:#f0e2c2; }
/* tinted components — gold-theme variants so they never fall back to light blocks */

html[data-theme="gold"] .inc-tile{ background:rgba(6,55,31,.4); border-color:#14532d; }
html[data-theme="gold"] .inc-lbl{ color:#34d399; } html[data-theme="gold"] .inc-val{ color:#a7f3d0; } html[data-theme="gold"] .inc-sub{ color:#6ee7b7; }
html[data-theme="gold"] .harvest-tile{ background:rgba(127,29,29,.22); border-color:#7f1d1d; }
html[data-theme="gold"] .harvest-tile .inc-lbl{ color:#fca5a5; } html[data-theme="gold"] .harvest-tile .inc-val{ color:#fecaca; } html[data-theme="gold"] .harvest-tile .inc-sub{ color:#fca5a5; }
html[data-theme="gold"] .small-chip{ background:#322713; color:#f4d98a; }
html[data-theme="gold"] .pk-sig.buy{ background:#06371f; color:#34d399; }
html[data-theme="gold"] .pk-sig.cautious{ background:#3a2f0a; color:#fde68a; }
html[data-theme="gold"] .teaser-bar{ background:rgba(6,55,31,.35); border-color:#14532d; }

<script>
/* ═══════════════════════════════════════════════════════════════════
   PWA REPLAY SHIM  (consumer side)
   The live MCP bridge (window.cowork) only exists inside the Claude app.
   Outside it — e.g. this PWA on a phone — we stand in a replacement that
   replays responses pre-fetched into data.json by the producer agent
   (see producer/PRODUCER.md), refreshed ~every 15 min during market hours.
   Keys are derived identically here and in producer/build-data.mjs.
═══════════════════════════════════════════════════════════════════ */
(function(){
  function stable(o){ if(o===null||typeof o!=='object')return JSON.stringify(o); if(Array.isArray(o))return '['+o.map(stable).join(',')+']'; return '{'+Object.keys(o).sort().map(function(k){return JSON.stringify(k)+':'+stable(o[k]);}).join(',')+'}'; }
  /* Exact key for stable calls (portfolio, positions, Alpha Vantage). Quotes and
     historicals are NOT keyed — they're assembled per-symbol below, so any batching
     the app uses resolves regardless of how the producer fetched them. */
  function makeKey(server, args){ return server+'|'+stable(args||{}); }
  window.__pfKey=makeKey;
  /* ── decryption (matches producer/emit.mjs) ── */
  function b64d(s){ var bin=atob(s); var u=new Uint8Array(bin.length); for(var i=0;i<bin.length;i++)u[i]=bin.charCodeAt(i); return u; }
  function decryptEnvelope(env, pass){
    return crypto.subtle.importKey('raw', new TextEncoder().encode(pass), 'PBKDF2', false, ['deriveKey'])
      .then(function(km){ return crypto.subtle.deriveKey({name:'PBKDF2',salt:b64d(env.salt),iterations:env.iter||150000,hash:'SHA-256'}, km, {name:'AES-GCM',length:256}, false, ['decrypt']); })
      .then(function(key){ return crypto.subtle.decrypt({name:'AES-GCM',iv:b64d(env.iv)}, key, b64d(env.ct)); })
      .then(function(pt){ return JSON.parse(new TextDecoder().decode(pt)); });
  }
  var EMPTY={recorded:{},quotes:{},hist:{}};
  function loadData(){
    return fetch('./data.json',{cache:'no-store'}).then(function(r){ if(!r.ok)throw new Error('data.json '+r.status); return r.json(); })
      .then(function(raw){
        if(!raw||!raw.enc) return raw;                       // plaintext (dev / sample)
        // Normalize: trim, and convert "smart" dashes/minus back to a plain hyphen so a
        // mobile keyboard can't silently break an otherwise-correct passphrase.
        function norm(p){ return p==null?p:String(p).trim().replace(/[‐-―−⁃]/g,'-'); }
        var hk=(location.hash.match(/(?:^|[#&])key=([^&]+)/)||[])[1];
        if(hk){ try{hk=decodeURIComponent(hk);}catch(e){} history.replaceState(null,'',location.pathname+location.search); }
        var pass=norm(hk||localStorage.getItem('pf_pass')||null);
        // Custom unlock prompt — a real password input (no auto-capitalize / autocorrect /
        // smart-punctuation), unlike window.prompt which iOS mangles.
        function askPass(showErr){
          return new Promise(function(resolve){
            var host=document.body||document.documentElement;
            var ov=document.getElementById('pf-unlock');
            if(!ov){
              ov=document.createElement('div'); ov.id='pf-unlock';
              ov.style.cssText='position:fixed;inset:0;z-index:99999;display:flex;align-items:center;justify-content:center;background:rgba(0,0,0,0.6);padding:24px';
              ov.innerHTML='<div style="background:#fff;border-radius:16px;padding:22px;max-width:340px;width:100%;font-family:-apple-system,BlinkMacSystemFont,sans-serif"><div style="font-size:15px;font-weight:700;color:#1c1c1e">🔒 Dashboard passphrase</div><div style="font-size:12px;color:#6b7280;margin:6px 0 12px">Enter your passphrase to unlock.</div><input id="pf-pass-input" type="password" autocapitalize="off" autocorrect="off" autocomplete="current-password" spellcheck="false" style="width:100%;padding:11px 12px;border:1px solid #d1d5db;border-radius:10px;font-size:16px" placeholder="passphrase"><div id="pf-pass-err" style="font-size:12px;color:#dc2626;margin-top:8px;display:none">Incorrect — check capitalization and try again.</div><button id="pf-pass-go" style="margin-top:12px;width:100%;padding:12px;border:none;border-radius:10px;background:#00c244;color:#fff;font-size:15px;font-weight:700;cursor:pointer">Unlock</button></div>';
              host.appendChild(ov);
            }
            var inp=ov.querySelector('#pf-pass-input'); var err=ov.querySelector('#pf-pass-err');
            err.style.display=showErr?'block':'none'; inp.value=''; try{inp.focus();}catch(e){}
            function go(){ resolve(inp.value); }
            ov.querySelector('#pf-pass-go').onclick=go;
            inp.onkeydown=function(e){ if(e.key==='Enter')go(); };
          });
        }
        function closeAsk(){ var ov=document.getElementById('pf-unlock'); if(ov)ov.remove(); }
        function attempt(n){
          if(n>10) return Object.assign({error:'bad passphrase'},EMPTY);
          var get = pass!=null ? Promise.resolve(pass) : askPass(n>0);
          return get.then(function(entered){
            var p=norm(entered);
            if(!p){ pass=null; return attempt(n); }
            return decryptEnvelope(raw, p).then(function(obj){ try{localStorage.setItem('pf_pass',p);}catch(e){} closeAsk(); return obj; })
              .catch(function(){ try{localStorage.removeItem('pf_pass');}catch(e){} pass=null; return attempt(n+1); });
          });
        }
        return attempt(0);
      })
      .catch(function(e){ return Object.assign({error:String(e&&e.message||e)},EMPTY); });
  }
  window.__dataReady=loadData().then(function(d){ window.__DATA=d; return d; });
  window.cowork={ callMcpTool: function(server, args){
    return window.__dataReady.then(function(d){
      args=args||{};
      if(/update_artifact|create_artifact/.test(server)) return {ok:true,replayNoop:true};
      // quotes: assemble from per-symbol store
      if(/get_equity_quotes$/.test(server)){
        var qs=(d&&d.quotes)||{}; var syms=args.symbols||[];
        return { structuredContent: { results: syms.filter(function(s){return qs[s];}).map(function(s){return Object.assign({symbol:s}, qs[s]);}) } };
      }
      // historicals: assemble from per-symbol store for the requested interval
      if(/get_equity_historicals$/.test(server)){
        var hh=((d&&d.hist)||{})[args.interval||'day']||{}; var hsyms=args.symbols||[];
        return { structuredContent: { results: hsyms.filter(function(s){return hh[s];}).map(function(s){return {symbol:s, bars:hh[s]};}) } };
      }
      var rec=(d&&d.recorded)||{};
      var k=makeKey(server,args);
      if(Object.prototype.hasOwnProperty.call(rec,k)) return rec[k];
      console.warn('[replay miss]',k);
      return {__replayMiss:k};
    });
  }};
  function boot(){
    var APP_VERSION='v81'; // bump alongside sw.js CACHE_VERSION; shown in the freshness bar
    window.pfForceUpdate=function(){ try{ if(window.caches&&caches.keys){ caches.keys().then(function(ks){ return Promise.all(ks.map(function(k){ return caches.delete(k); })); }).then(function(){ location.reload(); },function(){ location.reload(); }); return; } }catch(e){} location.reload(); };
    window.__dataReady.then(function(d){
      var locked=d&&d.locked, err=d&&d.error;
      var lab=(d&&d.generatedAtLabel)||(locked?'locked':'unknown');
      // Staleness — if the snapshot is hours old, warn rather than silently showing old quotes.
      var ageH=null, stale=false;
      try{ var gen=d&&d.generatedAt?new Date(d.generatedAt):null; if(gen&&!isNaN(gen)){ ageH=(Date.now()-gen.getTime())/3600000; stale=!locked&&!err&&ageH>=3; } }catch(e){}
      function ageStr(h){ if(h==null)return''; if(h<1)return Math.max(1,Math.round(h*60))+'m old'; if(h<48)return Math.round(h)+'h old'; return Math.round(h/24)+'d old'; }
      var warn=locked||err||stale;
      var bar=document.createElement('div');
      bar.id='pf-fresh';
      bar.style.cssText='font:600 11.5px -apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:'+(warn?'#7c2d12':'#475569')+';background:'+(warn?'#fff7ed':'#eef2f7')+';border:1px solid '+(warn?'#fed7aa':'#dbe2ea')+';border-radius:10px;padding:7px 12px;margin:0 0 10px;display:flex;justify-content:space-between;align-items:center;gap:8px';
      var left = locked ? '🔒 Locked — enter your passphrase to view'
               : err    ? '⚠️ Couldn’t load data ('+err+')'
               : stale  ? '⚠️ Snapshot '+ageStr(ageH)+' — tap ↻ to refresh'
               :          '📡 Snapshot: '+lab+(ageH!=null&&ageH>=1?' · '+ageStr(ageH):'');
      var _th=document.documentElement.getAttribute('data-theme')||'light';
      if(_th==='dark'||_th==='neon')_th='gold';
      var themeIco=_th==='gold'?'☀️':'✨';
      var privOn=document.body&&document.body.classList.contains('pf-private');
      bar.innerHTML='<span>'+left+'</span><span style="display:flex;gap:14px;align-items:center"><span onclick="pfForceUpdate()" style="cursor:pointer;font-size:10px;color:#94a3b8;font-weight:700" title="App build — tap to force the latest">'+APP_VERSION+'</span><span id="pf-priv" onclick="togglePrivacy()" style="cursor:pointer;font-size:15px" title="Hide my $ figures">'+(privOn?'🙈':'👁️')+'</span><span id="theme-toggle" onclick="toggleTheme()" style="cursor:pointer;font-size:15px" title="Theme: light ⇄ gold">'+themeIco+'</span><span id="pf-refresh" style="color:#2563eb;cursor:pointer">'+(locked?'🔓 Unlock':'↻ Refresh')+'</span></span>';
      if(document.body) document.body.insertBefore(bar, document.body.firstChild);
      var rb=document.getElementById('pf-refresh'); if(rb) rb.onclick=function(){ if(locked){ try{localStorage.removeItem('pf_pass');}catch(e){} } location.reload(); };
    });
    if('serviceWorker' in navigator){ navigator.serviceWorker.register('./sw.js').catch(function(){}); }
  }
  if(document.readyState!=='loading') boot(); else document.addEventListener('DOMContentLoaded', boot);
})();

/* ─── Config ─── */
const ACCOUNT   = 'ACCT';  // placeholder used only as a replay-lookup key; the real account number lives in producer/secret.local.json (git-ignored) and never ships to the public repo
const SMALL_THR = 250;
const RH = 'mcp__1ad8dd47-cf57-427a-8a28-facba69504fb__';
const AV = 'mcp__4ae6f0d3-5112-4955-94dc-c6bea90e45dd__TOOL_CALL';
// The replay key builder lives inside the boot IIFE (exposed as window.__pfKey). Alias it into the
// global app scope so direct recorded-snapshot reads — azOverview / _earnMap / azVix — can key into
// data.recorded. Without this they throw ReferenceError (caught → null), silently blanking the
// Analyze fundamentals/valuation/earnings cards. The IIFE has already run by the time this evaluates.
const makeKey = window.__pfKey;
const OVERVIEW_COVER = 14;   // # of top holdings to pull fundamentals/beta/sector for

const TTL = {
  TECH:  4*3600*1000, FUND:  24*3600*1000, EARN: 24*3600*1000,
  NEWS:  3600*1000, MACRO: 24*3600*1000, HIST: 12*3600*1000,
};

const CLUSTERS = {
  'Crypto / AI Compute': { tickers:['CIFR','IREN','WULF','CLSK'],           color:'#f59e0b' },
  'AI Semiconductor':    { tickers:['NVDA','AMD','AVGO','AMAT','MRVL','CRDO','TSM','TER','MU'], color:'#6366f1' },
  'Software / SaaS':     { tickers:['MSFT','NOW','DDOG','APP','PLTR','NBIS','ORCL','U'],        color:'#3b82f6' },
  'Big Tech':            { tickers:['META','AAPL','AMZN','GOOGL','GOOG'],   color:'#8b5cf6' },
  'Cybersecurity':       { tickers:['PANW','CRWD'],                          color:'#06b6d4' },
  'Healthcare':          { tickers:['LLY','HUM','ELV','ISRG'],              color:'#10b981' },
  'Gold / Commodities':  { tickers:['GLD','GLTR','NEM','CDE'],              color:'#d97706' },
  'Broad ETFs':          { tickers:['SPY','QQQ','DIA','SCHO'],              color:'#9ca3af' },
};

/* Asset-class classifier (overview Sector fills the rest) */
const ASSET_MAP = {
  SCHO:'Bonds', TLT:'Bonds', BND:'Bonds', AGG:'Bonds',
  GLD:'Gold/Commodities', GLTR:'Gold/Commodities', NEM:'Gold/Commodities', CDE:'Gold/Commodities',
  SPY:'Broad ETF', QQQ:'Broad ETF', DIA:'Broad ETF', IWM:'Broad ETF', ICOP:'Broad ETF', VOO:'Broad ETF',
};

/* ─── Risk thresholds ─── */
function risk(pct) {
  if (pct > 10) return { level:'CRITICAL', color:'#ef4444', bg:'#fee2e2', fg:'#991b1b' };
  if (pct >  5) return { level:'HIGH',     color:'#f97316', bg:'#ffedd5', fg:'#9a3412' };
  if (pct >  2) return { level:'WATCH',    color:'#eab308', bg:'#fef9c3', fg:'#854d0e' };
  return               { level:'GOOD',     color:'#10b981', bg:'#d1fae5', fg:'#065f46' };
}

/* ─── Formatting ─── */
function fmt(n,d=2){ if(n==null||isNaN(n))return'—'; return new Intl.NumberFormat('en-US',{minimumFractionDigits:d,maximumFractionDigits:d}).format(n); }
function fmtD(n){ if(n==null||isNaN(n))return'—'; return(n<0?'-$':'$')+fmt(Math.abs(n)); }
function fmtP(n){ if(n==null||isNaN(n))return'—'; return(n>=0?'+':'')+fmt(n)+'%'; }
function sc(n){ return n>0?'pos':n<0?'neg':'neu'; }
/* Theme-aware chart colors (Light + Neon). Charts read these so gridlines/labels stay legible. */
function _isGold(){ return document.documentElement.getAttribute('data-theme')==='gold'; }
function chGrid(){ return _isGold()?'rgba(210,180,120,0.12)':'#f3f4f6'; }
function chTick(){ return _isGold()?'#b9ad92':'#9ca3af'; }
function chLabel(){ return _isGold()?'#f2ebdc':'#1c1c1e'; }
function applyChartTheme(){ try{ if(window.Chart){ Chart.defaults.color=chTick(); Chart.defaults.borderColor=chGrid(); } }catch(e){} }

/* ─── Parsers ─── */
function parse(r){ if(!r||r.isError)return null; try{ if(r.structuredContent)return r.structuredContent; if(r.content?.[0]?.text)return JSON.parse(r.content[0].text);}catch(e){} return null; }
function parseAV(r){ if(!r||r.isError)return null; try{ if(r.structuredContent)return r.structuredContent; const t=r.content?.[0]?.text; if(t){ try{return JSON.parse(t);}catch(e){return t;} } if(typeof r.result==='string'){ try{return JSON.parse(r.result);}catch(e){return r.result;} } if(Array.isArray(r))return r; if(typeof r==='object'&&(r.Symbol||r['Time Series (Daily)']))return r; }catch(e){} return null; }
function parseCSV(text){ if(!text||typeof text!=='string')return[]; const lines=text.trim().split('\n'); if(lines.length<2)return[]; const headers=lines[0].split(',').map(h=>h.trim()); return lines.slice(1).filter(l=>l.trim()).map(line=>{ const vals=line.split(','); const obj={}; headers.forEach((h,i)=>{obj[h]=(vals[i]||'').trim();}); return obj; }); }

/* ─── Cache ─── */
function cacheGet(key){ try{ const raw=localStorage.getItem('pf3_'+key); if(!raw)return null; const {ts,data,ttl}=JSON.parse(raw); if(Date.now()-ts>ttl)return null; return data; }catch(e){return null;} }
function cacheSet(key,data,ttl){ try{ localStorage.setItem('pf3_'+key,JSON.stringify({ts:Date.now(),data,ttl})); }catch(e){} }

async function avCall(toolName, args, cacheKey, ttl=TTL.FUND){
  if(cacheKey){ const c=cacheGet(cacheKey); if(c!==null)return c; }
  const r=await Promise.race([
    window.cowork.callMcpTool(AV,{tool_name:toolName, arguments:JSON.stringify(args)}),
    new Promise((_,rej)=>setTimeout(()=>rej(new Error('AV timeout')),18000))
  ]);
  const data=parseAV(r);
  if(cacheKey&&data!==null) cacheSet(cacheKey,data,ttl);
  return data;
}

function avSym(sym){ return sym.replace(/\./g,'-'); }

/* ─── RSI ─── */
function calcRSI(closes, period=14){
  if(!closes||closes.length<period+2)return null;
  const ch=[]; for(let i=1;i<closes.length;i++) ch.push(closes[i]-closes[i-1]);
  let ag=0,al=0; for(let i=0;i<period;i++){ if(ch[i]>0)ag+=ch[i]; else al+=Math.abs(ch[i]); }
  ag/=period; al/=period;
  for(let i=period;i<ch.length;i++){ ag=(ag*(period-1)+(ch[i]>0?ch[i]:0))/period; al=(al*(period-1)+(ch[i]<0?Math.abs(ch[i]):0))/period; }
  if(al===0)return 100; return 100-(100/(1+ag/al));
}
function parseDailyCloses(raw){
  if(!raw)return[];
  if(typeof raw==='string'){ const rows=parseCSV(raw); return rows.map(r=>parseFloat(r.close)).filter(v=>!isNaN(v)).reverse(); }
  if(typeof raw==='object'&&raw['Time Series (Daily)']){ const ts=raw['Time Series (Daily)']; return Object.keys(ts).sort().map(d=>parseFloat(ts[d]['4. close'])); }
  return[];
}

/* ─── Quote map ─── */
function buildQMap(raw){
  const map={}; if(!raw)return map;
  function addQ(sym,q){ if(!sym||!q||typeof q!=='object')return; const price=parseFloat(q.last_extended_hours_trade_price||q.last_trade_price||q.ask_price||q.mark_price||q.price||0)||0; const prev=parseFloat(q.adjusted_previous_close||q.previous_close||q.prev_close||q.prev||0)||0; if(price>0||prev>0) map[sym]={price,prev}; }
  const d=raw.data??raw;
  const topArr=Array.isArray(raw)?raw:Array.isArray(d)?d:null;
  if(topArr){ for(const item of topArr){ const q=item.quote??item; const sym=q?.symbol||q?.ticker; if(sym)addQ(sym,q); } if(Object.keys(map).length>0)return map; }
  const resArr=Array.isArray(d?.results)?d.results:Array.isArray(raw.results)?raw.results:null;
  if(resArr){ for(const item of resArr){ const q=item.quote??item; const sym=q?.symbol||q?.ticker; if(sym)addQ(sym,q); } if(Object.keys(map).length>0)return map; }
  const SKIP=new Set(['guide','error','closes_error','next','previous','count','status']);
  const obj=typeof d==='object'&&!Array.isArray(d)?d:typeof raw==='object'&&!Array.isArray(raw)?raw:null;
  if(obj){ for(const[key,val]of Object.entries(obj)){ if(SKIP.has(key)||!val||typeof val!=='object')continue; const sym=val.symbol||val.ticker||((/^[A-Z][A-Z.]{0,5}$/.test(key))?key:null); if(sym)addQ(sym,val); } }
  return map;
}

/* ─── Enrich positions ─── */
function enrich(positions,qMap,totalVal){
  return positions.map(p=>{
    const q=qMap[p.symbol]||{};
    const qty=parseFloat(p.quantity||0), avg=parseFloat(p.average_buy_price||0);
    const px=q.price||0, val=px*qty, cost=avg*qty, pnlD=val-cost;
    const pnlP=cost>0?(pnlD/cost)*100:0;
    const dayP=q.prev>0?((px-q.prev)/q.prev)*100:null;
    const dayD=q.prev>0?(px-q.prev)*qty:0;
    const pct=totalVal>0?(val/totalVal)*100:0;
    return{...p,qty,avg,px,val,cost,pnlD,pnlP,dayP,dayD,pct,r:risk(pct)};
  });
}

function clusterSums(enriched,totalVal){
  const out={};
  for(const[name,def]of Object.entries(CLUSTERS)){
    const matched=enriched.filter(p=>def.tickers.includes(p.symbol)&&p.val>0);
    const val=matched.reduce((s,p)=>s+p.val,0);
    out[name]={val,pct:totalVal>0?(val/totalVal)*100:0,matched,color:def.color};
  }
  return out;
}

/* ─── Equity historicals → YTD-normalized % series ─── */
async function fetchHist(symbols){
  const start=new Date(new Date().getFullYear(),0,1).toISOString().replace(/\.\d+Z$/,'Z');
  const out={};
  for(let i=0;i<symbols.length;i+=10){
    const batch=symbols.slice(i,i+10);
    try{
      const r=await window.cowork.callMcpTool(RH+'get_equity_historicals',{symbols:batch,start_time:start,interval:'day'});
      const d=parse(r); const results=(d&&d.data&&d.data.results)||(d&&d.results)||[];
      for(const res of results){
        const bars=(res.bars||[]).filter(b=>!b.interpolated);
        out[res.symbol]=bars.map(b=>({t:String(b.begins_at||b.t||'').slice(0,10),c:parseFloat(b.close_price!=null?b.close_price:b.c)})).filter(x=>!isNaN(x.c));
      }
    }catch(e){}
  }
  return out;
}
async function fetchHistG(symbols,start,interval){
  const out={};
  for(let i=0;i<symbols.length;i+=10){
    const batch=symbols.slice(i,i+10);
    try{
      const r=await window.cowork.callMcpTool(RH+'get_equity_historicals',{symbols:batch,start_time:start,interval:interval});
      const d=parse(r); const results=(d&&d.data&&d.data.results)||(d&&d.results)||[];
      for(const res of results){

/* ═══ COMPUTE ═══ */
/* RSI + beta from Robinhood daily historicals (no Alpha Vantage) */
function rsiFromHist(histMap, syms){
  const map={};
  for(const s of syms){ const ser=histMap[s]; if(ser&&ser.length>16){ const r=calcRSI(ser.map(b=>b.c)); if(r!=null)map[s]=r; } }
  return map;
}
function betaFromHist(histMap, enriched, syms){
  const spy=histMap['SPY']; if(!spy||spy.length<10) return {beta:null,coverage:0,perSym:{}};
  const rets=a=>{const o=[];for(let i=1;i<a.length;i++)o.push(a[i].c/a[i-1].c-1);return o;};
  const sr=rets(spy); const n0=sr.length; const mx=sr.reduce((s,x)=>s+x,0)/n0; let vx=0; for(const x of sr)vx+=(x-mx)*(x-mx); vx/=n0;
  let wsum=0,bsum=0,covered=0; const perSym={}; const eq=enriched.reduce((s,p)=>s+Math.max(p.val,0),0)||1;
  for(const s of syms){ const ser=histMap[s]; const p=enriched.find(e=>e.symbol===s); if(!ser||ser.length<10||!p||p.val<=0)continue; const r=rets(ser); const n=Math.min(r.length,sr.length); if(n<8)continue; const my=r.slice(-n).reduce((a,x)=>a+x,0)/n; let cov=0; for(let i=0;i<n;i++){ cov+=(sr[sr.length-n+i]-mx)*(r[r.length-n+i]-my); } cov/=n; const b=vx>0?cov/vx:null; if(b!=null){ perSym[s]=b; bsum+=b*p.val; wsum+=p.val; covered+=p.val; } }
  return { beta: wsum>0?bsum/wsum:null, coverage: eq>0?covered/eq*100:0, perSym };
}

/* Empirically correlated groups from YTD daily returns — replaces reliance on the static CLUSTERS
   list for the Risk card. Greedy union-find over pairs with correlation ≥ THRESH; returns groups of
   ≥2 held names sorted by combined weight, each {members:[{sym,pct}], pct, avgCorr}. */
function corrGroups(histMap, enriched, syms){
  const THRESH=0.7;
  const rets=a=>{const o=[];for(let i=1;i<a.length;i++)o.push(a[i].c/a[i-1].c-1);return o;};
  const use=syms.filter(s=>{ const ser=histMap[s]; const p=enriched.find(e=>e.symbol===s); return ser&&ser.length>20&&p&&p.val>0; });
  if(use.length<2) return [];
  const R={}; for(const s of use) R[s]=rets(histMap[s]);
  function corr(a,b){ const x=R[a],y=R[b]; const n=Math.min(x.length,y.length); if(n<15)return null;
    const xs=x.slice(-n),ys=y.slice(-n); const mx=xs.reduce((s,v)=>s+v,0)/n,my=ys.reduce((s,v)=>s+v,0)/n;
    let cov=0,vx=0,vy=0; for(let i=0;i<n;i++){ cov+=(xs[i]-mx)*(ys[i]-my); vx+=(xs[i]-mx)**2; vy+=(ys[i]-my)**2; }
    return (vx>0&&vy>0)?cov/Math.sqrt(vx*vy):null; }
  const parent={}; use.forEach(s=>parent[s]=s);
  const find=s=>{ while(parent[s]!==s){ parent[s]=parent[parent[s]]; s=parent[s]; } return s; };
  const edges=[];
  for(let i=0;i<use.length;i++)for(let j=i+1;j<use.length;j++){ const r=corr(use[i],use[j]); if(r!=null&&r>=THRESH){ edges.push(r); parent[find(use[i])]=find(use[j]); } }
  const groups={};
  for(const s of use){ const root=find(s); (groups[root]=groups[root]||[]).push(s); }
  const eq=enriched.reduce((s,p)=>s+Math.max(p.val,0),0)||1;
  const avgR=edges.length?edges.reduce((a,b)=>a+b,0)/edges.length:null;
  return Object.values(groups).filter(g=>g.length>=2).map(g=>{
    const members=g.map(sym=>{ const p=enriched.find(e=>e.symbol===sym); return {sym,pct:p?p.val/eq*100:0,val:p?p.val:0}; }).sort((a,b)=>b.pct-a.pct);
    return { members, pct:members.reduce((s,m)=>s+m.pct,0), avgCorr:avgR };
  }).sort((a,b)=>b.pct-a.pct);
}

/* 50-day SMA per symbol from daily closes (for the Technical Signals trend column). */
function smaFromHist(histMap, syms){
  const map={};
  for(const s of syms){ const ser=histMap[s]; if(ser&&ser.length>=50){ const last=ser.slice(-50); map[s]=last.reduce((a,b)=>a+b.c,0)/50; } }
  return map;
}

function computeBeta(enriched, ovMap){
  let wsum=0, bsum=0, covered=0;
  for(const p of enriched){
    if(p.val<=0)continue;
    const ov=ovMap[p.symbol]; const b=ov?parseFloat(ov.Beta):NaN;
    if(!isNaN(b)){ bsum+=b*p.val; wsum+=p.val; covered+=p.val; }
  }
  const eqVal=enriched.reduce((s,p)=>s+Math.max(p.val,0),0);
  return { beta: wsum>0?bsum/wsum:null, coverage: eqVal>0?covered/eqVal*100:0 };
}

function assetClassOf(sym, ov){
  if(ASSET_MAP[sym]) return ASSET_MAP[sym];
  return 'Stocks';
}
function computeAllocation(enriched, ovMap, totalVal){
  const sectors={}, assets={};
  let covered=0;
  const eqVal=enriched.reduce((s,p)=>s+Math.max(p.val,0),0);
  for(const p of enriched){
    if(p.val<=0)continue;
    const ac=assetClassOf(p.symbol, ovMap[p.symbol]);
    assets[ac]=(assets[ac]||0)+p.val;
    const ov=ovMap[p.symbol];
    if(ac==='Stocks'){
      if(ov&&ov.Sector){ const s=titleCase(ov.Sector); sectors[s]=(sectors[s]||0)+p.val; covered+=p.val; }
      else { sectors['Uncategorized']=(sectors['Uncategorized']||0)+p.val; }
    }
  }
  const stockVal=Object.values(assets).reduce((s,v)=>s,0); // placeholder
  return { sectors, assets, eqVal, sectorCoverage: eqVal>0?covered/eqVal*100:0 };
}
function titleCase(s){ return (s||'').toLowerCase().replace(/\b\w/g,m=>m.toUpperCase()); }

function computeIncome(enriched, ovMap){
  let annual=0, costBasis=0, mktBasis=0; const exdiv=[];
  for(const p of enriched){
    if(p.val<=0)continue;
    const ov=ovMap[p.symbol]; if(!ov)continue;
    const dps=parseFloat(ov.DividendPerShare);
    if(!isNaN(dps)&&dps>0){
      const inc=dps*p.qty; annual+=inc; costBasis+=p.cost; mktBasis+=p.val;
      const ex=ov.ExDividendDate;
      if(ex&&ex!=='None'){ const d=new Date(ex); if(!isNaN(d)) exdiv.push({sym:p.symbol, date:ex, dps, inc}); }
    }
  }
  exdiv.sort((a,b)=>new Date(a.date)-new Date(b.date));
  return { annual, yieldOnMkt: mktBasis>0?annual/mktBasis*100:0, yieldOnCost: costBasis>0?annual/costBasis*100:0, exdiv };
}

function harvestCandidates(enriched){
  return enriched.filter(p=>p.val>=SMALL_THR && p.pnlD<0).sort((a,b)=>a.pnlD-b.pnlD);
}

async function pushToKyle(){
  const btn=document.getElementById('kyle-btn');
  const S=window.__SNAP;
  if(!S||!S.stats){ alert('Portfolio still loading — give it a moment.'); return; }
  if(!S.betaInfo||!S.perf){ alert('Beta and performance are still computing in the background (a few seconds after load). Try again shortly.'); return; }
  if(btn){ btn.disabled=true; btn.textContent='Pushing…'; }
  try{
    const html=buildKyleHTML();
    const r=await window.cowork.callMcpTool(KYLE+'update_artifact',{artifact_id:KYLE_PORTFOLIO_ID,title:'Portfolio — '+S.date,content:html});
    if(r&&r.isError) throw new Error('Kyle returned an error');
    const t=document.getElementById('toast'); if(t){ t.textContent='✅ Pushed to Kyle'; t.classList.add('show'); setTimeout(()=>t.classList.remove('show'),2600); }
  }catch(e){ alert('Push to Kyle failed: '+(e&&e.message||e)); }
  if(btn){ btn.disabled=false; btn.textContent='📲 Push to Kyle'; }
}
window.pushToKyle=pushToKyle;

function buildNorm(series){ if(!series||series.length<2)return null; const c0=series[0].c; return series.map(b=>({t:b.t, v:(b.c/c0-1)*100})); }
function renderPerformance(histMap, enriched, coveredSyms, macroData, stats){
  const el=document.getElementById('perf-content'); if(!el)return;
  const spy=histMap['SPY'], qqq=histMap['QQQ'];
  if(!spy||spy.length<2){ el.innerHTML=`<div class="tech-empty">Benchmark history unavailable.</div>`; return; }
  const axis=spy.map(b=>b.t);
  // portfolio normalized series from covered holdings, weighted by current value
  const wsyms=coveredSyms.filter(s=>histMap[s]&&histMap[s].length>1);
  const wmap={}; let wsum=0;
  for(const s of wsyms){ const p=enriched.find(e=>e.symbol===s); if(p&&p.val>0){ wmap[s]=p.val; wsum+=p.val; } }
  let portSeries=null;
  if(wsum>0){
    const idx={}; for(const s of Object.keys(wmap)){ const m={}; for(const b of histMap[s])m[b.t]=b.c; idx[s]={m,c0:histMap[s][0].c,last:histMap[s][0].c}; }
    portSeries=axis.map(t=>{
      let acc=0;
      for(const s of Object.keys(wmap)){ const o=idx[s]; if(o.m[t]!=null)o.last=o.m[t]; acc+=(wmap[s]/wsum)*(o.last/o.c0); }
      return {t, v:(acc-1)*100};
    });
  }
  const spyN=buildNorm(spy), qqqN=buildNorm(qqq);
  const lastV=a=>a&&a.length?a[a.length-1].v:null;
  const portYTD=lastV(portSeries), spyYTD=lastV(spyN), qqqYTD=lastV(qqqN);
  // ── Agentic cash account (••••3900) overlay: a faint dotted MODELED lead-in (its current holdings
  // priced back to Jan 1, same trick as portSeries) spliced into the REAL recorded equity line
  // (data.agentic.equityHistory, recorded forward by the producer). dkey() aligns by calendar day so
  // the equity points map onto the SPY axis regardless of timestamp shape.
  const AG=(window.__DATA&&window.__DATA.agentic)||null;
  const dkey=t=>String(t).slice(0,10);
  let agModeled=null, agReal=null, agSince=null;
  if(AG&&Array.isArray(AG.positions)&&AG.positions.length){
    const aw={}; let asum=0;
    for(const p of AG.positions){ const s=p.symbol; if(histMap[s]&&histMap[s].length>1&&p.value>0){ aw[s]=p.value; asum+=p.value; } }
    if(asum>0){
      const idx={}; for(const s of Object.keys(aw)){ const m={}; for(const b of histMap[s])m[b.t]=b.c; idx[s]={m,c0:histMap[s][0].c,last:histMap[s][0].c}; }
      agModeled=axis.map(t=>{ let acc=0; for(const s of Object.keys(aw)){ const o=idx[s]; if(o.m[t]!=null)o.last=o.m[t]; acc+=(aw[s]/asum)*(o.last/o.c0); } return (acc-1)*100; });
    }
    const EH=Array.isArray(AG.equityHistory)?AG.equityHistory.slice().filter(e=>e&&e.equity>0).sort((a,b)=>a.t<b.t?-1:1):[];
    if(EH.length>=2&&agModeled){
      const firstT=dkey(EH[0].t), e0=EH[0].equity;
      let hi=axis.findIndex(t=>dkey(t)>=firstT); if(hi<0)hi=0;
      const baseMult=1+agModeled[hi]/100;
      agReal=axis.map((t,i)=>{ if(i<hi)return null; const k=dkey(t); let ev=null; for(const e of EH){ if(dkey(e.t)<=k)ev=e.equity; else break; } if(ev==null)ev=e0; return (baseMult*(ev/e0)-1)*100; });
      const eLast=EH[EH.length-1].equity, realRet=(eLast/e0-1)*100;
      const sFirst=spy.find(b=>dkey(b.t)>=firstT), sLast=spy[spy.length-1];
      const spySince=(sFirst&&sLast)?((sLast.c/sFirst.c-1)*100):null;
      agSince={ ret:realRet, spy:spySince, since:EH[0].t };
    }
  }
  try{ if(window.__SNAP){ const _cv=wsum>0?(wsum/enriched.reduce((s,p)=>s+Math.max(p.val,0),0)*100):0; window.__SNAP.perf={labels:axis,port:portSeries?portSeries.map(x=>x.v):null,spy:spyN.map(x=>x.v),qqq:qqqN.map(x=>x.v),portYTD,spyYTD,qqqYTD,cov:_cv}; } }catch(e){}
  const _thm=document.documentElement.getAttribute('data-theme');
  const C={ port:_thm==='gold'?'#e3c074':'#6366f1', portBg:_thm==='gold'?'rgba(227,192,116,0.12)':'rgba(99,102,241,0.08)',
    spy:_thm==='gold'?'#8a8170':'#9ca3af', qqq:_thm==='gold'?'#c98a3a':'#10b981',
    grid:_thm==='gold'?'rgba(210,180,120,0.10)':_thm==='dark'?'rgba(255,255,255,0.06)':'#f3f4f6',
    tick:_thm==='gold'?'#b9ad92':'#9ca3af', ag:_thm==='gold'?'#3fcf94':'#0891b2' };
  const agDateLbl=agSince?(()=>{ try{ return new Date(dkey(agSince.since)+'T00:00:00').toLocaleDateString('en-US',{month:'short',day:'numeric'}); }catch(e){ return dkey(agSince.since); } })():'';
  el.innerHTML=`
    <div class="perf-head">
      <div class="perf-metric"><div class="pm-l">Your holdings YTD*</div><div class="pm-v ${sc(portYTD)}">${portYTD!=null?fmtP(portYTD):'—'}</div></div>
      <div class="perf-metric"><div class="pm-l">S&P 500 (SPY)</div><div class="pm-v ${sc(spyYTD)}">${fmtP(spyYTD)}</div></div>
      <div class="perf-metric"><div class="pm-l">Nasdaq-100 (QQQ)</div><div class="pm-v ${sc(qqqYTD)}">${fmtP(qqqYTD)}</div></div>

    </div>

      ${agModeled?`<span class="legend-item"><span class="legend-dot" style="background:${C.ag}"></span>Agentic${agReal?' (— real · ⋯ modeled)':' (⋯ modeled)'}</span>`:''}
    </div>

      <div><div class="snap-lbl">VIX</div><div style="font-size:16px;font-weight:700;color:${macroData.vix?(macroData.vix>25?'#ef4444':macroData.vix>18?'#f97316':'#10b981'):'#1c1c1e'}">${macroData.vix?fmt(macroData.vix,1):'—'}</div></div>

/* ═══ Action Feed (merged alerts + recommendations) ═══ */
function buildActionFeed(enriched, port, clusters, totalVal, rsiMap, ovMap, earningsMap){
  const A=[]; const cash=parseFloat(port.cash||0); const equity=parseFloat(port.equity_value||1);
  const add=(o)=>A.push(o);
  if(cash<-1000){ const mp=Math.abs(cash)/equity*100; const t=[...enriched].filter(p=>p.pct>3&&p.px>0).sort((a,b)=>b.val-a.val)[0]; add({pr:0,icon:'🔴',c:'#ef4444',bg:'#fee2e2',fg:'#991b1b',tag:'MARGIN',title:`Margin in use — ${fmtD(Math.abs(cash))} (${fmt(mp,1)}% of equity)`,detail:t?`A drawdown is amplified by leverage. Trimming ~${Math.ceil(Math.abs(cash)/t.px)} sh of ${t.symbol} (~${fmtD(t.px)}) would clear it.`:`Leverage amplifies losses — top priority.`}); }
  const crits=[...enriched].filter(p=>p.pct>10&&p.px>0).sort((a,b)=>b.pct-a.pct);
  for(const p of crits.slice(0,2)){ const fpe=parseFloat(ovMap[p.symbol]?.ForwardPE)||null; const vN=fpe&&fpe>60?` Fwd P/E ${fmt(fpe,0)} adds valuation risk.`:''; add({pr:1,icon:'🔴',c:'#ef4444',bg:'#fee2e2',fg:'#991b1b',tag:'TRIM',title:`${p.symbol} is ${fmt(p.pct,1)}% of the book`,detail:`Single-name concentration is critical. A 20% drop in ${p.symbol} alone takes the portfolio down ~${fmt(p.pct*0.2,1)}%.${vN}`}); }
  const upE=Object.entries(earningsMap||{}).filter(([s,e])=>enriched.find(p=>p.symbol===s&&p.val>=SMALL_THR)&&e.daysAway<=14).sort((a,b)=>a[1].daysAway-b[1].daysAway);
  for(const [s,e] of upE.slice(0,3)){ const p=enriched.find(x=>x.symbol===s); const u=e.daysAway<=3?'IMMINENT':e.daysAway<=7?'THIS WEEK':'UPCOMING'; add({pr:2,icon:'🗓️',c:'#6366f1',bg:'#ede9fe',fg:'#4c1d95',tag:'EARNINGS',title:`${s} reports in ${e.daysAway}d (${e.reportDate}) — ${u}`,detail:`You hold ${fmtD(p?.val||0)} (${fmt(p?.pct||0,1)}%). Decide: hold through, trim, or set a stop.${e.estimate?` Est EPS $${parseFloat(e.estimate).toFixed(2)}.`:''}`}); }
  const ob=[...enriched].filter(p=>rsiMap[p.symbol]>=72&&p.pct>3&&p.px>0&&!crits.find(c=>c.symbol===p.symbol)).sort((a,b)=>rsiMap[b.symbol]-rsiMap[a.symbol]);
  for(const p of ob.slice(0,2)){ add({pr:3,icon:'🟠',c:'#f97316',bg:'#ffedd5',fg:'#9a3412',tag:'OVERBOUGHT',title:`${p.symbol} RSI ${fmt(rsiMap[p.symbol],0)} — extended`,detail:`At ${fmt(p.pct,1)}% (${fmtD(p.val)}). Momentum is hot; consider trimming into strength rather than adding.`}); }
  const win=[...enriched].filter(p=>p.pnlP>40&&p.pct>4&&p.px>0&&!crits.find(c=>c.symbol===p.symbol)&&!(rsiMap[p.symbol]>=72)).sort((a,b)=>b.pnlP-a.pnlP);
  for(const p of win.slice(0,1)){ const n=Math.max(1,Math.floor(p.qty*0.25)); add({pr:4,icon:'🟢',c:'#10b981',bg:'#d1fae5',fg:'#065f46',tag:'TAKE PROFIT',title:`${p.symbol} up ${fmt(p.pnlP,0)}% from cost`,detail:`Trim 25% (~${n} sh @ ${fmtD(p.px)}) → locks ${fmtD(n*(p.px-p.avg))} gain, raises ${fmtD(n*p.px)} cash.`}); }
  const os=[...enriched].filter(p=>rsiMap[p.symbol]<=30&&p.pct>1&&p.pnlP>-40&&p.px>0).sort((a,b)=>rsiMap[a.symbol]-rsiMap[b.symbol]);
  for(const p of os.slice(0,1)){ add({pr:4,icon:'🟢',c:'#10b981',bg:'#d1fae5',fg:'#065f46',tag:'ADD',title:`${p.symbol} RSI ${fmt(rsiMap[p.symbol],0)} — oversold`,detail:`If the thesis holds, a high-conviction add point. Avg cost ${fmtD(p.avg)}, now ${fmtD(p.px)}.`}); }
  // (Tax-loss harvest is owned by the plan tier below — see renderActionPlan Step 1.)
  const bigCl=Object.entries(clusters).filter(([,c])=>c.pct>20&&c.matched.length>1).sort((a,b)=>b[1].pct-a[1].pct);
  for(const [name,c] of bigCl.slice(0,1)){ add({pr:6,icon:'🟠',c:'#f97316',bg:'#ffedd5',fg:'#9a3412',tag:'CORRELATED',title:`${name} = ${fmt(c.pct,1)}% combined`,detail:`${c.matched.map(p=>p.symbol).join(', ')} move together — effectively one macro bet. A sector hit lands on all of them.`}); }
  try{
    const soc=(window.__DATA&&window.__DATA.social)||null;
    if(soc&&soc.tickers){
      const heldSet=new Set(enriched.filter(p=>p.val>0).map(p=>p.symbol));
      const buzz=Object.entries(soc.tickers).filter(([s,t])=>heldSet.has(s)&&t.tracked&&t.rank!=null&&t.rank<=20)
        .map(([s,t])=>({s,t})).sort((a,b)=>a.t.rank-b.t.rank);
      for(const {s,t} of buzz.slice(0,1)){ const p=enriched.find(x=>x.symbol===s); const crowd=t.rank<=5;
        const vel=t.mentionChg!=null?` Mentions ${t.mentionChg>=0?'+':''}${t.mentionChg}% in 24h.`:'';
        add({pr:crowd?3:6,icon:'🗣️',c:crowd?'#f97316':'#6366f1',bg:crowd?'#ffedd5':'#ede9fe',fg:crowd?'#9a3412':'#4c1d95',tag:crowd?'CROWDED':'RETAIL BUZZ',
          title:`${s} is #${t.rank} most-talked-about on Reddit`,
          detail:`${crowd?'Peak retail attention often marks short-term tops — treat strength as a chance to trim into the crowd, not chase.':`Elevated retail chatter on a name you hold (${fmt(p?p.pct:0,1)}% of book). Watch for a momentum pop or a fade.`}${vel}`}); }
    }
  }catch(e){}
  A.sort((a,b)=>a.pr-b.pr);
  return A.slice(0,9);
}
function renderActionFeed(list){
  const el=document.getElementById('act-content'); if(!el)return;
  if(!list||!list.length){ el.innerHTML=`<div class="act-none">✅ Nothing urgent — the book looks clean right now.</div>`; return; }
  el.innerHTML='<div class="act-list">'+list.map(a=>`<div class="act-item" style="background:${a.c}1f;border-color:${a.c}"><div class="act-icon">${a.icon}</div><div class="act-body"><div class="act-title" style="color:var(--text)">${a.title}<span class="act-tag" style="background:${a.c};color:#fff">${a.tag}</span></div><div class="act-detail" style="color:var(--text);opacity:.82">${a.detail}</div></div></div>`).join('')+'</div>';
}

/* Paint both tiers of the Action Center from the latest portfolio snapshot (window.__SNAP).
   The card markup now lives on the Plan & Picks page, but the data is portfolio-derived: the main
   load() flow stashes each enrichment stage into __SNAP and calls this as the data lands, and the
   Picks page calls it when it renders — so the card populates whether the Picks tab is opened before
   or after the portfolio finished loading. No-ops cleanly until both the data and the DOM exist. */
function paintActionCenter(){
  // Agentic Portfolio card renders independently of the margin book (it reads data.agentic + picks),
  // so paint it BEFORE the margin-data early-return below — it must show even if the margin
  // portfolio hasn't loaded. Re-runs as ovMap/smaMap land to upgrade sectors/stops.
  if(document.getElementById('agentic-content')){ try{ renderAgenticCard(); }catch(e){} }
  const S=window.__SNAP; if(!S||!S.enriched)return;
  const tv=(S.stats&&S.stats.totalVal)||S.totalVal||0;
  if(document.getElementById('act-content')){
    try{ renderActionFeed(buildActionFeed(S.enriched,S.port||{},S.clusters,tv,S.rsiMap||{},S.ovMap||{},S.earn||{})); }catch(e){}
  }
  if(document.getElementById('plan-content')){
    try{ renderActionPlan(S.enriched,S.clusters,tv,S.betaInfo,S.rsiMap,S.ovMap,S.earn,S.smaMap); }catch(e){}
  }
}
window.paintActionCenter=paintActionCenter;

/* ═══ Risk & Diversification ═══ */
function renderRisk(enriched, clusters, totalVal, betaInfo, metrics, corrG){
  const el=document.getElementById('risk-content'); if(!el)return;
  const eqVal=enriched.reduce((s,p)=>s+Math.max(p.val,0),0);
  const beta=betaInfo?betaInfo.beta:null;
  const stressTxt = beta!=null ? fmtP(-10*beta) : '—';
  const top=[...enriched].filter(p=>p.val>0).sort((a,b)=>b.pct-a.pct)[0];
  const topCl=Object.entries(clusters).filter(([,c])=>c.matched.length>0).sort((a,b)=>b[1].pct-a[1].pct)[0];
  // HHI on equity weights
  let hhi=0; for(const p of enriched){ if(p.val>0&&eqVal>0){ const w=p.val/eqVal; hhi+=w*w; } }
  const effN = hhi>0?1/hhi:0;
  const scn=[{l:'Market −5%',v:beta!=null?-5*beta:null},{l:'Market −10%',v:beta!=null?-10*beta:null},{l:'Market −20%',v:beta!=null?-20*beta:null}];
  const M=metrics;
  const spin='<span class="spin-sm"></span>';
  const sharpeTxt = M&&M.sharpe!=null ? fmt(M.sharpe,2) : (M?'—':spin);
  const sharpeCol = M&&M.sharpe!=null ? (M.sharpe>=1?'#10b981':M.sharpe>=0?'#f59e0b':'#ef4444') : '#9ca3af';
  const volTxt = M ? fmt(M.vol,1)+'%' : spin;
  const volCol = M ? (M.vol>=35?'#ef4444':M.vol>=22?'#f59e0b':'#10b981') : '#9ca3af';
  const ddTxt = M ? fmt(M.maxDD,1)+'%' : spin;
  const betaTileTxt = beta!=null ? fmt(beta,2) : spin;
  const betaTileCol = beta!=null ? (beta>1.2?'#ef4444':beta>1?'#f97316':'#10b981') : '#9ca3af';
  el.innerHTML=`
    <div style="font-size:11px;color:#9ca3af;text-transform:uppercase;letter-spacing:0.5px;font-weight:700;margin-bottom:7px">Risk-adjusted <span style="font-weight:400;text-transform:none;letter-spacing:0">(YTD, annualized)</span></div>
    <div class="scn-grid" style="grid-template-columns:repeat(4,1fr);margin-bottom:16px">
      <div class="scn"><div class="scn-lbl">Sharpe</div><div class="scn-val" style="color:${sharpeCol}">${sharpeTxt}</div></div>
      <div class="scn"><div class="scn-lbl">Volatility</div><div class="scn-val" style="color:${volCol}">${volTxt}</div></div>
      <div class="scn"><div class="scn-lbl">Max Drawdown</div><div class="scn-val ${M&&M.maxDD<0?'neg':''}">${ddTxt}</div></div>
      <div class="scn"><div class="scn-lbl">Beta</div><div class="scn-val" style="color:${betaTileCol}">${betaTileTxt}</div></div>
    </div>
    <div class="stress-row"><div class="stress-big ${beta!=null?'neg':''}">${stressTxt}</div><div class="stress-cap">estimated portfolio move if the market drops 10%${beta!=null?` (beta ${fmt(beta,2)})`:''}</div></div>
    <div class="scn-grid">${scn.map(s=>`<div class="scn"><div class="scn-lbl">${s.l}</div><div class="scn-val ${s.v!=null?'neg':''}">${s.v!=null?fmtP(s.v):'—'}</div></div>`).join('')}</div>
    <div style="margin-top:14px">
      <div class="risk-line"><span class="risk-name">Largest single position</span><span class="risk-val">${top?`${top.symbol} · ${fmt(top.pct,1)}%`:'—'}</span></div>
      <div class="risk-line"><span class="risk-name">Largest correlated cluster</span><span class="risk-val">${topCl?`${topCl[0]} · ${fmt(topCl[1].pct,1)}%`:'—'}</span></div>
      <div class="risk-line"><span class="risk-name">Effective # of bets (1/HHI)</span><span class="risk-val">${effN?fmt(effN,1):'—'} <span style="font-weight:400;color:#9ca3af">of ${enriched.filter(p=>p.val>0).length} positions</span></span></div>
      <div class="risk-line"><span class="risk-name">Portfolio beta</span><span class="risk-val">${beta!=null?fmt(beta,2):'<span class=spin-sm></span>'} <span style="font-weight:400;color:#9ca3af">vs 1.00 market</span></span></div>
    </div>
    <div class="cov-note">Beta-weighted stress assumes each name moves with its historical beta — a rough guide, not a guarantee. ${betaInfo&&betaInfo.coverage?`Beta covers ${fmt(betaInfo.coverage,0)}% of equity.`:''} "Effective # of bets" near your position count = well spread; far below = concentrated. Sharpe &amp; volatility are annualized from YTD daily returns of your covered top holdings${M?` (${fmt(M.cov,0)}% of equity, risk-free ≈ 10-yr yield)`:''}; Sharpe &gt; 1 is strong.</div>
    ${(()=>{
      const perSym=betaInfo&&betaInfo.perSym?betaInfo.perSym:null;
      const blocks=[];
      // Concentration context — the largest correlated theme, named dynamically.
      if(topCl&&topCl[1].pct>=20&&topCl[1].matched.length>1){ const mem=topCl[1].matched.sort((a,b)=>b.val-a.val).map(p=>p.symbol).join(' · ');
        blocks.push(`<div class="box-info" style="border-radius:8px;padding:9px 11px;font-size:11.5px;line-height:1.45"><b>Largest theme — ${topCl[0]} at ${fmt(topCl[1].pct,1)}%.</b> ${mem} tend to move together, so a sector hit lands on all of them at once. Concentration is the bet here; size new adds with that in mind.</div>`); }
      // Empirically correlated group (from actual return correlation, not a static list).
      if(corrG&&corrG.length&&corrG[0].pct>=15){ const g=corrG[0]; const mem=g.members.slice(0,6).map(m=>m.sym).join(', ');
        blocks.push(`<div class="box-bear" style="border-radius:8px;padding:9px 11px;font-size:11.5px;line-height:1.45"><b>Tightly correlated cluster — ${fmt(g.pct,1)}% of equity${g.avgCorr!=null?`, avg ρ ≈ ${fmt(g.avgCorr,2)}`:''}.</b> ${mem} have been moving as one block in YTD daily returns — effectively a single position for risk purposes.</div>`); }
      // Fragile leg — the highest-beta meaningful holding, derived from per-symbol beta.
      if(perSym){ const cand=enriched.filter(p=>p.val>0&&p.pct>=1.5&&perSym[p.symbol]!=null).map(p=>({p,b:perSym[p.symbol]})).sort((a,b)=>b.b-a.b)[0];
        if(cand&&cand.b>=1.5){ blocks.push(`<div class="cov-note" style="margin-top:0"><b style="color:var(--text)">Fragile leg:</b> ${cand.p.symbol} (β ≈ ${fmt(cand.b,1)}, ${fmt(cand.p.pct,1)}% of book) is your most market-sensitive position — a 10% market drop implies ≈ ${fmtP(-10*cand.b)} on it alone. Tighter stops and smaller size belong here, not on the low-β names.</div>`); }
      }
      // Optional owner editorial, carried in data.notes (string or {risk}). Updates with the snapshot
      // rather than living in the shell, so context never goes stale silently.
      const note=(()=>{ try{ const n=window.__DATA&&window.__DATA.notes; if(!n)return null; return typeof n==='string'?n:(n.risk||null);}catch(e){return null;} })();
      if(note) blocks.push(`<div class="box-info" style="border-radius:8px;padding:9px 11px;font-size:11.5px;line-height:1.45">📝 ${note}</div>`);
      if(!blocks.length) return '';
      return `<div style="margin-top:14px;padding-top:12px;border-top:1px solid var(--surface-2)"><div style="font-size:12px;font-weight:700;color:var(--text);margin-bottom:7px">🔎 Concentration &amp; correlation context</div><div style="display:grid;gap:8px">${blocks.join('')}</div></div>`;
    })()}
  `;
}

      <div><div class="col-title">📅 Upcoming Ex-Dividend Dates</div>${ex.length?ex.map(e=>`<div class="exdiv-line"><span><b>${e.sym}</b> <span style="color:#9ca3af">$${fmt(e.dps,2)}/sh</span></span><span>${e.date} · <b class="pos">${fmtD(e.inc)}</b></span></div>`).join(''):'<div class="tech-empty">No upcoming ex-div dates in covered holdings.</div>'}</div>
      <div><div class="col-title">🧾 Tax-Loss Harvest</div>${harvTop.length?`<div style="font-size:12.5px;color:var(--text);opacity:.85;line-height:1.5">${harvest.length} position${harvest.length===1?'':'s'} carrying ${fmtD(totalHarv)} of harvestable loss. The itemized list — and the sized winner-trims those losses offset — now live in the <b>⚡ Action Center</b> on the <span class="dp-link" onclick="switchTab('picks')">🎯 Plan tab</span> (Step 1 · Raise cash).</div>`:'<div class="tech-empty">No positions in the red above $'+SMALL_THR+'.</div>'}</div>
    </div>
    <div class="cov-note">Dividends/ex-div from covered holdings (top names). ${(window.__DATA&&window.__DATA.realized&&window.__DATA.realized.approx)?'Realized stock gains are an average-cost estimate from order history (no tax-lot/wash-sale adjustment) — confirm against your Robinhood tax documents. ':''}Harvesting realizes a loss to offset gains — avoid rebuying the same security within 30 days (wash-sale rule). Not tax advice.</div>`;
}

/* The plan tier of the Action Center. Three steps: RAISE cash (harvest losers + right-size
   any over-weight winner — winners are no longer off-limits) → REDEPLOY the pooled proceeds to
   pull risk down → GUARDRAILS (standing trim/stop rules). Trims are triggered by a hard weight
   cap, not a guess on the stock; RSI/valuation only flavour the "why now". rsiMap/ovMap/earningsMap
   are optional (decorators) so the function renders on the first pass before they're fetched. */
const PLAN_SINGLE_CAP=0.25, PLAN_CLUSTER_CAP=0.40; // max % of equity for one name / one correlated cluster
const PLAN_MAX_LEVERAGE=1.5; // redeploy may borrow up to this total leverage (exposure/equity); 1.5× = ≤50¢ debt per $1 equity
/* #9 — one source of truth for a pick's tradeable levels (live price, entry zone, limit, stop, TP1).
   The Action Plan's redeploy ticket and the Top-3 pick card both read this, so a pick can never show
   one entry zone in the card and a different limit in the plan. */
function pickLevels(p){
  const live=(typeof _picksLive!=='undefined'&&_picksLive[p.ticker]&&_picksLive[p.ticker].price)||0;
  const px=live||p.basePrice||0;
  const rng=(typeof parseRange==='function'?parseRange(p.entry):null);
  const stop=(p.sl&&p.sl.price)?p.sl.price:(px?px*0.90:0);
  const tp1=(p.tp1&&p.tp1.price)||null;
  const zone=p.entry||(px?('≤ $'+fmt(px,px>=1?2:4)):'—');
  const limit=(rng&&rng.hi)?rng.hi:px;
  return {px,zone,limit,stop,tp1,rng,live:!!live};
}
/* Build a pick-shaped object from a scored top-10 CANDIDATE row (which carries no hand-built levels)
   so the Action Plan can backfill its redeploy sleeve when the 3 vetted picks don't fill it. Levels
   are SYNTHESIZED from the 50-DMA (same pullback/stop machinery as the oversold addCand fallback) and
   flagged synth:true so the UI labels them "screen backfill", not dressed up as equals to the top 3. */
function synthPickFromCandidate(c, smaMap){
  if(!c||!c.ticker)return null;
  const live=(typeof _picksLive!=='undefined'&&_picksLive[c.ticker]&&_picksLive[c.ticker].price)||0;
  const px=live||c.price||0; if(!(px>0))return null;
  const s=smaMap&&smaMap[c.ticker];
  const stop=(s!=null&&isFinite(s)&&s<px)?Math.min(s*0.97,px*0.93):px*0.90;
  const entryLo=(s!=null&&isFinite(s))?Math.min(px,s*0.98):px*0.97;
  const tp1=px+2*(px-stop); // a 2R target so the buy ticket carries a level; estimate only
  const d=v=>+fmt(v,v>=1?2:4);
  return { ticker:c.ticker, company:c.company, sector:c.sector, signal:'SCREEN', synth:true,
    basePrice:c.price, entry:'$'+fmt(entryLo,entryLo>=1?2:4)+' – $'+fmt(px,px>=1?2:4),
    tp1:{price:d(tp1)}, sl:{price:d(stop)}, rr:c.rr, composite:c.composite, rsi:c.rsi };
}
/* #5 — deep-link from a plan add to its Top-3 card (and a brief highlight so it's findable). */
function jumpToPick(t){ try{ const el=document.getElementById('pickcard-'+t); if(!el)return;
  el.scrollIntoView({behavior:'smooth',block:'center'});
  const o=el.style.boxShadow; el.style.boxShadow='0 0 0 2px #6366f1'; setTimeout(()=>{el.style.boxShadow=o;},1500);
